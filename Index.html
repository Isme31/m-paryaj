<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2dLxLpWFWhQvJnr9_PohsosCbP3TcmlIVFb0YdLbJB0" />
    <title>M-PARYAJ | Domino & Mopion</title>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --bg: #0d0d0d; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .card { background: var(--card); padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; }
        .btn { background: var(--neon); color: black; padding: 12px; width: 95%; border-radius: 50px; border: none; font-weight: bold; margin: 5px 0; }
        
        /* MOPION 5x5 */
        .mopion-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 300px; margin: 15px auto; }
        .cell { background: #222; height: 50px; border: 1px solid var(--neon); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; }
        
        /* DOMINO STYLE */
        .domino-board { background: #0a2e1a; height: 100px; border: 2px solid #005a2b; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 10px 0; overflow-x: auto; }
        .domino-piece { background: white; color: black; width: 30px; height: 55px; border-radius: 3px; display: flex; flex-direction: column; justify-content: space-around; font-weight: bold; margin: 0 3px; border: 1px solid #000; }
        
        .hidden { display: none; }
        .balans-box { font-size: 1.2rem; color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

    <!-- PAJ LOGIN -->
    <div id="login-section">
        <div class="card">
            <h2 style="text-shadow: 0 0 10px var(--neon);">M-PARYAJ</h2>
            <input type="tel" id="tel" placeholder="Nimewo Telefòn" style="width:85%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #444; background:#222; color:white;">
            <button class="btn" onclick="antre()">KÒMANSE JWÈT LA</button>
        </div>
    </div>

    <!-- PAJ JWÈT -->
    <div id="game-section" class="hidden">
        <div class="card">
            <div class="balans-box">Balans: 0 HTG</div>
            <p style="font-size: 0.8rem;">Voye kòb (MonCash/NatCash):<br>
            <b style="font-size: 1.1rem; color: var(--gold);">5511-0103</b></p>
        </div>

        <!-- SEKSYON DOMINO -->
        <div class="card">
            <h3>JWÈT DOMINO</h3>
            <div class="domino-board" id="domino-board">
                <div class="domino-piece"><div>6</div><hr style="width:100%;margin:0"><div>6</div></div>
                <div class="domino-piece"><div>6</div><hr style="width:100%;margin:0"><div>5</div></div>
                <div style="color: #005a2b; margin-left:10px;">...</div>
            </div>
            <button class="btn" style="background:var(--gold)" onclick="alert('Tablo Domino a ap louvri...')">ANTRE NAN TABLO</button>
        </div>

        <!-- SEKSYON MOPION 5x5 -->
        <div class="card">
            <h3>MÒPYON (5 Liy)</h3>
            <div class="mopion-grid" id="mopion-board"></div>
            <p id="status" style="font-size:0.8rem">Tou pa: X</p>
            <button class="btn" onclick="resetMopion()">REKÒMANSE</button>
        </div>
    </div>

    <script>
        let board = Array(25).fill(""); 
        let tounen = "X";

        function antre() {
            if(document.getElementById('tel').value.length >= 8) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('game-section').classList.remove('hidden');
                desineMopion();
            }
        }

        function desineMopion() {
            const container = document.getElementById('mopion-board');
            container.innerHTML = "";
            board.forEach((val, i) => {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = val;
                if(val === "X") cell.style.color = "var(--neon)";
                if(val === "O") cell.style.color = "var(--gold)";
                cell.onclick = () => {
                    if(board[i] === "") {
                        board[i] = tounen;
                        tounen = (tounen === "X") ? "O" : "X";
                        document.getElementById('status').innerText = "Tou pa: " + tounen;
                        desineMopion();
                    }
                };
                container.appendChild(cell);
            });
        }

        function resetMopion() {
            board = Array(25).fill("");
            tounen = "X";
            desineMopion();
        }
    </script>
</body>
</html>
