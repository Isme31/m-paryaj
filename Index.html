<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Admin & Jwèt</title>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .hidden { display: none; }
        .card { background: #1a1a1a; padding: 15px; margin: 10px; border-radius: 15px; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        button { width: 90%; padding: 12px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-main { background: var(--neon); color: black; }
        .btn-admin { background: #ff4d4d; color: white; }
        .stat-val { color: var(--neon); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <!-- 1. PAJ LOGIN -->
    <div id="auth-page" class="card">
        <h2 style="color: var(--neon);">M-PARYAJ</h2>
        <p>Login pou jwe oswa Admin</p>
        <input type="tel" id="user-phone" placeholder="Nimewo Telefòn">
        <input type="password" id="user-pass" placeholder="Modpas oswa Kòd Admin">
        <button class="btn-main" onclick="login()">ANTRE</button>
    </div>

    <!-- 2. PAJ ADMIN (SEKRÈ) -->
    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: #ff4d4d;">
            <h2 style="color: #ff4d4d;">PANÈL ADMIN</h2>
            <p>Jere Balans Kliyan yo</p>
            <input type="tel" id="target-phone" placeholder="Nimewo Jwè a">
            <input type="number" id="add-amount" placeholder="Montan pou ajoute (HTG)">
            <button class="btn-admin" onclick="ajouteKob()">AJOUTE KÒB SOU KONT LI</button>
            <hr style="border: 0.5px solid #333;">
            <div style="text-align: left; font-size: 0.8rem;">
                <p>Total Pwofi Kay la (3% + 10%): <span id="admin-pwofi" style="color:var(--gold)">0</span> HTG</p>
            </div>
            <button onclick="location.reload()" style="background:#555">SOTI NAN ADMIN</button>
        </div>
    </div>

    <!-- 3. PAJ JWÈT (POU KLIYAN) -->
    <div id="main-app" class="hidden">
        <div class="card" style="display: flex; justify-content: space-between;">
            <div id="display-id" style="color: #888;"></div>
            <div>Balans: <span id="balans" class="stat-val">0</span> HTG</div>
        </div>
        <div class="card">
            <h3>BYENVINI NAN M-PARYAJ</h3>
            <button class="btn-main" onclick="alert('Domino ap ouvri...')">JWE DOMINO</button>
            <button class="btn-main" onclick="alert('Mopion ap ouvri...')">JWE MOPION</button>
        </div>
        <button onclick="location.reload()" style="background:#333; color: white;">DEKONEKTE</button>
    </div>

    <script>
        // Done Simulation (Nan Firebase sa t'ap sere nèt)
        let balansJwè = 0;
        let pwofiKay = 0;
        const KOD_ADMIN = "Cricra31";

        function login() {
            let phone = document.getElementById("user-phone").value;
            let pass = document.getElementById("user-pass").value;

            if (pass === KOD_ADMIN) {
                // Ouvri paj Admin
                document.getElementById("auth-page").classList.add("hidden");
                document.getElementById("admin-panel").classList.remove("hidden");
            } else if (phone.length >= 8 && pass !== "") {
                // Ouvri paj Jwè
                document.getElementById("auth-page").classList.add("hidden");
                document.getElementById("main-app").classList.remove("hidden");
                document.getElementById("display-id").innerText = "Jwè: " + phone;
            } else {
                alert("Ranpli enfòmasyon yo byen!");
            }
        }

        function ajouteKob() {
            let tel = document.getElementById("target-phone").value;
            let mnt = parseFloat(document.getElementById("add-amount").value);

            if (tel === "" || isNaN(mnt)) {
                alert("Mete nimewo ak montan an!");
                return;
            }

            // Isit la nan Firebase, nou t'ap mete update balans tel la
            alert("Siksè! " + mnt + " HTG ajoute sou kont " + tel);
            
            // Simulation pwofi (3% frè depo)
            pwofiKay += (mnt * 0.03);
            document.getElementById("admin-pwofi").innerText = pwofiKay.toFixed(2);
        }
    </script>
</body>
</html>
