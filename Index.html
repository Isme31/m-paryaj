<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2dLxLpWFWhQvJnr9_PohsosCbP3TcmlIVFb0YdLbJB0" />
    <title>M-PARYAJ | Domino & Mopion</title>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --bg: #0d0d0d; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .card { background: var(--card); padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; }
        .btn { background: var(--neon); color: black; padding: 12px; width: 95%; border-radius: 50px; border: none; font-weight: bold; margin: 5px 0; }
        .mopion-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 300px; margin: 15px auto; }
        .cell { background: #222; height: 55px; border: 1px solid var(--neon); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none; }
        .balans-box { font-size: 1.5rem; color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="card">
            <h2>M-<span>PARYAJ</span></h2>
            <input type="tel" id="tel" placeholder="Nimewo MonCash/NatCash" style="width:85%; padding:12px; margin-bottom:10px;">
            <button class="btn" onclick="antre()">LOGIN</button>
        </div>
    </div>

    <div id="game-section" class="hidden">
        <div class="card">
            <div>Balans ou: <span id="balans" class="balans-box">0</span> HTG</div>
            <p>Rechaje: <b>5511-0103</b></p>
        </div>

        <div class="card">
            <h3>MÒPYON (Aligné 5)</h3>
            <div class="mopion-grid" id="mopion-board"></div>
            <p id="status">Tou pa: X</p>
        </div>

        <div class="card">
            <h3>DOMINO</h3>
            <div id="domino-msg">Klike pou chèche yon advèsè...</div>
            <button class="btn" style="background:var(--gold)" onclick="joueDomino()">JWE DOMINO (50 HTG)</button>
        </div>
    </div>

    <script>
        let board = Array(25).fill(""); 
        let tounen = "X";
        let balans = 0;

        function antre() {
            if(document.getElementById('tel').value.length >= 8) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('game-section').classList.remove('hidden');
                desineMopion();
            }
        }

        function desineMopion() {
            const container = document.getElementById('mopion-board');
            container.innerHTML = "";
            board.forEach((val, i) => {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = val;
                cell.onclick = () => feMouvman(i);
                container.appendChild(cell);
            });
        }

        function feMouvman(i) {
            if(board[i] === "") {
                board[i] = tounen;
                desineMopion();
                if(tchekeGanyan(tounen)) {
                    alert("BRAVO! Jwè " + tounen + " Ganyen!");
                    ajouteLajan(100); // Bay 100 HTG si l ganyen
                    resetMopion();
                } else {
                    tounen = (tounen === "X") ? "O" : "X";
                    document.getElementById('status').innerText = "Tou pa: " + tounen;
                }
            }
        }

        function tchekeGanyan(p) {
            // Lojik senp pou 5 nan yon liy (Vètikal, Orizontal, Diagonal)
            for (let i = 0; i < 5; i++) {
                // Check orizontal
                if (board.slice(i*5, i*5+5).every(v => v === p)) return true;
                // Check vètikal
                if ([0,1,2,3,4].every(j => board[i + j*5] === p)) return true;
            }
            return true ? false : false; // Sa bezwen yon lojik pi fon pou diagonal
        }

        function ajouteLajan(mnt) {
            balans += mnt;
            document.getElementById('balans').innerText = balans;
            alert("Kont ou kredite ak " + mnt + " HTG!");
        }

        function joueDomino() {
            alert("W ap antre nan yon tablo Domino...");
            // Lojik pou genyen nan Domino
            setTimeout(() => {
                alert("Ou bat advèsè a nan Domino!");
                ajouteLajan(150);
            }, 3000);
        }

        function resetMopion() {
            board = Array(25).fill("");
            tounen = "X";
            desineMopion();
        }
    </script>
</body>
</html>
