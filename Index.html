<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Live Sync</title>
    <script type="module">
        // --- KONFIGIRASYON FIREBASE ---
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, get, update, onValue } from "https://gstatic.com";

        // KOLE KOD FIREBASE OU TE KOPYE A ISIT LA
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-paryaj",
            storageBucket: "://appspot.com",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- FONKSYON YO ---

        window.login = async function() {
            let p = document.getElementById("user-phone").value;
            let m = document.getElementById("user-pass").value;
            if(p.length < 8) return alert("Nimewo twò kout");

            if(m === "Cricra31") {
                document.getElementById("auth-page").style.display = "none";
                document.getElementById("admin-panel").style.display = "block";
                return;
            }

            const userRef = ref(db, 'jwè/' + p);
            const snap = await get(userRef);

            if(snap.exists()) {
                if(snap.val().modpas === m) { antreJwet(p); } 
                else { alert("Modpas pa bon"); }
            } else {
                await set(userRef, { nimewo: p, modpas: m, balans: 0 });
                antreJwet(p);
            }
        };

        function antreJwet(p) {
            document.getElementById("auth-page").style.display = "none";
            document.getElementById("main-app").style.display = "block";
            document.getElementById("display-id").innerText = "ID: " + p;
            
            // Koute balans lan an dirèk
            onValue(ref(db, 'jwè/' + p + '/balans'), (snap) => {
                document.getElementById("balans").innerText = snap.val() || 0;
            });
        }

        window.ajouteKob = async function() {
            let tel = document.getElementById("target-phone").value;
            let mnt = parseFloat(document.getElementById("add-amount").value);
            if(!tel || !mnt) return alert("Ranpli bwat yo");

            const userRef = ref(db, 'jwè/' + tel);
            const snap = await get(userRef);

            if(snap.exists()) {
                let nouvoBalans = (snap.val().balans || 0) + mnt;
                await update(userRef, { balans: nouvoBalans });
                alert("Siksè! " + mnt + " HTG voye bay " + tel);
            } else {
                alert("Jwè sa a poko enskri!");
            }
        };
    </script>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; }
        .card { background: #1a1a1a; padding: 20px; margin: 10px; border-radius: 15px; border: 1px solid #333; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #222; color: white; border: 1px solid #444; }
        button { width: 90%; padding: 12px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--neon); color: black; }
    </style>
</head>
<body>

    <div id="auth-page" class="card">
        <h2 style="color: var(--neon);">M-PARYAJ</h2>
        <input type="tel" id="user-phone" placeholder="Nimewo Telefòn">
        <input type="password" id="user-pass" placeholder="Modpas">
        <button class="btn-main" onclick="login()">ANTRE</button>
    </div>

    <div id="admin-panel" class="card" style="display:none; border-color: red;">
        <h2 style="color: red;">ADMIN</h2>
        <input type="tel" id="target-phone" placeholder="Nimewo Kliyan">
        <input type="number" id="add-amount" placeholder="Montan">
        <button style="background: red; color: white;" onclick="ajouteKob()">VOYE KÒB</button>
    </div>

    <div id="main-app" class="card" style="display:none;">
        <div style="display:flex; justify-content: space-between;">
            <span id="display-id"></span>
            <span>Balans: <b id="balans" style="color:var(--neon)">0</b> HTG</span>
        </div>
        <hr>
        <button class="btn-main" style="margin-top:20px">JWE DOMINO</button>
    </div>

</body>
</html>
