<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Jwe & Genyen</title>
    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 320px; margin: 15px auto; }
        .cell { background: #222; height: 60px; border: 1px solid var(--neon); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; }
        .btn { background: var(--neon); color: black; padding: 12px; width: 95%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2 style="color:var(--neon)">M-PARYAJ</h2>
        <input type="tel" id="userPhone" placeholder="Nimewo MonCash/NatCash" style="width:85%; padding:12px; margin-bottom:10px; border-radius:8px;">
        <button class="btn" onclick="login()">ANTRE NAN JWÈT LA</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="card">
            <div style="font-size: 1.5rem;">Balans: <span id="valBalans" style="color:var(--neon)">0</span> HTG</div>
            <p>Rechaje: <b style="color:var(--gold)">5511-0103</b></p>
        </div>

        <div class="card">
            <h3>MÒPYON (5 POU GENYEN)</h3>
            <div id="board" class="grid"></div>
            <p id="info">Tou pa: X</p>
        </div>

        <div class="card">
            <h3>DOMINO</h3>
            <div style="background:#0a2e1a; padding:20px; border-radius:10px; margin-bottom:10px;">Tablo 1: [6|6] [6|5] ...</div>
            <button class="btn" style="background:var(--gold)" onclick="alert('Lojik Domino a ap chaje...')">JWE DOMINO</button>
        </div>
    </div>

    <script>
        let balans = 0;
        let board = Array(25).fill("");
        let currentPlayer = "X";

        function login() {
            let p = document.getElementById('userPhone').value;
            if(p.length >= 8) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                initBoard();
            }
        }

        function initBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = "";
            board.forEach((val, i) => {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = val;
                cell.onclick = () => play(i);
                boardDiv.appendChild(cell);
            });
        }

        function play(i) {
            if(board[i] === "") {
                board[i] = currentPlayer;
                initBoard();
                if(checkWin(currentPlayer)) {
                    alert("BRAVO! " + currentPlayer + " ganyen 50 HTG!");
                    updateBalans(50);
                    resetGame();
                } else {
                    currentPlayer = (currentPlayer === "X") ? "O" : "X";
                    document.getElementById('info').innerText = "Tou pa: " + currentPlayer;
                }
            }
        }

        function checkWin(p) {
            // Lojik pou tcheke 5 liy orizontal, vètikal, oswa diagonal
            const size = 5;
            for(let i=0; i<size; i++) {
                for(let j=0; j<size; j++) {
                    // Sa se yon baz, n ap ajoute tout direksyon yo
                    if(board[i*size] === p && board[i*size+1] === p && board[i*size+2] === p && board[i*size+3] === p && board[i*size+4] === p) return true;
                }
            }
            return false;
        }

        function updateBalans(mnt) {
            balans += mnt;
            document.getElementById('valBalans').innerText = balans;
            // ISIT LA: N ap ajoute kòd Firebase la pou sere balans lan nan nwaj la
        }

        function resetGame() {
            board = Array(25).fill("");
            initBoard();
        }
    </script>
</body>
</html>
