<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ V2</title>
    <!-- Sèvi ak Vèsyon 8 la ki pi stab pou HTML senp -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #161616; padding: 20px; border-radius: 10px; border: 1px solid #00ff88; max-width: 350px; margin: auto; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #222; color: white; }
        button { background: #00ff88; color: black; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2 style="color:#00ff88">M-PARYAJ <span style="font-size: 10px; color: gray;">V2</span></h2>
        <p id="status" style="font-size: 11px; color: orange;">Y ap tcheke koneksyon Firebase...</p>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="konekte()">ANTRE / KREYE KONT</button>
    </div>

    <div id="game-box" class="box hidden">
        <h3 id="tel-afiche">---</h3>
        <h1 style="color:#ffcc00"><span id="bal">0</span> HTG</h1>
        <button onclick="location.reload()" style="background:#ff4444; color:white">SÒTI</button>
    </div>

    <script>
        // Tout enfòmasyon sa yo kòrèk selon pwojè w la
        const firebaseConfig = {
            apiKey: "AIzaSyDQN0XDlGG4XkijYW0Gx3yn9IqkbB4jMp8",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-paryaj",
            storageBucket: "m-paryaj.firebasestorage.app",
            appId: "1:103993159961:web:0ebc12aebd2f3b05fc5588"
        };

        // INISYALIZASYON
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
            console.log("Firebase inisyalize!");
        } catch (e) {
            alert("Erè Inisyalizasyon: " + e.message);
        }

        // Tcheke koneksyon
        const statusTxt = document.getElementById('status');
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                statusTxt.innerText = "Koneksyon Firebase: OK ✅";
                statusTxt.style.color = "#00ff88";
            } else {
                statusTxt.innerText = "Echèk koneksyon! (Tcheke Rules oswa URL) ❌";
                statusTxt.style.color = "#ff4444";
            }
        });

        function konekte() {
            const tel = document.getElementById('tel').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if(!tel || !pass) return alert("Ranpli tout jaden yo!");

            // Nou sèvi ak yon fòma "Catch" pou wè si se Database la ki bloke
            db.ref('itilizate/' + tel).once('value')
            .then((s) => {
                const d = s.val();
                if (!d) {
                    db.ref('itilizate/' + tel).set({ modpas: pass, balans: 0 })
                    .then(() => antre(tel))
                    .catch(e => alert("DATABASE BLOKE: Ou dwe mete Rules sou True nan Firebase!"));
                } else if (d.modpas === pass) {
                    antre(tel);
                } else {
                    alert("Modpas pa kòrèk!");
                }
            })
            .catch(err => {
                alert("Erè Aksè: " + err.message + "\n\nSa vle di Rules ou yo pa pibliye kòrèkteman.");
            });
        }

        function antre(tel) {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('game-box').classList.remove('hidden');
            document.getElementById('tel-afiche').innerText = "Tel: " + tel;
            db.ref('itilizate/' + tel + '/balans').on('value', s => {
                document.getElementById('bal').innerText = s.val() || 0;
            });
        }
    </script>
</body>
</html>
