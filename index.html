<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Ofisyèl</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --vè: #00ff88; --wouj: #ff4444; --nwa: #0a0a0a; --kad: #161616; --ò: #ffcc00; --ble: #0088ff; --wa: #25d366; }
        body { background: var(--nwa); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .kad { background: var(--kad); padding: 20px; border-radius: 15px; border: 1px solid var(--vè); margin: 10px auto; max-width: 420px; }
        .hidden { display: none !important; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 16px; }
        .btn { background: var(--vè); color: black; padding: 14px; width: 95%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-wa { background: var(--wa); color: white; text-decoration: none; display: block; padding: 10px; width: 90%; border-radius: 50px; font-size: 13px; margin: 10px auto; font-weight: bold; }
        .tab-btn { background: #333; color: white; padding: 10px; border: none; cursor: pointer; width: 48%; border-radius: 5px; }
        .tab-aktif { background: var(--vè); color: black; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: var(--vè); border: 2px solid var(--vè); margin: 15px auto; max-width: 320px; }
        .cell { background: var(--kad); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; font-weight: bold; min-height: 32px; }
        .admin-item { background: #222; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid var(--wouj); text-align: left; }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="login-box" class="kad">
        <h1 style="color: var(--vè);">M-PARYAJ</h1>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button class="btn" onclick="konekte()">ANTRE</button>
        <a href="https://wa.me" class="btn-wa" target="_blank">WhatsApp Admin 1</a>
        <a href="https://wa.me" class="btn-wa" target="_blank" style="background:#128C7E">WhatsApp Admin 2</a>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="game-box" class="kad hidden">
        <h3 id="tel-afiche" style="color:var(--vè); font-size:12px;">Pwofil: ---</h3>
        <div style="font-size:30px; color:var(--ò); margin:10px 0;"><span id="bal">0</span> HTG</div>
        
        <div style="margin-bottom: 15px;">
            <button id="tab1" class="tab-btn tab-aktif" onclick="chanjeTab(1)">MOPYON</button>
            <button id="tab2" class="tab-btn" onclick="chanjeTab(2)">BÒLÈT</button>
        </div>

        <div style="background:#222; padding:10px; border-radius:10px; border:1px solid #444; margin-bottom:15px;">
            <p style="font-size:11px; margin:0;">Depoze sou: <b>31594645 / 55110103</b></p>
            <input type="text" id="depo-id" placeholder="ID MonCash (Pve ID)" style="width:80%; font-size:14px;">
            <button class="btn" onclick="voyeDemannDepo()" style="background:var(--ò); font-size:12px; height:40px;">KONFIME DEPO</button>
        </div>

        <div id="seksyon-mopyon">
            <button class="btn" onclick="kreyeMatch()">KREYE MATCH (50G)</button>
            <input type="text" id="join-code" placeholder="Kòd Match Zanmi" style="width:50%;">
            <button class="btn" onclick="rejwennMatch()" style="width:35%; font-size:12px;">ANTRE</button>
        </div>

        <div id="seksyon-bolet" class="hidden">
            <input type="number" id="boul-parye" placeholder="Boul (00-99)">
            <input type="number" id="montan-parye" placeholder="Montan (Goud)">
            <button class="btn" onclick="paryeBolet()" style="background: var(--ble); color: white;">PARYE BÒLÈT</button>
        </div>

        <button class="btn" onclick="mandeRetre()" style="background:white; color:black; font-size:12px; margin-top:20px;">RETIRE KÒB</button>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white; margin-top:10px;">SÒTI</button>
    </div>

    <!-- 3. ADMIN PANEL -->
    <div id="admin-box" class="kad hidden" style="border-color: var(--wouj);">
        <h2 style="color: var(--wouj);">ADMIN PANEL</h2>
        <div style="background: #333; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
            <input type="number" id="boul-genyen" placeholder="Boul Ganyan">
            <button class="btn" onclick="peyeGanyan()" style="background: var(--ò);">PEYE BÒLÈT</button>
        </div>
        <div id="admin-list">Chaje demann...</div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white;">KITE</button>
    </div>

    <!-- 4. TABLO MOPYON -->
    <div id="mopyon-box" class="kad hidden">
        <div id="timer" style="font-size:24px; color:var(--wouj); margin-bottom:10px;">30s</div>
        <div id="status-m" style="margin-bottom:10px; color:var(--ò);">...</div>
        <div id="grid" class="grid"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQN0XDlGG4XkijYW0Gx3yn9IqkbB4jMp8", 
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mwen = "", matchID = "", mwenSe = "", tourAktif = "X", board = Array(100).fill("");
        let timerInterval;

        function konekte() {
            let tel = document.getElementById('tel').value.trim();
            let p = document.getElementById('pass').value.trim();
            if (p === "Cricra31") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-box').classList.remove('hidden');
                kouteAdmin(); return;
            }
            if (tel.length < 8) return alert("Nimewo kout!");
            db.ref('itilizate/' + tel).once('value').then(s => {
                let d = s.val();
                if (!d) db.ref('itilizate/' + tel).set({ modpas: p, balans: 0, fwod: 0, status: "aktif" }).then(() => antre(tel));
                else if (d.modpas === p) antre(tel);
                else alert("Move modpas!");
            });
        }

        function antre(tel) {
            db.ref('itilizate/' + tel).once('value').then(s => {
                if (s.val().status === "bloke") return alert("KONT OU BLOKE!");
                mwen = tel;
                document.getElementById('tel-afiche').innerText = "Pwofil: " + tel;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                db.ref('itilizate/' + mwen + '/balans').on('value', snap => { document.getElementById('bal').innerText = snap.val() || 0; });
            });
        }

        function chanjeTab(n) {
            document.getElementById('seksyon-mopyon').classList.toggle('hidden', n !== 1);
            document.getElementById('seksyon-bolet').classList.toggle('hidden', n !== 2);
            document.getElementById('tab1').classList.toggle('tab-aktif', n === 1);
            document.getElementById('tab2').classList.toggle('tab-aktif', n === 2);
        }

        function voyeDemannDepo() {
            let idTranz = document.getElementById('depo-id').value.trim();
            if (idTranz === "") return alert("Mete ID a!");
            db.ref('istori_transaksyon').orderByChild('pve_id').equalTo(idTranz).once('value').then(snap => {
                if (snap.exists()) {
                    alert("ID SA ITILIZE DEJA!");
                    db.ref('itilizate/' + mwen + '/fwod').transaction(f => {
                        let t = (f || 0) + 1;
                        if (t >= 3) { db.ref('itilizate/' + mwen + '/status').set("bloke"); location.reload(); }
                        return t;
                    });
                } else {
                    db.ref('demann').push({ tip: "DEPO", tel: mwen, montan: 50, pve_id: idTranz, le: Date.now() });
                    alert("Demann voye! Admin ap verifye.");
                }
            });
        }

        function paryeBolet() {
            let b = document.getElementById('boul-parye').value;
            let m = parseFloat(document.getElementById('montan-parye').value);
            let bal = parseFloat(document.getElementById('bal').innerText);
            if (b === "" || m < 5 || bal < m) return alert("Kòb piti oswa boul eronre!");
            db.ref('itilizate/' + mwen + '/balans').transaction(v => v - m);
            db.ref('paryaj_bolet').push({ tel: mwen, boul: b, montan: m });
            alert("Paryaj plase!");
        }

        function mandeRetre() {
            let m = prompt("Konbe ou vle retire (Min 100G)?");
            let bal = parseFloat(document.getElementById('bal').innerText);
            if (m >= 100 && m <= bal) {
                db.ref('itilizate/' + mwen + '/balans').transaction(b => b - m);
                db.ref('demann').push({ tip: "RETRÈ", tel: mwen, montan: parseInt(m), le: Date.now() });
                alert("Demann retrè voye!");
            } else alert("Kòb la pasifi!");
        }

        function kreyeMatch() {
            if (parseFloat(document.getElementById('bal').innerText) < 50) return alert("Balans ou dwe omwen 50G!");
            let kod = Math.floor(1000 + Math.random() * 9000);
            matchID = "match_" + kod;
            db.ref('matches/' + matchID).set({ board: Array(100).fill(""), tour: "X", jwèX: mwen, jwèO: "", winner: "", lastMove: Date.now() });
            document.getElementById('game-box').classList.add('hidden');
            alert("MATCH KREYE! Bay zanmi w kòd sa a: " + kod);
            kouteMatch();
        }

        function rejwennMatch() {
            let kod = document.getElementById('join-code').value.trim();
            if (parseFloat(document.getElementById('bal').innerText) < 50) return alert("Balans ou dwe omwen 50G!");
            matchID = "match_" + kod;
            db.ref('matches/' + matchID).once('value').then(s => {
                if (s.exists() && s.val().jwèO === "") {
                    db.ref('matches/' + matchID).update({ jwèO: mwen, lastMove: Date.now() });
                    kouteMatch();
                } else alert("Match plen oswa kòd la pa bon!");
            });
        }

        function kouteMatch() {
            db.ref('matches/' + matchID).on('value', s => {
                let d = s.val();
                if (d && d.jwèX && d.jwèO) {
                    mwenSe = (d.jwèX === mwen) ? "X" : "O";
                    if (document.getElementById('mopyon-box').classList.contains('hidden')) {
                        db.ref('itilizate/' + mwen + '/balans').transaction(b => b - 50);
                        document.getElementById('game-box').classList.add('hidden');
                        document.getElementById('mopyon-box').classList.remove('hidden');
                    }
                    board = d.board; tourAktif = d.tour;
                    document.getElementById('status-m').innerText = "Ou se: "+mwenSe+" | Tou pa: "+tourAktif;
                    desineBoard(); startTimer(d.lastMove);
                    if (d.winner && d.winner !== "") {
                        clearInterval(timerInterval);
                        alert(d.winner === mwenSe ? "OU GANYEN 100G!" : "OU PÈDI!");
                        if (d.winner === mwenSe) db.ref('itilizate/' + mwen + '/balans').transaction(b => b + 100);
                        db.ref('matches/' + matchID).remove(); setTimeout(() => location.reload(), 2000);
                    }
                }
            });
        }

        function startTimer(last) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let r = 30 - Math.floor((Date.now() - last) / 1000);
                document.getElementById('timer').innerText = r + "s";
                if (r <= 0 && tourAktif === mwenSe) db.ref('matches/' + matchID).update({ winner: (mwenSe === "X" ? "O" : "X") });
            }, 1000);
        }

        function desineBoard() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            board.forEach((v, i) => {
                let c = document.createElement('div'); c.className = 'cell'; c.innerText = v;
                c.style.color = v === "X" ? "var(--vè)" : "var(--wouj)";
                c.onclick = () => { if (tourAktif === mwenSe && board[i] === "") {
                    board[i] = mwenSe;
                    db.ref('matches/' + matchID).update({ board: board, tour: (mwenSe === "X" ? "O" : "X"), lastMove: Date.now() });
                }};
                g.appendChild(c);
            });
        }

        function kouteAdmin() {
            db.ref('demann').on('value', s => {
                const l = document.getElementById('admin-list'); l.innerHTML = "";
                s.forEach(c => {
                    let d = c.val();
                    let div = document.createElement('div'); div.className = 'admin-item';
                    div.innerHTML = `<div style="padding:10px;"><b>${d.tip}</b>: ${d.tel} (${d.montan}G) <br>ID: ${d.pve_id || '---'}</div> 
                        <button onclick="apwouve('${c.key}', '${d.tel}', ${d.montan}, '${d.tip}')" style="width:100%; padding:10px; background:var(--vè); border:none; font-weight:bold;">VALIDE ✅</button>`;
                    l.appendChild(div);
                });
            });
        }

        function apwouve(key, tel, mon, tip) {
            db.ref('demann/' + key).once('value').then(s => {
                let d = s.val();
                if (tip === "DEPO") {
                    db.ref('itilizate/' + tel + '/balans').transaction(b => (b || 0) + mon);
                    db.ref('istori_transaksyon').push({ pve_id: d.pve_id, tel: tel });
                }
                db.ref('demann/' + key).remove(); alert("Valide!");
            });
        }

        function peyeGanyan() {
            let win = document.getElementById('boul-genyen').value;
            if(!win) return alert("Mete boul la!");
            db.ref('paryaj_bolet').once('value').then(s => {
                s.forEach(c => { if(c.val().boul == win) db.ref('itilizate/' + c.val().tel + '/balans').transaction(b => b + (c.val().montan * 50)); });
                db.ref('paryaj_bolet').remove(); alert("Tout moun peye!");
            });
        }
    </script>
</body>
</html>
