<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ</title>
    <!-- Libreri Firebase nesesè yo -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; margin-bottom: 20px; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn { background: #00ff88; color: black; padding: 12px; width: 85%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2>M-PARYAJ</h2>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas (Cricra31)">
        <button class="btn" onclick="antre()">KONEKTE</button>
    </div>

    <div id="admin-box" class="card hidden">
        <h2 style="color:red">ADMIN</h2>
        <input type="tel" id="kliyan" placeholder="Nimewo Kliyan">
        <input type="number" id="kob" placeholder="Montan HTG">
        <button class="btn" onclick="ajoute()">METE KÒB</button>
    </div>

    <div id="game-box" class="card hidden">
        <h3>Balans: <span id="bal" style="color:#00ff88">0</span> HTG</h3>
        <p>Byenvini nan jwèt la!</p>
        <button class="btn" onclick="location.reload()">SOTI</button>
    </div>

    <script>
        // Konfigirasyon ak lyen ou an
        const config = { databaseURL: "https://m-paryaj-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function antre() {
            let t = document.getElementById('tel').value;
            let p = document.getElementById('pass').value;

            if(p === "Cricra31") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-box').classList.remove('hidden');
            } else if(t.length >= 8) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                // Chèche balans lan
                db.ref('itilizate/' + t).on('value', (s) => {
                    document.getElementById('bal').innerText = s.val() ? (s.val().balans || 0) : 0;
                });
            }
        }

        function ajoute() {
            let k = document.getElementById('kliyan').value;
            let m = parseInt(document.getElementById('kob').value);

            if(k && m) {
                db.ref('itilizate/' + k).once('value').then(s => {
                    let ansyen = (s.val() && s.val().balans) ? s.val().balans : 0;
                    db.ref('itilizate/' + k).update({ balans: ansyen + m })
                    .then(() => alert("Kòb la ajoute ak siksè nan Firebase!"));
                }).catch(e => alert("Erè: " + e.message));
            }
        }
    </script>
</body>
</html>
