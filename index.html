<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Mopyon 5⚡</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; margin: 0; }
        .hidden { display: none; }
        .screen { padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(10, 35px); gap: 2px; justify-content: center; background: #333; padding: 5px; margin: 10px auto; width: fit-content; border-radius: 5px; }
        .cell { width: 35px; height: 35px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border-radius: 3px; }
        .timer { font-size: 1.5rem; color: #ff4444; border: 2px solid; width: 60px; margin: 5px auto; border-radius: 10px; }
        button { padding: 12px; margin: 5px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; width: 85%; max-width: 300px; }
        input { padding: 12px; margin: 5px; width: 80%; border-radius: 8px; border: none; background: #222; color: white; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <p>Sipò: 31594645 / 55110103</p>
        <input type="text" id="phone" placeholder="Nimewo Telefòn"> <br>
        <input type="password" id="password" placeholder="Modpas"> <br>
        <button onclick="handleLogin()">Konekte</button>
    </div>

    <div id="menu-screen" class="screen hidden">
        <h2>Balans: <span id="user-balance">0</span>G</h2>
        <button onclick="playWithFriend()">Jwe ak yon Zanmi (Kòd)</button>
        <button onclick="startGame(true)" style="background:#28a745">Jwe ak Robot (IA Fò)</button>
        <button onclick="showScreen('deposit-screen')" style="background:#555">Depo / Retrè</button>
        <p style="font-size:0.8rem">Sipò: 31594645 / 55110103</p>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="timer" id="time-left">30</div>
        <div id="game-status" style="margin:10px">Atann...</div>
        <div class="grid" id="board"></div>
        <button onclick="location.reload()" style="background:#dc3545">Kite Jwèt la</button>
    </div>

    <div id="deposit-screen" class="screen hidden">
        <h3>Voye sou: 31594645</h3>
        <input type="number" id="d-amt" placeholder="Kantite Lajan"> <br>
        <input type="text" id="d-id" placeholder="ID Transaksyon"> <br>
        <button onclick="doDepo()">Voye Demann</button>
        <button onclick="showScreen('menu-screen')" style="background:#666">Retounen</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let uPhone, uPass, myBalance=0, isAdmin=false, board=Array(100).fill("");
        let myRole="X", currentTurn="X", isRobot=false, myRoom="global", timer, timeLeft=30;

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        async function handleLogin() {
            uPhone = document.getElementById('phone').value; uPass = document.getElementById('password').value;
            const res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:uPhone,password:uPass})});
            const data = await res.json();
            if(data.success) { myBalance=data.balance; isAdmin=data.isAdmin; document.getElementById('user-balance').innerText=myBalance; showScreen('menu-screen'); }
        }

        function playWithFriend() { let code = prompt("Mete yon kòd chanm:"); if(code) { myRoom="room_"+code; startGame(false); } }

        async function startGame(withRobot) {
            isRobot = withRobot;
            const res = await fetch('/bet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:uPhone,password:uPass})});
            const data = await res.json();
            if(!data.success) return alert("Balans ou ensifizan!");
            myBalance=data.newBalance; document.getElementById('user-balance').innerText=myBalance;
            
            board=Array(100).fill(""); document.getElementById('board').innerHTML="";
            for(let i=0; i<100; i++) { let c=document.createElement('div'); c.className='cell'; c.id='c'+i; c.onclick=()=>makeMove(i); document.getElementById('board').appendChild(c); }
            showScreen('game-screen');
            if(isRobot) { myRole="X"; currentTurn="X"; document.getElementById('game-status').innerText="Ou se X"; startTimer(); }
            else { socket.emit('join-room',{roomCode:myRoom}); }
        }

        function makeMove(i) {
            if(board[i] || currentTurn !== myRole) return;
            executeMove(i, myRole);
            if(isRobot) { currentTurn="O"; setTimeout(robotMove, 600); }
            else { socket.emit('mouvman',{room:myRoom, index:i, role:myRole}); currentTurn="O"; }
        }

        function executeMove(i, role) {
            board[i]=role; let c=document.getElementById('c'+i); c.innerText=role; c.style.color=role==='X'?'#007bff':'#ff4444';
            if(checkWin(i, role)) { alert("Jwè "+role+" Ganyen!"); location.reload(); if(role===myRole) fetch('/win-game',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:uPhone,password:uPass})}); }
            else { startTimer(); }
        }

        function robotMove() {
            let move = board.findIndex((v,i)=>v==="" && countInAnyDir(i,"X")>=4); // Bloke 4
            if(move===-1) move = board.findIndex((v,i)=>v==="" && countInAnyDir(i,"O")>=4); // Ganye si 4
            if(move===-1) move = board.findIndex(v=>v==="");
            executeMove(move, "O"); currentTurn="X";
        }

        function checkWin(i, r) { return countInAnyDir(i, r) >= 5; }
        function countInAnyDir(i, r) {
            let max=0; [[1,0],[0,1],[1,1],[1,-1]].forEach(([dx,dy])=>{
                let c=1; [1,-1].forEach(s=>{ let x=i%10, y=Math.floor(i/10); while(true){ x+=dx*s; y+=dy*s; let ni=y*10+x; if(x<0||x>=10||y<0||y>=10||board[ni]!==r)break; c++; } });
                if(c>max) max=c;
            }); return max;
        }

        function startTimer() { clearInterval(timer); timeLeft=30; document.getElementById('time-left').innerText=timeLeft; timer=setInterval(()=>{timeLeft--; document.getElementById('time-left').innerText=timeLeft; if(timeLeft<=0){alert("Tan fini! Ou pèdi."); location.reload();}},1000); }

        async function doDepo() {
            const res = await fetch('/request-deposit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:uPhone,amount:document.getElementById('d-amt').value,transactionId:document.getElementById('d-id').value})});
            const data = await res.json(); alert(data.success?"Voye! Atann Admin.":data.message); showScreen('menu-screen');
        }

        socket.on('player-role', r=>myRole=r);
        socket.on('start-game', t=>{currentTurn=t; document.getElementById('game-status').innerText="Turn: "+t; startTimer();});
        socket.on('mouvman', d=>{if(d.role!==myRole){executeMove(d.index, d.role); currentTurn=myRole;}});
    </script>
</body>
</html>
