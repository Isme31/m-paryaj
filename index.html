<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon 50g - 5 Pwen</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eef2f3; margin: 0; padding: 10px; }
        .board { 
            display: grid; 
            grid-template-columns: repeat(15, 25px); 
            grid-template-rows: repeat(15, 25px); 
            gap: 2px; 
            justify-content: center; 
            margin: 20px auto; 
            background: #34495e;
            padding: 5px;
            width: fit-content;
        }
        .cell { 
            width: 25px; height: 25px; background: white; 
            font-size: 14px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; font-weight: bold;
        }
        .cell.X { color: #e74c3c; }
        .cell.O { color: #3498db; }
        .status { font-size: 1.2em; font-weight: bold; margin: 10px; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>Mopyon 5 Pwen 🎮</h1>
    <div class="status" id="status">Tou pa: X</div>
    <div class="board" id="board"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const boardSize = 15;
        let board = Array(boardSize * boardSize).fill(null);
        let currentPlayer = 'X';
        const boardElement = document.getElementById('board');

        // Kreye tablo a
        function createBoard() {
            boardElement.innerHTML = '';
            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.onclick = () => makeMove(i, true);
                boardElement.appendChild(cell);
            }
        }

        function makeMove(index, emit = false) {
            if (board[index] || !currentPlayer) return;

            board[index] = currentPlayer;
            const cell = boardElement.children[index];
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer);

            if (checkWin(index)) {
                alert("Bravo! " + currentPlayer + " genyen!");
                socket.emit('reset'); // Rekòmanse otomatikman
                return;
            }

            if (emit) {
                socket.emit('mouvman', { index, player: currentPlayer });
            }
            
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status').innerText = "Tou pa: " + currentPlayer;
        }

        function checkWin(index) {
            const r = Math.floor(index / boardSize);
            const c = index % boardSize;
            const directions = [[0,1], [1,0], [1,1], [1,-1]];

            for (let [dr, dc] of directions) {
                let count = 1;
                // Tcheke nan yon sans
                for (let i = 1; i < 5; i++) {
                    let nr = r + dr*i, nc = c + dc*i;
                    if (nr>=0 && nr<boardSize && nc>=0 && nc<boardSize && board[nr*boardSize+nc] === currentPlayer) count++;
                    else break;
                }
                // Tcheke nan lòt sans lan
                for (let i = 1; i < 5; i++) {
                    let nr = r - dr*i, nc = c - dc*i;
                    if (nr>=0 && nr<boardSize && nc>=0 && nc<boardSize && board[nr*boardSize+nc] === currentPlayer) count++;
                    else break;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        socket.on('mouvman', (data) => {
            currentPlayer = data.player;
            makeMove(data.index, false);
        });

        socket.on('reset', () => {
            board = Array(boardSize * boardSize).fill(null);
            currentPlayer = 'X';
            document.getElementById('status').innerText = "Tou pa: X";
            createBoard();
        });

        createBoard();
    </script>
</body>
</html>
