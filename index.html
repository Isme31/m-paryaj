<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; }
        .hidden { display: none; } .screen { padding: 20px; }
        input, button, select { padding: 12px; margin: 5px; border-radius: 8px; width: 90%; max-width: 300px; border: none; font-size: 16px; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; max-width: 400px; margin: 15px auto; background: #444; border: 2px solid #444; }
        .cell { aspect-ratio: 1/1; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        .x { color: #007bff; } .o { color: #ff4757; }
        .finance-box { background: #222; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">Konekte</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div style="background:#222; padding:10px; border-radius:10px; border:1px solid #333;">
            <p>Balans: <span id="bal" style="color:#00ff00; font-weight:bold;">0</span> G</p>
            <div id="status" style="font-weight:bold;">Pare pou jwe!</div>
        </div>
        
        <div id="main-menu" style="margin-top:20px;">
            <button onclick="createPrivate()" style="background:#25D366">Voye Kòd WhatsApp (50G)</button>
            <input type="text" id="join-code" placeholder="Antre kòd zanmi">
            <button onclick="joinPrivate()" style="background:#ffc107; color:black;">Antre nan Tab</button>
        </div>

        <div id="board" class="grid hidden"></div>

        <div class="finance-box">
            <div style="display:flex; justify-content:space-around; font-size:12px; margin-bottom:10px;">
                <div style="color:#ff4757;"><b>MonCash</b><br>31594645</div>
                <div style="color:#00ff00;"><b>Natcash</b><br>55110103</div>
            </div>
            <select id="dep-method" style="background:#333; color:white;">
                <option value="MonCash">Mwen voye sou MonCash</option>
                <option value="Natcash">Mwen voye sou Natcash</option>
            </select>
            <input type="text" id="tid" placeholder="ID Tranzaksyon">
            <button onclick="voyeDepo()" style="background:#28a745;">Mande Depo ✅</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(100).fill("");

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, password })
            });
            const data = await res.json();
            if(data.success) {
                myPhone = data.phone;
                document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            } else alert(data.message);
        }

        async function voyeDepo() {
            const tid = document.getElementById('tid').value;
            const method = document.getElementById('dep-method').value;
            if(!tid) return alert("ID manke!");
            await fetch('/submit-deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: myPhone, tid, amount: 50, method })
            });
            alert("Depo voye bay admin!");
        }

        socket.on('balanceUpdate', (data) => {
            if(data.phone === myPhone) document.getElementById('bal').innerText = data.newBalance;
        });

        socket.on('error_msg', (msg) => {
            alert("⚠️ " + msg);
            document.getElementById('status').innerText = "Rechaje kont ou!";
            document.getElementById('status').style.color = "#ff4757";
        });

        function createPrivate() {
            const bal = parseFloat(document.getElementById('bal').innerText);
            if(bal < 50) return alert("Rechaje kont ou pou w ka jwe!");
            
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            socket.emit('createPrivate', { room: code, phone: myPhone });
            window.open(`https://wa.me{code}*`, '_blank');
            document.getElementById('status').innerText = "Kòd: " + code;
        }

        function joinPrivate() {
            const code = document.getElementById('join-code').value.toUpperCase();
            if(!code) return alert("Kòd manke!");
            socket.emit('joinPrivate', { room: code, phone: myPhone });
        }

        socket.on('gameStart', (data) => {
            currentRoom = data.room;
            mySymbol = data.players === myPhone ? 'X' : 'O';
            myTurn = (mySymbol === 'X');
            document.getElementById('board').classList.remove('hidden');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('status').innerText = "Ou se " + mySymbol;
            renderBoard();
        });

        socket.on('opponentMove', (data) => {
            boardData[data.index] = data.symbol;
            myTurn = true; renderBoard();
            if(checkWin5(data.index, data.symbol)) document.getElementById('status').innerText = "OU PÈDI! ❌";
        });

        function makeMove(i) {
            if(!myTurn || boardData[i] !== "") return;
            boardData[i] = mySymbol; myTurn = false; renderBoard();
            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
            if(checkWin5(i, mySymbol)) {
                document.getElementById('status').innerText = "OU GANYEN! 🎉";
                socket.emit('win', { room: currentRoom, phone: myPhone });
            }
        }

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = `cell ${val.toLowerCase()}`;
                cell.innerText = val;
                cell.onclick = () => makeMove(i);
                b.appendChild(cell);
            });
        }

        function checkWin5(idx, s) {
            const r=Math.floor(idx/10), c=idx%10, dirs=[,,,[1,-1]];
            return dirs.some(([dr, dc]) => {
                let count = 1;
                [1, -1].forEach(d => {
                    for(let i=1; i<5; i++) {
                        let nr=r+dr*i*d, nc=c+dc*i*d;
                        if(nr>=0 && nr<10 && nc>=0 && nc<10 && boardData[nr*10+nc]===s) count++; else break;
                    }
                });
                return count >= 5;
            });
        }
    </script>
</body>
</html>
