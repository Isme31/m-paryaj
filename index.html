<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡ No Limit</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; }
        .hidden { display: none; } .screen { padding: 15px; }
        input, button, select { padding: 15px; margin: 5px; border-radius: 10px; width: 90%; max-width: 350px; border: none; font-size: 16px; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; max-width: 400px; margin: 10px auto; background: #444; border: 2px solid #444; }
        .cell { aspect-ratio: 1/1; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        #timer-box { background: #ff4757; color: white; padding: 10px; width: 100px; margin: 10px auto; border-radius: 20px; font-weight: bold; }
        .finance-box { background: #222; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">Konekte</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div style="background:#222; padding:10px; border-radius:10px;">
            <p>Balans: <span id="bal" style="color:#00ff00; font-weight:bold;">0</span> G</p>
            <div id="status">Pare pou jwe!</div>
        </div>

        <div id="timer-box" class="hidden">⏱️ <span id="timer-val">30</span>s</div>
        
        <div id="main-menu" style="margin-top:20px;">
            <p style="font-size:14px; color:#888;">Mize sa w vle (Min 50G):</p>
            <input type="number" id="bet-amount" value="50" min="50" style="width:100px; text-align:center;">
            <button id="matchBtn" onclick="findMatch()" style="background:#ff4757; height:80px; font-size:20px;">⚡ JWENN MATCH</button>
        </div>

        <div id="board" class="grid hidden"></div>

        <div class="finance-box">
            <div style="display:flex; justify-content:space-around; margin-bottom:10px; font-size:12px;">
                <div style="color:#ff4757;"><b>MonCash</b><br>31594645</div>
                <div style="color:#00ff00;"><b>Natcash</b><br>55110103</div>
            </div>
            <select id="dep-method" style="background:#333; color:white; width:95%;">
                <option value="MonCash">Sou MonCash</option>
                <option value="Natcash">Sou Natcash</option>
            </select>
            <input type="text" id="tid" placeholder="ID Tranzaksyon">
            <button onclick="voyeDepo()" style="background:#28a745; width:95%;">Voye Depo ✅</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(100).fill(""), timerInt, currentPrize = 0;

        async function login() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: document.getElementById('phone').value, password: document.getElementById('pass').value })
            });
            const data = await res.json();
            if(data.success) {
                myPhone = data.phone; document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            }
        }

        function startTimer() {
            clearInterval(timerInt);
            let timeLeft = 30;
            document.getElementById('timer-box').classList.remove('hidden');
            document.getElementById('timer-val').innerText = timeLeft;
            timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if(timeLeft <= 0) clearInterval(timerInt);
            }, 1000);
        }

        function findMatch() {
            const bet = parseFloat(document.getElementById('bet-amount').value);
            const bal = parseFloat(document.getElementById('bal').innerText);
            if(bet < 50 || bal < bet) return alert("Miz envalid oswa balans ba!");
            socket.emit('findMatch', { phone: myPhone, bet });
        }

        socket.on('gameStart', (data) => {
            currentRoom = data.room;
            currentPrize = data.prize;
            mySymbol = data.firstTurn === myPhone ? 'X' : 'O';
            myTurn = (data.firstTurn === myPhone);
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('board').classList.remove('hidden');
            document.getElementById('status').innerText = myTurn ? "Tou pa w!" : "Tann advèsè a...";
            if(myTurn) startTimer();
            renderBoard();
        });

        socket.on('opponentMove', (data) => {
            boardData[data.index] = data.symbol;
            myTurn = true; renderBoard();
            document.getElementById('status').innerText = "Tou pa w!";
            startTimer();
        });

        socket.on('timeout', (data) => {
            alert(data.loser === myPhone ? "⏰ Tan fini! Ou pèdi." : "🎉 Advèsè a pèdi tan! Ou ganyen.");
            location.reload();
        });

        function makeMove(i) {
            if(!myTurn || boardData[i] !== "") return;
            clearInterval(timerInt);
            document.getElementById('timer-box').classList.add('hidden');
            boardData[i] = mySymbol; myTurn = false; renderBoard();
            
            const players = currentRoom.replace('room_', '').split('_');
            const opponentPhone = players.find(p => p !== myPhone);

            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol, nextPlayer: opponentPhone, prize: currentPrize });
            
            if(checkWin5(i, mySymbol)) {
                socket.emit('win', { room: currentRoom, phone: myPhone, prize: currentPrize });
                alert("🎉 OU GANYEN " + currentPrize + "G!");
                location.reload();
            }
        }

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = `cell ${val.toLowerCase()}`; cell.innerText = val;
                cell.onclick = () => makeMove(i);
                b.appendChild(cell);
            });
        }

        function checkWin5(idx, s) {
            const r=Math.floor(idx/10), c=idx%10, dirs=[,,,[1,-1]];
            return dirs.some(([dr, dc]) => {
                let count = 1;
                [1, -1].forEach(d => {
                    for(let i=1; i<5; i++) {
                        let nr=r+dr*i*d, nc=c+dc*i*d;
                        if(nr>=0 && nr<10 && nc>=0 && nc<10 && boardData[nr*10+nc]===s) count++; else break;
                    }
                });
                return count >= 5;
            });
        }

        async function voyeDepo() {
            await fetch('/submit-deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: myPhone, tid: document.getElementById('tid').value, amount: 50, method: document.getElementById('dep-method').value })
            });
            alert("Depo voye!");
        }
        socket.on('balanceUpdate', (data) => { if(data.phone === myPhone) document.getElementById('bal').innerText = data.newBalance; });
        socket.on('status_update', (msg) => document.getElementById('status').innerText = msg);
        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
