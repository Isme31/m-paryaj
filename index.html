<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon 50G | Blitz</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .board { display: grid; grid-template-columns: repeat(15, 25px); gap: 2px; background: #1e293b; padding: 5px; border-radius: 8px; width: fit-content; margin: 0 auto; }
        .cell { width: 25px; height: 25px; background: #334155; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: bold; border-radius: 2px; }
        .cell.X { color: #f87171; text-shadow: 0 0 5px #ef4444; }
        .cell.O { color: #60a5fa; text-shadow: 0 0 5px #3b82f6; }
        .timer-bar { height: 4px; background: #22c55e; width: 100%; transition: width 1s linear; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN -->
    <div id="auth-screen" class="w-full max-w-md text-center">
        <h1 class="text-4xl font-bold mb-6 text-blue-400 italic">MOPYON 50G</h1>
        <div class="glass p-8 rounded-3xl shadow-2xl">
            <input type="text" id="phone" placeholder="Telefòn" class="w-full bg-slate-800 p-3 rounded-xl mb-4 text-white outline-none">
            <input type="password" id="password" placeholder="Modpas" class="w-full bg-slate-800 p-3 rounded-xl mb-6 text-white outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">ANTRE NAN JWÈT LA</button>
            <p id="auth-error" class="text-red-400 text-xs mt-4"></p>
        </div>
    </div>

    <!-- LOBBY -->
    <div id="lobby-screen" class="hidden text-center glass p-8 rounded-3xl w-full max-w-md">
        <h2 class="text-xl mb-4">Balans ou: <span id="user-balance" class="text-green-400">0 G</span></h2>
        <input type="text" id="room-id" placeholder="Kòd Chanm" class="w-full bg-slate-800 p-3 rounded-xl mb-4 text-center">
        <button onclick="placeBet()" class="w-full bg-green-600 py-4 rounded-xl font-bold shadow-lg">MIZE 50G (GAYAN: 90G)</button>
    </div>

    <!-- JWÈT -->
    <div id="game-screen" class="hidden w-full max-w-4xl text-center">
        <div class="glass p-3 rounded-2xl mb-4 max-w-xs mx-auto">
            <div id="status" class="font-bold text-sm mb-1 uppercase text-blue-400">Atann lòt la...</div>
            <div class="w-full bg-gray-700 h-1 rounded-full overflow-hidden">
                <div id="timer-visual" class="timer-bar"></div>
            </div>
        </div>
        <div class="flex justify-center overflow-auto"><div class="board" id="board"></div></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let userPhone = "", myRole = "", currentPlayer = "X", currentRoom = "";
        let board = Array(225).fill(null), timerInterval = null;

        async function handleLogin() {
            userPhone = document.getElementById('phone').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone, password: document.getElementById('password').value}) });
            const data = await res.json();
            if(data.success) {
                document.getElementById('user-balance').innerText = data.balance + " G";
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('lobby-screen').classList.remove('hidden');
            } else { document.getElementById('auth-error').innerText = data.message; }
        }

        async function placeBet() {
            currentRoom = document.getElementById('room-id').value;
            if(!currentRoom) return alert("Mete kòd la!");
            const res = await fetch('/bet', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone}) });
            const data = await res.json();
            if(data.success) {
                socket.emit('join-room', { roomCode: currentRoom, phone: userPhone });
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                createBoard();
            } else { alert(data.message); }
        }

        function createBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let i=0; i<225; i++) {
                const c = document.createElement('div'); c.className = 'cell'; c.id = "c-"+i;
                c.onclick = () => { if(!board[i] && myRole === currentPlayer) {
                    socket.emit('mouvman', { room: currentRoom, index: i, role: myRole });
                    makeMove(i, myRole);
                }};
                b.appendChild(c);
            }
        }

        function makeMove(i, player) {
            board[i] = player;
            const el = document.getElementById("c-"+i); el.innerText = player; el.classList.add(player);
            if(checkWin(i, player)) {
                clearInterval(timerInterval);
                if(player === myRole) socket.emit('game-over', { room: currentRoom, winner: myRole, winnerPhone: userPhone });
                return;
            }
            currentPlayer = (player === 'X' ? 'O' : 'X');
            updateStatus(); startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval); let time = 30;
            timerInterval = setInterval(() => {
                time--; document.getElementById('timer-visual').style.width = (time/30)*100 + "%";
                if(time <= 0) {
                    clearInterval(timerInterval);
                    if(currentPlayer === myRole) socket.emit('game-over', { room: currentRoom, winner: (myRole === 'X' ? 'O' : 'X') });
                }
            }, 1000);
        }

        function checkWin(idx, p) {
            const r = Math.floor(idx/15), c = idx%15, dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for(let [dr, dc] of dirs) {
                let cnt = 1;
                for(let i=1; i<5; i++) { let nr=r+dr*i, nc=c+dc*i; if(nr>=0&&nr<15&&nc>=0&&nc<15&&board[nr*15+nc]===p) cnt++; else break; }
                for(let i=1; i<5; i++) { let nr=r-dr*i, nc=c-dc*i; if(nr>=0&&nr<15&&nc>=0&&nc<15&&board[nr*15+nc]===p) cnt++; else break; }
                if(cnt >= 5) return true;
            }
            return false;
        }

        function updateStatus() {
            document.getElementById('status').innerText = (myRole === currentPlayer) ? "TOU PA W!" : "ATANN LÒT LA...";
        }

        socket.on('player-role', r => myRole = r);
        socket.on('start-game', s => { currentPlayer = s; updateStatus(); startTimer(); });
        socket.on('mouvman', d => { if(d.role !== myRole) makeMove(d.index, d.role); });
        socket.on('update-balance', d => { if(d.phone === userPhone) document.getElementById('user-balance').innerText = d.balance + " G"; });
        socket.on('reset', w => { alert("Gayan: " + w); location.reload(); });
        socket.on('player-left', () => { alert("Lòt la pati!"); location.reload(); });
    </script>
</body>
</html>
