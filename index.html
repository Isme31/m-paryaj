<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Domino & Mopyon Online</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --green: #00ff88; --red: #ff4444; --dark: #0a0a0a; --card: #161616; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--green); margin: 10px auto; max-width: 450px; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .btn { background: var(--green); color: black; padding: 14px; width: 90%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: var(--green); border: 2px solid var(--green); margin: 15px auto; max-width: 320px; }
        .cell { background: var(--card); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .status-bar { display: flex; justify-content: space-between; padding: 10px; font-size: 14px; color: var(--green); }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="login-box" class="card">
        <h1 style="color: var(--green); letter-spacing: 2px;">M-PARYAJ</h1>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas (Admin: Cricra31)">
        <button class="btn" onclick="konekte()">ANTRE</button>
    </div>

    <!-- 2. DASHBOARD KLIYAN -->
    <div id="game-box" class="card hidden">
        <div class="status-bar">
            <span>Balans: <b id="bal">0</b> HTG</span>
            <span>Online 🟢</span>
        </div>
        <button class="btn" onclick="louvriDepo()" style="background: gold;">METE KÒB (MONCASH/NATCASH)</button>
        <div style="display: flex; gap: 10px; margin: 15px 0;">
            <button class="btn" onclick="lanseLobby('Mopyon')" style="flex:1">❌ MOPYON</button>
            <button class="btn" onclick="lanseLobby('Domino')" style="flex:1">🀄 DOMINO</button>
        </div>
        <button class="btn" onclick="patajeJwet()" style="background:#25D366; color:white">PATAJE POU 15G BONIS</button>
        <hr border="0.1">
        <h4>Defye yon zanmi Online:</h4>
        <div id="moun-online"></div>
    </div>

    <!-- 3. PAJ DEPO (ID TRANSACTION) -->
    <div id="depo-box" class="card hidden">
        <h3>Depoze Kòb</h3>
        <p>Voye kòb la sou: <b>(509) 4XXX-XXXX</b></p>
        <input type="number" id="m-depo" placeholder="Montan HTG">
        <input type="text" id="t-id" placeholder="ID Transaksyon">
        <button class="btn" onclick="voyePrev()">KONFIME VOYE</button>
        <p onclick="femenDepo()" style="cursor:pointer; color:gray">Anile</p>
    </div>

    <!-- 4. ADMIN PANEL -->
    <div id="admin-box" class="card hidden" style="border-color: var(--red);">
        <h2 style="color:var(--red)">PANÈL ADMIN</h2>
        <div id="lis-depo">Pa gen demann depo...</div>
        <hr>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white">SOTI</button>
    </div>

    <!-- 5. EKRAN MOPYON 5 PWEN -->
    <div id="mopyon-box" class="card hidden">
        <h3 id="status-mopyon">Se tou: X</h3>
        <div id="grid" class="grid"></div>
        <p>Miz: <span id="miz-mop">0</span> HTG</p>
        <button class="btn" onclick="femenJwet()" style="background:#444; color:white">KITE JWÈT</button>
    </div>

    <script>
        // CONFIG FIREBASE
        const config = { databaseURL: "https://firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let mwen = "";
        let ganyanPousan = "X"; // Lojik: Ganyan an poze an premye
        let jwetFini = false;
        let board = Array(100).fill("");

        function konekte() {
            mwen = document.getElementById('tel').value;
            let p = document.getElementById('pass').value;
            if(p === "Cricra31") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-box').classList.remove('hidden');
                kouteDemannDepo();
            } else if(mwen.length >= 8) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                db.ref('status/' + mwen).set(true);
                db.ref('itilizate/' + mwen + '/balans').on('value', s => {
                    document.getElementById('bal').innerText = s.val() || 0;
                });
                lisOnline();
            }
        }

        // --- LOJIK DEPO ---
        function louvriDepo() { document.getElementById('depo-box').classList.remove('hidden'); }
        function femenDepo() { document.getElementById('depo-box').classList.add('hidden'); }
        
        function voyePrev() {
            let m = document.getElementById('m-depo').value;
            let id = document.getElementById('t-id').value;
            if(m && id) {
                db.ref('demann_depo').push({ tel: mwen, montan: m, id: id, status: "pantan" });
                alert("Prèv voye! Tann admin an valide l.");
                femenDepo();
            }
        }

        function kouteDemannDepo() {
            db.ref('demann_depo').on('value', s => {
                const lis = document.getElementById('lis-depo');
                lis.innerHTML = "<h4>Demann Depo:</h4>";
                s.forEach(c => {
                    let d = c.val();
                    if(d.status === "pantan") {
                        lis.innerHTML += `<div style="background:#222; margin:10px; padding:10px; border-radius:10px;">
                            ${d.tel} - ${d.montan}G (ID: ${d.id}) <br>
                            <button onclick="valideDepo('${c.key}','${d.tel}',${d.montan})">Wi</button>
                            <button onclick="db.ref('demann_depo/${c.key}').remove()">Non</button>
                        </div>`;
                    }
                });
            });
        }

        function valideDepo(key, tel, m) {
            db.ref('itilizate/' + tel + '/balans').transaction(b => (b || 0) + parseFloat(m));
            db.ref('demann_depo/' + key).update({ status: "ok" });
        }

        // --- LOJIK MOPYON 5 PWEN ---
        function lanseMopyon() {
            document.getElementById('game-box').classList.add('hidden');
            document.getElementById('mopyon-box').classList.remove('hidden');
            resetBoard();
        }

        function resetBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            board = Array(100).fill("");
            jwetFini = false;
            // Regleman: Moun ki te genyen an (ganyanPousan) kòmanse ankò
            document.getElementById('status-mopyon').innerText = "Se tou: " + ganyanPousan;
            for(let i=0; i<100; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => klikeMopyon(i);
                grid.appendChild(cell);
            }
        }

        function klikeMopyon(i) {
            if(board[i] !== "" || jwetFini) return;
            let cells = document.getElementsByClassName('cell');
            board[i] = ganyanPousan;
            cells[i].innerText = ganyanPousan;
            cells[i].style.color = (ganyanPousan === "X" ? "var(--green)" : "var(--red)");

            if(tcheke5Pwen(i)) {
                alert(ganyanPousan + " GANYEN! Li poze premye nan pwochen match la.");
                jwetFini = true;
                peyeGanyan(mwen); // Lojik peman ak 2% komisyon
            } else {
                ganyanPousan = (ganyanPousan === "X" ? "O" : "X");
                document.getElementById('status-mopyon').innerText = "Se tou: " + ganyanPousan;
            }
        }

        function tcheke5Pwen(idx) {
            const size = 10;
            const r = Math.floor(idx / size), c = idx % size;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for(let [dr, dc] of dirs) {
                let count = 1;
                for(let s of [1,-1]) {
                    for(let step=1; step<5; step++) {
                        let nr = r + dr*step*s, nc = c + dc*step*s;
                        if(nr>=0 && nr<size && nc>=0 && nc<size && board[nr*size+nc] === board[idx]) count++;
                        else break;
                    }
                }
                if(count >= 5) return true;
            }
            return false;
        }

        // --- DOMINO (PI GWO DOUB) ---
        function lanseDomino() {
            alert("Sistèm Domino: Moun ki gen pi gwo doub la (6-6) ap poze an premye otomatikman!");
            // Lojik distribisyon ak deteksyon doub dwe fèt isit la...
        }

        function patajeJwet() {
            const t = `Vini jwe M-PARYAJ avè m! Pataje pou 15G: ${window.location.href}`;
            window.open(`https://wa.me{encodeURIComponent(t)}`, '_blank');
            db.ref('itilizate/' + mwen + '/balans').transaction(b => (b || 0) + 15);
        }

        function lisOnline() {
            db.ref('status').on('value', s => {
                const div = document.getElementById('moun-online');
                div.innerHTML = "";
                s.forEach(c => { if(c.key !== mwen) div.innerHTML += `<p>${c.key} <button onclick="lanseMopyon()">Defye l (50G)</button></p>`; });
            });
        }
    </script>
</body>
</html>
