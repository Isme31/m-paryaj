
<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ V6</title>
    
    <!-- Nou itilize vèsyon sa a paske li pi estab sou GitHub -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 15px; }
        .box { background: #161616; padding: 20px; border-radius: 15px; border: 2px solid #00ff88; max-width: 350px; margin: auto; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #222; color: white; }
        button { background: #00ff88; color: black; padding: 14px; width: 95%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; margin: 15px auto; width: 300px; }
        .cell { width: 28px; height: 28px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2 style="color:#00ff88">M-PARYAJ V6</h2>
        <p id="net-status" style="color: orange; font-size: 11px;">Tcheke koneksyon... 📡</p>
        <input type="tel" id="tel-input" placeholder="Nimewo Telefòn">
        <input type="password" id="pass-input" placeholder="Modpas">
        <button onclick="konekte()">ANTRE</button>
    </div>

    <div id="game-box" class="box hidden">
        <p id="pwofil" style="color:#888; font-size: 12px;"></p>
        <h1 style="color:#ffcc00"><span id="balans-val">0</span> HTG</h1>
        <div id="msg" style="color:#00ff88; font-size: 13px;">Aliye 5 pou genyen!</div>
        <div class="grid" id="tablo"></div>
        <button onclick="location.reload()" style="background:#444; color:white;">SÒTI</button>
    </div>

    <script>
        // Konfigirasyon ou an
        const config = {
            apiKey: "AIzaSyDQN0XDlGG4XkijYW0Gx3yn9IqkbB4jMp8",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-paryaj",
            appId: "1:103993159961:web:0ebc12aebd2f3b05fc5588"
        };

        // Inisyalize Firebase san erè
        try {
            firebase.initializeApp(config);
            var db = firebase.database();
            document.getElementById('net-status').innerText = "Koneksyon OK ✅";
            document.getElementById('net-status').style.color = "#00ff88";
        } catch(e) {
            document.getElementById('net-status').innerText = "Erè Firebase! ❌";
        }

        function konekte() {
            const tel = document.getElementById('tel-input').value;
            const pass = document.getElementById('pass-input').value;
            if(!tel || !pass) return alert("Ranpli vid yo!");

            db.ref('itilizate/' + tel).once('value').then(snap => {
                if(!snap.exists()) {
                    db.ref('itilizate/' + tel).set({modpas: pass, balans: 50}).then(() => louvri(tel));
                } else if(snap.val().modpas === pass) {
                    louvri(tel);
                } else {
                    alert("Modpas la pa bon!");
                }
            });
        }

        function louvri(tel) {
            document.getElementById('login-box').style.display = "none";
            document.getElementById('game-box').classList.remove('hidden');
            document.getElementById('pwofil').innerText = "Nimewo: " + tel;
            db.ref('itilizate/' + tel + '/balans').on('value', s => {
                document.getElementById('balans-val').innerText = s.val() || 0;
            });
            kreyeTablo();
        }

        function kreyeTablo() {
            const t = document.getElementById('tablo');
            t.innerHTML = "";
            for(let i=0; i<100; i++) {
                let c = document.createElement('div');
                c.className = 'cell';
                c.onclick = function() { 
                    if(!this.innerText) {
                        this.innerText = "X"; 
                        this.style.color = "#00ff88";
                    }
                };
                t.appendChild(c);
            }
        }
    </script>
</body>
</html>
