<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon 50g | Elit Jwèt</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .board { display: grid; grid-template-columns: repeat(15, 25px); gap: 2px; background: #1e293b; padding: 10px; border-radius: 8px; }
        .cell { width: 25px; height: 25px; background: #334155; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; font-weight: bold; border-radius: 2px; }
        .cell.X { color: #f87171; text-shadow: 0 0 8px #ef4444; }
        .cell.O { color: #60a5fa; text-shadow: 0 0 8px #3b82f6; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="welcome-screen" class="text-center max-w-lg">
        <h1 class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">MOPYON 50G</h1>
        <button onclick="startGame()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">KÒMANSE JWE</button>
    </div>

    <div id="game-screen" class="hidden w-full max-w-4xl text-center">
        <div id="status" class="glass px-6 py-2 rounded-full font-bold mb-4">Chaje...</div>
        <div class="flex justify-center overflow-auto"><div class="board" id="board"></div></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const boardSize = 15;
        let board = Array(boardSize * boardSize).fill(null);
        let currentPlayer = '';

        socket.on('start-player', (player) => {
            if (!currentPlayer) {
                currentPlayer = player;
                updateStatus();
            }
        });

        function startGame() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            createBoard();
        }

        function createBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.onclick = () => makeMove(i, true);
                boardElement.appendChild(cell);
            }
        }

        function updateStatus() {
            const statusBox = document.getElementById('status');
            statusBox.innerText = "Tou pa: " + currentPlayer;
            statusBox.style.color = currentPlayer === 'X' ? '#f87171' : '#60a5fa';
        }

        function makeMove(index, emit = false) {
            if (board[index] || !currentPlayer) return;

            board[index] = currentPlayer;
            const cell = document.getElementById('board').children[index];
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer, 'animate-pop');

            if (checkWin(index)) {
                setTimeout(() => {
                    alert("🏆 " + currentPlayer + " genyen!");
                    socket.emit('game-over', currentPlayer);
                }, 100);
                return;
            }

            if (emit) socket.emit('mouvman', { index, player: currentPlayer });
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateStatus();
        }

        function checkWin(index) {
            const r = Math.floor(index / boardSize), c = index % boardSize;
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            for (let [dr, dc] of directions) {
                let count = 1;
                for (let i = 1; i < 5; i++) {
                    let nr = r + dr*i, nc = c + dc*i;
                    if (nr>=0 && nr<boardSize && nc>=0 && nc<boardSize && board[nr*boardSize+nc] === currentPlayer) count++; else break;
                }
                for (let i = 1; i < 5; i++) {
                    let nr = r - dr*i, nc = c - dc*i;
                    if (nr>=0 && nr<boardSize && nc>=0 && nc<boardSize && board[nr*boardSize+nc] === currentPlayer) count++; else break;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        socket.on('mouvman', (data) => {
            currentPlayer = data.player;
            makeMove(data.index, false);
        });

        socket.on('reset', (nextStartPlayer) => {
            board = Array(boardSize * boardSize).fill(null);
            currentPlayer = nextStartPlayer;
            createBoard();
            updateStatus();
        });
    </script>
</body>
</html>
