<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Domino & Mopion</title>
    
    <!-- Libreri Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --neon: #00ff88; --gold: #ffcc00; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .card { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 320px; margin: 15px auto; }
        .cell { background: #222; height: 55px; border: 1px solid var(--neon); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .btn { background: var(--neon); color: black; padding: 12px; width: 95%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .hidden { display: none; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2 style="color:var(--neon)">M-PARYAJ</h2>
        <input type="tel" id="userPhone" placeholder="Nimewo Telefòn">
        <input type="password" id="userPass" placeholder="Modpas (Cricra31)">
        <button class="btn" onclick="login()">ANTRE</button>
    </div>

    <div id="admin-screen" class="hidden">
        <div class="card" style="border-color: red;">
            <h2 style="color: red;">ADMIN</h2>
            <input type="tel" id="targetPhone" placeholder="Nimewo Kliyan">
            <input type="number" id="addAmount" placeholder="Montan">
            <button class="btn" style="background:red; color:white;" onclick="adminAjouteKob()">METE KÒB</button>
            <button class="btn" onclick="location.reload()">SOTI</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="card">
            <div style="font-size: 1.5rem;">Balans: <span id="valBalans" style="color:var(--neon)">0</span> HTG</div>
        </div>
        <div class="card">
            <h3>MÒPYON</h3>
            <div id="board" class="grid"></div>
            <p id="info">Tou pa: X</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://firebaseio.com" };
        
        // Eseye inisyalize Firebase san l pa bloke paj la
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
        } catch(e) { console.log("Firebase pa konekte, n ap itilize mòd lokal"); }

        let currentUser = "";
        let board = Array(25).fill("");
        let turn = "X";

        function login() {
            let p = document.getElementById('userPhone').value;
            let m = document.getElementById('userPass').value;
            if(m === "Cricra31") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
            } else if(p.length >= 8) {
                currentUser = p;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                initBoard();
                if(db) syncBalans();
            }
        }

        function syncBalans() {
            db.ref('itilizate/' + currentUser).on('value', (snap) => {
                let data = snap.val();
                document.getElementById('valBalans').innerText = data ? (data.balans || 0) : 0;
            });
        }

        function adminAjouteKob() {
            let tel = document.getElementById('targetPhone').value;
            let mnt = parseInt(document.getElementById('addAmount').value);
            if(db && tel && mnt) {
                db.ref('itilizate/' + tel).once('value').then(snap => {
                    let ansyen = (snap.val() && snap.val().balans) ? snap.val().balans : 0;
                    db.ref('itilizate/' + tel).update({ balans: ansyen + mnt });
                    alert("Kòb la ajoute!");
                });
            }
        }

        function initBoard() {
            const bDiv = document.getElementById('board');
            bDiv.innerHTML = "";
            board.forEach((v, i) => {
                let c = document.createElement('div');
                c.className = 'cell';
                c.innerText = v;
                c.onclick = () => {
                    if(board[i] === "") {
                        board[i] = turn;
                        initBoard();
                        if(checkWin(turn)) {
                            alert("Ou Genyen!");
                            resetBoard();
                        } else {
                            turn = (turn === "X") ? "O" : "X";
                            document.getElementById('info').innerText = "Tou pa: " + turn;
                        }
                    }
                };
                bDiv.appendChild(c);
            });
        }

        function checkWin(p) {
            for(let i=0; i<5; i++) {
                let r = i*5;
                if(board[r]===p && board[r+1]===p && board[r+2]===p && board[r+3]===p && board[r+4]===p) return true;
                if(board[i]===p && board[i+5]===p && board[i+10]===p && board[i+15]===p && board[i+20]===p) return true;
            }
            return false;
        }

        function resetBoard() { board = Array(25).fill(""); turn = "X"; initBoard(); }
    </script>
</body>
</html>
