<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ TEST</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .kad { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .btn { background: #00ff88; color: black; padding: 15px; width: 85%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        #bal { color: #ffcc00; font-size: 30px; }
    </style>
</head>
<body>

    <div id="login-box" class="kad">
        <h1>M-PARYAJ</h1>
        <p>Antre nenpòt modpas (pa mete Cricra31)</p>
        <input type="tel" id="tel" placeholder="Nimewo">
        <input type="password" id="pass" placeholder="Modpas">
        <button class="btn" onclick="konekte()">ANTRE JWE</button>
    </div>

    <div id="game-box" class="kad hidden">
        <h1>DASHBOARD JWÈT</h1>
        <div id="bal">0 HTG</div>
        <p>Bouton jwèt yo ap parèt isit la!</p>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white;">SÒTI</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQN0XDlGG4XkijYW0Gx3yn9IqkbB4jMp8", 
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function konekte() {
            let t = document.getElementById('tel').value;
            let p = document.getElementById('pass').value;

            if(t == "" || p == "") { alert("Ranpli bwat yo!"); return; }

            // SI SE MODPAS ADMIN, L AP BLOKE W NAN ADMIN PANEL
            if(p === "Cricra31") {
                alert("Ou antre kòm Admin. Pou w jwe, sèvi ak yon lòt modpas.");
                return;
            }

            // FÒSE OUVRI POU N WÈ SI SA MACHE
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('game-box').classList.remove('hidden');

            // Kreye kont lan nan Firebase
            db.ref('itilizate/' + t).once('value').then(s => {
                if(!s.exists()) {
                    db.ref('itilizate/' + t).set({modpas: p, balans: 0});
                }
                db.ref('itilizate/' + t + '/balans').on('value', snap => {
                    document.getElementById('bal').innerText = (snap.val() || 0) + " HTG";
                });
            });
        }
    </script>
</body>
</html>
