<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon 50G</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .board { display: grid; grid-template-columns: repeat(15, 25px); gap: 2px; background: #1e293b; padding: 5px; border-radius: 8px; width: fit-content; margin: 0 auto; }
        .cell { width: 25px; height: 25px; background: #334155; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: bold; }
        .cell.X { color: #f87171; } .cell.O { color: #60a5fa; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN -->
    <div id="auth-screen" class="w-full max-w-md">
        <h1 class="text-4xl font-bold mb-6 text-blue-400 italic">MOPYON 50G</h1>
        <div class="glass p-8 rounded-3xl">
            <input type="text" id="phone" placeholder="Telefòn" class="w-full bg-slate-800 p-3 rounded-xl mb-4 outline-none">
            <input type="password" id="password" placeholder="Modpas" class="w-full bg-slate-800 p-3 rounded-xl mb-6 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">ANTRE</button>
            <p id="auth-error" class="text-red-400 text-xs mt-4"></p>
        </div>
    </div>

    <!-- LOBBY -->
    <div id="lobby-screen" class="hidden glass p-8 rounded-3xl w-full max-w-md">
        <h2 class="text-xl mb-4 font-bold">Balans: <span id="user-balance" class="text-green-400">0 G</span></h2>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <button onclick="generateRoom()" class="bg-blue-600/30 border border-blue-500 py-3 rounded-xl">KREYE KÒD</button>
            <button onclick="showJoin()" class="bg-purple-600/30 border border-purple-500 py-3 rounded-xl">ANTRE KÒD</button>
        </div>
        <div id="room-controls" class="hidden mb-6">
            <input type="text" id="room-id" placeholder="Kòd Chanm" class="w-full bg-slate-800 p-3 rounded-xl mb-4 text-center border border-blue-500">
            <button onclick="placeBet()" class="w-full bg-green-600 py-4 rounded-xl font-bold">MIZE 50G & JWE</button>
        </div>
        
        <!-- DEPO & RETRÈ -->
        <div class="grid grid-cols-2 gap-4 border-t border-gray-700 pt-4">
            <div>
                <p class="text-[10px] text-gray-500 mb-1">DEPO</p>
                <input id="depo-amount" placeholder="Goud" class="w-full bg-slate-800 p-1 rounded text-xs mb-1">
                <input id="depo-id" placeholder="ID" class="w-full bg-slate-800 p-1 rounded text-xs mb-1">
                <button onclick="sendDeposit()" class="w-full bg-orange-600 py-1 rounded text-[10px]">VOYE</button>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 mb-1">RETRÈ</p>
                <input id="retrait-amount" placeholder="Goud" class="w-full bg-slate-800 p-1 rounded text-xs mb-1">
                <select id="retrait-method" class="w-full bg-slate-800 p-1 rounded text-[10px] mb-1 text-white">
                    <option value="31594645">31594645 (MC)</option>
                    <option value="55110103">55110103 (NC)</option>
                </select>
                <button onclick="sendWithdrawal()" class="w-full bg-blue-600 py-1 rounded text-[10px]">MANDE</button>
            </div>
        </div>
    </div>

    <!-- JWÈT -->
    <div id="game-screen" class="hidden w-full">
        <div id="status" class="mb-4 font-bold text-blue-400">ATANN LÒT LA...</div>
        <div class="flex justify-center"><div class="board" id="board"></div></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let userPhone = "", myRole = "", currentPlayer = "", currentRoom = "", board = Array(225).fill(null);

        async function handleLogin() {
            userPhone = document.getElementById('phone').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone, password: document.getElementById('password').value}) });
            const data = await res.json();
            if(data.success) {
                document.getElementById('user-balance').innerText = data.balance + " G";
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('lobby-screen').classList.remove('hidden');
            }
        }

        function generateRoom() {
            document.getElementById('room-id').value = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('room-controls').classList.remove('hidden');
        }

        function showJoin() { document.getElementById('room-controls').classList.remove('hidden'); }

        async function placeBet() {
            currentRoom = document.getElementById('room-id').value;
            const res = await fetch('/bet', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone}) });
            const data = await res.json();
            if(data.success) {
                socket.emit('join-room', { roomCode: currentRoom, phone: userPhone });
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                createBoard();
            } else alert(data.message);
        }

        async function sendDeposit() {
            const amount = document.getElementById('depo-amount').value;
            const transactionId = document.getElementById('depo-id').value;
            await fetch('/request-deposit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone, amount, transactionId}) });
            alert("Voye!");
        }

        async function sendWithdrawal() {
            const amount = document.getElementById('retrait-amount').value;
            const method = document.getElementById('retrait-method').value;
            const res = await fetch('/request-withdrawal', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone, amount, method}) });
            const data = await res.json();
            if(data.success) { document.getElementById('user-balance').innerText = data.newBalance + " G"; alert(data.message); }
            else alert(data.message);
        }

        function createBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let i=0; i<225; i++) {
                const c = document.createElement('div'); c.className = 'cell'; c.id = "c-"+i;
                c.onclick = () => {
                    if(!board[i] && currentPlayer === myRole) {
                        makeMove(i, myRole);
                        socket.emit('mouvman', { room: currentRoom, index: i, role: myRole });
                    }
                };
                b.appendChild(c);
            }
        }

        function makeMove(i, role) {
            board[i] = role;
            const cell = document.getElementById("c-"+i);
            cell.innerText = role; cell.classList.add(role);
            if(checkWin(i, role)) {
                socket.emit('game-over', { room: currentRoom, winnerPhone: userPhone });
                alert("OU GENYEN!");
            }
            currentPlayer = (role === 'X') ? 'O' : 'X';
            document.getElementById('status').innerText = (currentPlayer === myRole) ? "TOU PAW!" : "TOU LÒT LA...";
        }

        function checkWin(index, role) {
            const size = 15;
            const r = Math.floor(index / size), c = index % size;
            const dirs = [[0,1], [1,0], [1,1], [1,-1]];
            for(let [dr, dc] of dirs) {
                let count = 1;
                for(let i=1; i<5; i++) {
                    let nr = r+dr*i, nc = c+dc*i;
                    if(nr>=0 && nr<size && nc>=0 && nc<size && board[nr*size+nc] === role) count++; else break;
                }
                for(let i=1; i<5; i++) {
                    let nr = r-dr*i, nc = c-dc*i;
                    if(nr>=0 && nr<size && nc>=0 && nc<size && board[nr*size+nc] === role) count++; else break;
                }
                if(count >= 5) return true;
            }
            return false;
        }

        socket.on('player-role', r => myRole = r);
        socket.on('start-game', startRole => { currentPlayer = startRole; document.getElementById('status').innerText = (myRole === 'X') ? "OU SE X (KÒMANSE!)" : "OU SE O (TANN...)"; });
        socket.on('mouvman', data => makeMove(data.index, data.role));
        socket.on('update-balance', data => { if(data.phone === userPhone) document.getElementById('user-balance').innerText = data.balance + " G"; });
        socket.on('reset', () => { setTimeout(() => location.reload(), 3000); });
    </script>
</body>
</html>
