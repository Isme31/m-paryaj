<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Domino & Mopyon</title>
    <!-- Libreri Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #00ff88; margin: 20px auto; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #00ff88; }
        .btn { background: #00ff88; color: black; padding: 15px; width: 95%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #00cc6e; transform: scale(1.03); }
        .hidden { display: none; }
        .balans-box { font-size: 32px; font-weight: bold; margin: 20px 0; color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .grid-jwet { display: flex; gap: 15px; margin-top: 20px; }
        .jwet-card { background: #222; padding: 20px; border-radius: 15px; border: 1px solid #333; flex: 1; cursor: pointer; transition: 0.3s; }
        .jwet-card:hover { border-color: #00ff88; background: #2a2a2a; }
        .icon { font-size: 40px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- 1. PAJ KONEKSYON -->
    <div id="login-box" class="card">
        <h1 style="color: #00ff88; letter-spacing: 2px;">M-PARYAJ</h1>
        <p style="color: #888;">Antre enfòmasyon ou yo</p>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas (Cricra31 pou Admin)">
        <button class="btn" onclick="antre()">KONEKTE</button>
    </div>

    <!-- 2. PAJ ADMIN -->
    <div id="admin-box" class="card hidden" style="border-color: #ff4444;">
        <h2 style="color:#ff4444">PANÈL ADMIN</h2>
        <p>Mete kòb sou kont kliyan</p>
        <input type="tel" id="kliyan" placeholder="Nimewo Telefòn Kliyan">
        <input type="number" id="kob" placeholder="Montan HTG">
        <button class="btn" style="background:#ff4444" onclick="ajoute()">KONFIME DEPO</button>
        <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:15px;">Soti</button>
    </div>

    <!-- 3. PAJ JWÈT / KLIYAN -->
    <div id="game-box" class="card hidden">
        <h2 id="user-display" style="font-size: 18px; color: #888;">Byenvini</h2>
        <p>Balans ou kounye a:</p>
        <div class="balans-box"><span id="bal">0</span> HTG</div>
        
        <div class="grid-jwet">
            <div class="jwet-card" onclick="lanseJwet('Mopyon')">
                <span class="icon">❌</span>
                <span>MOPYON</span>
            </div>
            <div class="jwet-card" onclick="lanseJwet('Domino')">
                <span class="icon">🀄</span>
                <span>DOMINO</span>
            </div>
        </div>

        <button class="btn" style="background:#333; color:white; margin-top:30px;" onclick="location.reload()">DEKONEKTE</button>
    </div>

    <script>
        // Konfigirasyon Firebase
        const config = { databaseURL: "https://firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function antre() {
            let t = document.getElementById('tel').value;
            let p = document.getElementById('pass').value;

            // Tcheke si se Admin
            if(p === "Cricra31") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-box').classList.remove('hidden');
            } 
            // Tcheke si se Kliyan (Nimewo a dwe gen 8 chif omwen)
            else if(t.length >= 8) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                document.getElementById('user-display').innerText = "Kliyan: " + t;
                
                // Konekte ak Balans lan nan Firebase
                db.ref('itilizate/' + t).on('value', (snapshot) => {
                    let data = snapshot.val();
                    document.getElementById('bal').innerText = data ? (data.balans || 0) : 0;
                });
            } else {
                alert("Erè: Antre yon nimewo valid oswa bon modpas la.");
            }
        }

        function ajoute() {
            let k = document.getElementById('kliyan').value;
            let m = parseFloat(document.getElementById('kob').value);

            if(k.length >= 8 && m > 0) {
                let ref = db.ref('itilizate/' + k);
                ref.once('value').then(snap => {
                    let balansAtyèl = (snap.exists() && snap.val().balans) ? parseFloat(snap.val().balans) : 0;
                    ref.update({ 
                        balans: balansAtyèl + m,
                        date: new Date().toLocaleString()
                    }).then(() => {
                        alert("Siksè! " + m + " HTG ajoute pou " + k);
                        document.getElementById('kob').value = "";
                    });
                });
            } else {
                alert("Ranpli tout bwat yo kòrèkteman.");
            }
        }

        function lanseJwet(nonJwet) {
            let kòb = parseFloat(document.getElementById('bal').innerText);
            if(kòb <= 0) {
                alert("Ou pa gen ase kòb pou w jwe. Kontakte admin an!");
            } else {
                alert("W ap antre nan " + nonJwet + ". Prepare w!");
                // Isit la wa mete lyen paj jwèt la: window.location.href = nonJwet.toLowerCase() + ".html";
            }
        }
    </script>
</body>
</html>
