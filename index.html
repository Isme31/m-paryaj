<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let uPhone="", uPass="", myBalance=0;

    async function handleLogin() {
        uPhone = document.getElementById('phone').value;
        uPass = document.getElementById('password').value;
        const res = await fetch('/login', { 
            method:'POST', 
            headers:{'Content-Type':'application/json'}, 
            body: JSON.stringify({phone: uPhone, password: uPass}) 
        });
        const data = await res.json();
        if(data.success) {
            myBalance = data.balance;
            document.getElementById('user-balance').innerText = myBalance;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        } else { alert(data.message); }
    }

    async function doDepo() {
        const amount = document.getElementById('d-amt').value;
        const transactionId = document.getElementById('d-id').value;
        if(!amount || !transactionId) return alert("Ranpli tout bwat yo!");
        
        const res = await fetch('/request-deposit', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({phone: uPhone, amount, transactionId})
        });
        const data = await res.json();
        if(data.success) alert("Depo voye! Tann admin konfime.");
        else alert(data.message);
    }

    async function doWithdraw() {
        const amount = document.getElementById('w-amt').value;
        const method = document.getElementById('w-meth').value;
        if(amount < 100) return alert("Minimòm se 100G");
        
        const res = await fetch('/request-withdrawal', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({phone: uPhone, password: uPass, amount, method})
        });
        const data = await res.json();
        if(data.success) {
            alert("Retrè voye!");
            document.getElementById('user-balance').innerText = data.newBalance;
        } else { alert("Erè nan balans ou!"); }
    }
    // ... (Ajoute rès lojik jwèt la isit la)
</script>
