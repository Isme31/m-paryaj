<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Ofisyèl</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --vè: #00ff88; --wouj: #ff4444; --nwa: #0a0a0a; --kad: #161616; --ò: #ffcc00; }
        body { background: var(--nwa); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .kad { background: var(--kad); padding: 20px; border-radius: 15px; border: 1px solid var(--vè); margin: 10px auto; max-width: 420px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 16px; }
        .btn { background: var(--vè); color: black; padding: 14px; width: 95%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: var(--vè); border: 2px solid var(--vè); margin: 15px auto; max-width: 320px; }
        .cell { background: var(--kad); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .balans-box { display: flex; justify-content: space-between; padding: 12px; background: #222; border-radius: 10px; border: 1px solid #444; margin-bottom: 15px; }
        .admin-item { background: #333; padding: 10px; margin: 10px 0; border-radius: 8px; text-align: left; border-left: 5px solid var(--vè); }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="login-box" class="kad">
        <h1 style="color: var(--vè);">M-PARYAJ</h1>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button class="btn" onclick="konekte()">KONEKTE</button>
    </div>

    <!-- 2. DASHBOARD JWÈ -->
    <div id="game-box" class="kad hidden">
        <div class="balans-box">
            <span>Balans: <b id="bal" style="color:var(--vè)">0</b> HTG</span>
            <span style="color: var(--vè);">● Online</span>
        </div>
        <div style="display: flex; gap: 5px;">
            <button class="btn" onclick="voyeDemann('DEPO')" style="background: var(--ò); font-size: 12px;">DEPOZE (50G)</button>
            <button class="btn" onclick="voyeDemann('RETRÈ')" style="background: white; font-size: 12px;">RETIRE</button>
        </div>
        <button class="btn" onclick="lanseM()" style="margin-top:20px;">❌ JWE MOPYON</button>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white; margin-top:20px;">SÒTI</button>
    </div>

    <!-- 3. ADMIN PANEL -->
    <div id="admin-box" class="kad hidden" style="border-color: var(--wouj);">
        <h2 style="color: var(--wouj);">PANEL ADMIN</h2>
        <div id="admin-list">Chaje demann yo...</div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white; margin-top:20px;">DEKONEKTE</button>
    </div>

    <!-- 4. MOPYON -->
    <div id="mopyon-box" class="kad hidden">
        <h3 id="status-m">Se tou: X</h3>
        <div id="grid" class="grid"></div>
        <button class="btn" onclick="tounenDashboard()" style="background:#444; color:white">KITE</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQN0XDlGG4XkijYW0Gx3yn9IqkbB4jMp8", 
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mwen = "", tour = "X", jwetFini = false, board = Array(100).fill("");

        function konekte() {
            let tel = document.getElementById('tel').value.trim();
            let p = document.getElementById('pass').value.trim();

            if(p === "Cricra31") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-box').classList.remove('hidden');
                kouteAdmin();
            } else if(tel.length >= 8 && p !== "") {
                mwen = tel;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                db.ref('itilizate/' + mwen + '/balans').on('value', s => {
                    document.getElementById('bal').innerText = s.val() || 0;
                });
            } else { alert("Nimewo oswa Modpas pa bon!"); }
        }

        function voyeDemann(tip) {
            let m = tip === 'DEPO' ? 50 : prompt("Konbe ou vle retire?");
            if(m >= 50) {
                db.ref('demann').push({ tip: tip, tel: mwen, montan: parseInt(m), status: "pantan" });
                alert("Demann voye bay Admin!");
            }
        }

        function kouteAdmin() {
            db.ref('demann').on('value', s => {
                const lis = document.getElementById('admin-list');
                lis.innerHTML = "";
                if(!s.exists()) { lis.innerHTML = "Pa gen demann."; return; }

                s.forEach(c => {
                    let d = c.val();
                    let div = document.createElement('div');
                    div.className = "admin-item";
                    div.innerHTML = `
                        <b>${d.tip}</b> - ${d.tel}<br>
                        Montan: ${d.montan}G<br>
                        <button class="btn" style="width:100px; padding:5px; font-size:12px;" onclick="ok('${c.key}','${d.tel}',${d.montan},'${d.tip}')">OK</button>
                    `;
                    lis.appendChild(div);
                });
            });
        }

        function ok(key, tel, m, tip) {
            if(tip === "DEPO") {
                db.ref('itilizate/' + tel + '/balans').transaction(b => (b || 0) + m);
            } else {
                db.ref('itilizate/' + tel + '/balans').transaction(b => (b || 0) - m);
            }
            db.ref('demann/' + key).remove();
            alert("Tranzaksyon fini!");
        }

        function lanseM() {
            document.getElementById('game-box').classList.add('hidden');
            document.getElementById('mopyon-box').classList.remove('hidden');
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for(let i=0; i<100; i++) {
                let c = document.createElement('div'); c.className = 'cell';
                c.onclick = () => {
                    if(board[i] !== "" || jwetFini) return;
                    board[i] = tour; c.innerText = tour;
                    c.style.color = tour === "X" ? "var(--vè)" : "var(--wouj)";
                    tour = tour === "X" ? "O" : "X"; 
                    document.getElementById('status-m').innerText = "Se tou: " + tour;
                };
                grid.appendChild(c);
            }
        }

        function tounenDashboard() {
            document.getElementById('mopyon-box').classList.add('hidden');
            document.getElementById('game-box').classList.remove('hidden');
        }
    </script>
</body>
</html>
