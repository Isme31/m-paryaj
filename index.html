<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ | Ofisyèl</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --vè: #00ff88; --wouj: #ff4444; --nwa: #0a0a0a; --kad: #161616; --ò: #ffcc00; }
        body { background: var(--nwa); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .kad { background: var(--kad); padding: 20px; border-radius: 15px; border: 1px solid var(--vè); margin: 10px auto; max-width: 420px; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        input, select { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: var(--vè); }
        .btn { background: var(--vè); color: black; padding: 14px; width: 90%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: var(--vè); border: 2px solid var(--vè); margin: 15px auto; max-width: 320px; }
        .cell { background: var(--kad); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .balans-box { display: flex; justify-content: space-between; padding: 12px; background: #222; border-radius: 10px; border: 1px solid #444; margin-bottom: 15px; }
        .admin-item { background: #2a2a2a; padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 5px solid var(--wouj); text-align: left; font-size: 14px; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-box" class="kad">
        <h1 style="color: var(--vè); letter-spacing: 2px;">M-PARYAJ</h1>
        <p style="color: #888;">Antre nimewo telefòn ou pou kòmanse</p>
        <input type="tel" id="tel" placeholder="Nimewo (Ex: 48000000)">
        <input type="password" id="pass" placeholder="Modpas (Admin: Cricra31)">
        <button class="btn" onclick="konekte()">KONEKTE</button>
    </div>

    <!-- DASHBOARD KLIYAN -->
    <div id="game-box" class="kad hidden">
        <div class="balans-box">
            <span>Balans: <b id="bal" style="color:var(--vè)">0</b> HTG</span>
            <span style="color: var(--vè);">● Online</span>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn" onclick="louvriSeksyon('depo')" style="background: var(--ò); font-size: 14px;">DEPOZE</button>
            <button class="btn" onclick="louvriSeksyon('retre')" style="background: white; font-size: 14px;">RETIRE</button>
        </div>

        <div id="s-depo" class="hidden" style="border: 1px dashed var(--ò); padding: 10px; border-radius: 10px; margin-bottom: 15px;">
            <p style="font-size: 13px;">Voye kòb la sou: <b>4XXX-XXXX</b></p>
            <input type="number" id="m-depo" placeholder="Montan (Min 50G)">
            <input type="text" id="t-id" placeholder="ID Transaksyon">
            <button class="btn" onclick="voyeDepo()">KONFIME DEPO</button>
        </div>

        <div id="s-retre" class="hidden" style="border: 1px dashed white; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
            <input type="number" id="m-retre" placeholder="Montan pou retire">
            <select id="metod-retre">
                <option value="MonCash">MonCash</option>
                <option value="NatCash">NatCash</option>
            </select>
            <button class="btn" style="background:white;" onclick="voyeRetre()">MANDE RETRÈ</button>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn" onclick="lanseLobby('Mopyon')" style="flex:1">❌ MOPYON</button>
            <button class="btn" onclick="alert('Domino ap louvri talè...')" style="flex:1">🀄 DOMINO</button>
        </div>
        <button class="btn" onclick="pataje()" style="background:#25D366; color:white; margin-top:15px;">PATAJE (+15G BONIS)</button>
        <hr border="0.1" style="margin: 20px 0; opacity: 0.2;">
        <div id="lis-online"></div>
    </div>

    <!-- ADMIN -->
    <div id="admin-box" class="kad hidden" style="border-color: var(--wouj);">
        <h2 style="color: var(--wouj);">PANÈL ADMIN</h2>
        <p>Pwofi Komisyon (2%): <b id="admin-pwofi" style="color:var(--vè)">0</b> HTG</p>
        <div id="admin-list" style="max-height: 300px; overflow-y: auto;">Chaje demann...</div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white; margin-top:20px;">SÒTI</button>
    </div>

    <!-- MOPYON 5 PWEN -->
    <div id="mopyon-box" class="kad hidden">
        <h3 id="status-mopyon">Se tou: X</h3>
        <div id="grid" class="grid"></div>
        <p>Miz Fiks: <span style="color:var(--vè)">50 HTG</span></p>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white">KITE</button>
    </div>

    <script>
        // --- CONFIG OU A ---
        const firebaseConfig = {
            apiKey: "123456789",
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mwen = "";
        let ganyanDerye = "X"; 
        let board = Array(100).fill("");
        let jwetFini = false;

        function konekte() {
            mwen = document.getElementById('tel').value;
            let p = document.getElementById('pass').value.trim();

            if(p === "Cricra31") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-box').classList.remove('hidden');
                kouteAdmin();
            } else if(mwen.length >= 8) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                db.ref('status/' + mwen).set(true);
                db.ref('itilizate/' + mwen + '/balans').on('value', s => {
                    document.getElementById('bal').innerText = s.val() || 0;
                });
                kouteMounOnline();
            } else { alert("Nimewo a dwe gen omwen 8 chif!"); }
        }

        function louvriSeksyon(s) {
            document.getElementById('s-depo').classList.add('hidden');
            document.getElementById('s-retre').classList.add('hidden');
            if(s) document.getElementById('s-' + s).classList.remove('hidden');
        }

        function voyeDepo() {
            let m = parseFloat(document.getElementById('m-depo').value);
            let id = document.getElementById('t-id').value;
            if(m >= 50 && id) {
                db.ref('demann').push({ tip: "DEPO", tel: mwen, montan: m, tranzaksyon: id, status: "pantan" });
                alert("Prèv voye bay Admin!");
                louvriSeksyon('');
            } else { alert("Ranpli tout bwat yo (Min 50G)!"); }
        }

        function voyeRetre() {
            let m = parseFloat(document.getElementById('m-retre').value);
            let bal = parseFloat(document.getElementById('bal').innerText);
            let metod = document.getElementById('metod-retre').value;
            if(m >= 50 && m <= bal) {
                db.ref('itilizate/' + mwen + '/balans').transaction(b => b - m);
                db.ref('demann').push({ tip: "RETRÈ", tel: mwen, montan: m, metod: metod, status: "pantan" });
                alert("Demann retrè voye!");
                louvriSeksyon('');
            } else { alert("Balans ou pa ase (Min 50G)!"); }
        }

        function kouteAdmin() {
            db.ref('demann').on('value', s => {
                const lis = document.getElementById('admin-list');
                lis.innerHTML = "";
                s.forEach(c => {
                    let d = c.val();
                    if(d.status === "pantan") {
                        let div = document.createElement('div');
                        div.className = "admin-item";
                        div.innerHTML = `<b>${d.tip}</b>: ${d.tel} <br> ${d.montan}G | ${d.tranzaksyon || d.metod} <br>
                            <button class="btn" style="width:45%; padding:5px; margin-top:5px;" onclick="aprouve('${c.key}', '${d.tel}', ${d.montan}, '${d.tip}')">OK</button>
                            <button class="btn" style="width:45%; padding:5px; background:var(--wouj); color:white;" onclick="db.ref('demann/${c.key}').remove()">REFID</button>`;
                        lis.appendChild(div);
                    }
                });
            });
            db.ref('admin/pwofi').on('value', s => document.getElementById('admin-pwofi').innerText = s.val() || 0);
        }

        function aprouve(key, tel, m, tip) {
            if(tip === "DEPO") db.ref('itilizate/' + tel + '/balans').transaction(b => (b || 0) + m);
            db.ref('demann/' + key).update({ status: "fini" });
        }

        function lanseLobby(tip) {
            let bal = parseFloat(document.getElementById('bal').innerText);
            if(bal < 50) return alert("Ou bezwen 50G minimum!");
            document.getElementById('game-box').classList.add('hidden');
            document.getElementById('mopyon-box').classList.remove('hidden');
            kreyeTablo();
        }

        function kreyeTablo() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ""; board = Array(100).fill(""); jwetFini = false;
            document.getElementById('status-mopyon').innerText = "Se tou: " + ganyanDerye;
            for(let i=0; i<100; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => jwe(i);
                grid.appendChild(cell);
            }
        }

        function jwe(i) {
            if(board[i] !== "" || jwetFini) return;
            board[i] = ganyanDerye;
            document.getElementsByClassName('cell')[i].innerText = ganyanDerye;
            document.getElementsByClassName('cell')[i].style.color = (ganyanDerye === "X" ? "var(--vè)" : "var(--wouj)");
            if(tcheke(i)) {
                alert(ganyanDerye + " GANYEN! Li poze premye nan pwochen match la.");
                jwetFini = true;
                db.ref('itilizate/' + mwen + '/balans').transaction(b => b + 49); // 50G - 2% (1G) = 49G
                db.ref('admin/pwofi').transaction(p => (p || 0) + 1);
            } else {
                ganyanDerye = (ganyanDerye === "X" ? "O" : "X");
                document.getElementById('status-mopyon').innerText = "Se tou: " + ganyanDerye;
            }
        }

        function tcheke(idx) {
            const size = 10; const r = Math.floor(idx/size), c = idx%size;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for(let [dr, dc] of dirs) {
                let count = 1;
                for(let s of [1,-1]) {
                    for(let step=1; step<5; step++) {
                        let nr = r + dr*step*s, nc = c + dc*step*s;
                        if(nr>=0 && nr<size && nc>=0 && nc<size && board[nr*size+nc] === board[idx]) count++; else break;
                    }
                }
                if(count >= 5) return true;
            }
            return false;
        }

        function pataje() {
            window.open("https://wa.me m nan M-PARYAJ: " + window.location.href);
            db.ref('itilizate/' + mwen + '/balans').transaction(b => (b || 0) + 15);
        }

        function kouteMounOnline() {
            db.ref('status').on('value', s => {
                const div = document.getElementById('lis-online');
                div.innerHTML = "<h4>Jwè Online:</h4>";
                s.forEach(c => { if(c.key !== mwen) div.innerHTML += `<p>${c.key} <button class='btn' style='width:auto; padding:5px 15px;' onclick='lanseLobby()'>Defye l</button></p>`; });
            });
        }
    </script>
</body>
</html>
