<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon 50G | Blitz</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .board { display: grid; grid-template-columns: repeat(15, 25px); gap: 2px; background: #1e293b; padding: 5px; border-radius: 8px; width: fit-content; margin: 0 auto; }
        .cell { width: 25px; height: 25px; background: #334155; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: bold; }
        .cell.X { color: #f87171; } .cell.O { color: #60a5fa; }
        .timer-bar { height: 4px; background: #22c55e; width: 100%; transition: width 1s linear; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-center">

    <!-- LOGIN -->
    <div id="auth-screen" class="w-full max-w-md">
        <h1 class="text-4xl font-bold mb-6 text-blue-400 italic">MOPYON 50G</h1>
        <div class="glass p-8 rounded-3xl">
            <input type="text" id="phone" placeholder="Telefòn" class="w-full bg-slate-800 p-3 rounded-xl mb-4 outline-none border border-transparent focus:border-blue-500">
            <input type="password" id="password" placeholder="Modpas" class="w-full bg-slate-800 p-3 rounded-xl mb-6 outline-none border border-transparent focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">ANTRE NAN JWÈT LA</button>
            <p id="auth-error" class="text-red-400 text-xs mt-4"></p>
        </div>
    </div>

    <!-- LOBBY -->
    <div id="lobby-screen" class="hidden glass p-8 rounded-3xl w-full max-w-md">
        <h2 class="text-xl mb-4">Balans: <span id="user-balance" class="text-green-400 font-bold">0 G</span></h2>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="generateRoom()" class="bg-blue-600/30 border border-blue-500 py-3 rounded-xl text-xs">KREYE KÒD</button>
            <button onclick="showJoin()" class="bg-purple-600/30 border border-purple-500 py-3 rounded-xl text-xs">ANTRE KÒD</button>
        </div>

        <div id="room-controls" class="hidden mb-6">
            <input type="text" id="room-id" placeholder="Kòd Chanm" class="w-full bg-slate-800 p-3 rounded-xl mb-4 text-center border border-blue-500 outline-none">
            <button onclick="placeBet()" class="w-full bg-green-600 py-4 rounded-xl font-bold">MIZE 50G & JWE</button>
            <p id="share-text" class="mt-2 text-[10px] text-blue-300 hidden"></p>
        </div>
        
        <div class="border-t border-gray-700 pt-4 mt-4">
            <p class="text-xs text-gray-500 mb-2 uppercase">Depo Kòb</p>
            <input type="number" id="depo-amount" placeholder="Kantite Goud" class="w-full bg-slate-800 p-2 rounded mb-2 text-sm">
            <input type="text" id="depo-id" placeholder="ID MonCash/Natcash" class="w-full bg-slate-800 p-2 rounded mb-2 text-sm">
            <button onclick="sendDeposit()" class="w-full bg-orange-600 py-2 rounded text-xs font-bold">VOYE PRÈV</button>
        </div>
    </div>

    <!-- JWÈT -->
    <div id="game-screen" class="hidden w-full">
        <div class="glass p-3 rounded-2xl mb-4 max-w-xs mx-auto">
            <div id="status" class="font-bold text-sm mb-1 text-blue-400">ATANN LÒT LA...</div>
            <div class="w-full bg-gray-700 h-1 rounded-full overflow-hidden"><div id="timer-visual" class="timer-bar"></div></div>
        </div>
        <div class="flex justify-center overflow-auto"><div class="board" id="board"></div></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let userPhone = "", myRole = "", currentPlayer = "X", currentRoom = "", board = Array(225).fill(null), timerInterval = null;

        async function handleLogin() {
            userPhone = document.getElementById('phone').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone, password: document.getElementById('password').value}) });
            const data = await res.json();
            if(data.success) {
                document.getElementById('user-balance').innerText = data.balance + " G";
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('lobby-screen').classList.remove('hidden');
            } else { document.getElementById('auth-error').innerText = data.message; }
        }

        function generateRoom() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('room-id').value = code;
            document.getElementById('room-controls').classList.remove('hidden');
            document.getElementById('share-text').innerText = "Voye kòd sa bay zanmi w: " + code;
            document.getElementById('share-text').classList.remove('hidden');
        }

        function showJoin() {
            document.getElementById('room-controls').classList.remove('hidden');
            document.getElementById('room-id').value = "";
            document.getElementById('share-text').classList.add('hidden');
        }

        async function sendDeposit() {
            const amount = document.getElementById('depo-amount').value;
            const transactionId = document.getElementById('depo-id').value;
            if(!amount || !transactionId) return alert("Ranpli tout bwat yo!");
            const res = await fetch('/request-deposit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone, amount, transactionId}) });
            const d = await res.json(); alert(d.message);
        }

        async function placeBet() {
            currentRoom = document.getElementById('room-id').value;
            if(!currentRoom) return alert("Mete kòd la!");
            const res = await fetch('/bet', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: userPhone}) });
            const data = await res.json();
            if(data.success) {
                socket.emit('join-room', { roomCode: currentRoom, phone: userPhone });
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                createBoard();
            } else alert(data.message);
        }

        function createBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let i=0; i<225; i++) {
                const c = document.createElement('div'); c.className = 'cell'; c.id = "c-"+i;
                c.onclick = () => { if(!board[i] && myRole === currentPlayer) {
                    socket.emit('mouvman', { room: currentRoom, index: i, role: myRole });
                    makeMove(i, myRole);
                }};
                b.appendChild(c);
            }
        }

        function makeMove(i, p) {
            board[i] = p; const el = document.getElementById("c-"+i);
            el.innerText = p; el.classList.add(p);
            if(checkWin(i, p)) {
                clearInterval(timerInterval);
                if(p === myRole) socket.emit('game-over', { room: currentRoom, winner: myRole, winnerPhone: userPhone });
                return;
            }
            currentPlayer = (p === 'X' ? 'O' : 'X');
            updateStatus(); startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval); let time = 30;
            timerInterval = setInterval(() => {
                time--; document.getElementById('timer-visual').style.width = (time/30)*100 + "%";
                if(time <= 0) { 
                    clearInterval(timerInterval);
                    if(currentPlayer === myRole) socket.emit('game-over', { room: currentRoom, winner: (myRole === 'X' ? 'O' : 'X') });
                }
            }, 1000);
        }

        function checkWin(idx, p) {
            const r = Math.floor(idx/15), c = idx%15, dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for(let [dr, dc] of dirs) {
                let cnt = 1;
                for(let i=1; i<5; i++) { let nr=r+dr*i, nc=c+dc*i; if(nr>=0&&nr<15&&nc>=0&&nc<15&&board[nr*15+nc]===p) cnt++; else break; }
                for(let i=1; i<5; i++) { let nr=r-dr*i, nc=c-dc*i; if(nr>=0&&nr<15&&nc>=0&&nc<15&&board[nr*15+nc]===p) cnt++; else break; }
                if(cnt >= 5) return true;
            }
            return false;
        }

        function updateStatus() { document.getElementById('status').innerText = (myRole === currentPlayer) ? "TOU PA W!" : "ATANN LÒT LA..."; }
        socket.on('player-role', r => myRole = r);
        socket.on('start-game', s => { currentPlayer = s; updateStatus(); startTimer(); });
        socket.on('mouvman', d => { if(d.role !== myRole) makeMove(d.index, d.role); });
        socket.on('update-balance', d => { if(d.phone === userPhone) document.getElementById('user-balance').innerText = d.balance + " G"; });
        socket.on('reset', w => { alert("Gayan: " + w); location.reload(); });
        socket.on('player-left', () => { alert("Lòt la dekonekte!"); location.reload(); });
    </script>
</body>
</html>
