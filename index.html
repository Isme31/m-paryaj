<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; }
        .hidden { display: none; } .screen { padding: 20px; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; width: 90%; max-width: 300px; border: none; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; max-width: 400px; margin: 15px auto; background: #444; }
        .cell { aspect-ratio: 1/1; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        .x { color: #007bff; } .o { color: #ff4757; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <input type="text" id="ref" placeholder="Paren (Opsyonèl)">
        <button onclick="login()">Konekte</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <p>Balans: <span id="bal" style="color:#00ff00;">0</span> G</p>
        <div id="status">Chwazi yon mòd 👇</div>
        
        <div id="main-menu">
            <button onclick="createPrivate()" style="background:#25D366">Voye Kòd WhatsApp (50G)</button>
            <input type="text" id="join-code" placeholder="Antre kòd la">
            <button onclick="joinPrivate()">Antre nan Tab la</button>
        </div>

        <div id="board" class="grid hidden"></div>

        <div style="margin-top:20px; border:1px solid #444; padding:10px;">
            <p>Depo MonCash: <b>55110103</b></p>
            <input type="text" id="tid" placeholder="ID Tranzaksyon">
            <button onclick="voyeDepo()">Mande Depo</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(100).fill("");

        async function login() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: document.getElementById('phone').value, password: document.getElementById('pass').value, ref: document.getElementById('ref').value })
            });
            const data = await res.json();
            if(data.success) {
                myPhone = data.phone; document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            }
        }

        async function voyeDepo() {
            const tid = document.getElementById('tid').value;
            if(!tid) return alert("ID manke");
            await fetch('/submit-deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: myPhone, tid, amount: 50 })
            });
            alert("Depo voye!");
        }

        socket.on('balanceUpdate', (data) => {
            if(data.phone === myPhone) document.getElementById('bal').innerText = data.newBalance;
        });

        function createPrivate() {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            socket.emit('createPrivate', { room: code, phone: myPhone });
            window.open(`https://wa.me{code}`, '_blank');
            document.getElementById('status').innerText = "Kòd: " + code;
        }

        function joinPrivate() {
            const code = document.getElementById('join-code').value.toUpperCase();
            socket.emit('joinPrivate', { room: code, phone: myPhone });
        }

        socket.on('gameStart', (data) => {
            currentRoom = data.room;
            mySymbol = data.players[0] === myPhone ? 'X' : 'O';
            myTurn = (mySymbol === 'X');
            document.getElementById('board').classList.remove('hidden');
            document.getElementById('status').innerText = "Ou se " + mySymbol;
            renderBoard();
        });

        socket.on('opponentMove', (data) => {
            boardData[data.index] = data.symbol; myTurn = true; renderBoard();
        });

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = `cell ${val.toLowerCase()}`; cell.innerText = val;
                cell.onclick = () => {
                    if(!myTurn || boardData[i] !== "") return;
                    boardData[i] = mySymbol; myTurn = false;
                    socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
                    renderBoard();
                };
                b.appendChild(cell);
            });
        }
    </script>
</body>
</html>
