<!-- Ranplase tout pati Script ki jere Robot la ak sa a -->
<script>
    // ... (rès kòd login ak depo yo rete menm jan)

    function executeMove(idx, role) {
        board[idx] = role;
        const cell = document.getElementById('c' + idx);
        cell.innerText = role;
        cell.classList.add('taken');
        cell.style.color = role === "X" ? "#007bff" : "#ff4444";
        
        if(checkWin(idx, role)) {
            clearInterval(timer);
            document.getElementById('game-status').innerHTML = `<b style="color:#28a745">Jwè ${role} Ganyen!</b>`;
            // Nou pa reload paj la ankò, nou annik montre rezilta a
            if(role === myRole) winPrize();
            // Ajoute yon bouton pou moun nan tounen menu
            document.getElementById('game-screen').innerHTML += `<br><button onclick="location.reload()">Tounen nan Menu</button>`;
        } else {
            startTimer();
        }
    }

    // --- IA ROBOT ULTRA FÒ ---
    function robotMove() {
        let bestScore = -Infinity;
        let move = -1;

        // Robot la ap analize chak kare vid
        for (let i = 0; i < 100; i++) {
            if (board[i] === "") {
                // Kalkile nòt pou kare sa a (Atak + Defans)
                let score = evaluateSquare(i);
                if (score > bestScore) {
                    bestScore = score;
                    move = i;
                }
            }
        }

        if (move !== -1) {
            executeMove(move, "O");
            currentTurn = "X";
        }
    }

    function evaluateSquare(idx) {
        let score = 0;
        // Robot la tcheke tout direksyon pou wè kote ki gen plis danje
        const dirs = [1, 10, 11, 9]; 
        
        for (let d of dirs) {
            let userCount = countDir(idx, d, "X") + countDir(idx, -d, "X");
            let robotCount = countDir(idx, d, "O") + countDir(idx, -d, "O");

            // Priorite 1: Ganyen (si l gen 4 pwen deja)
            if (robotCount >= 4) score += 10000;
            // Priorite 2: Bloke moun nan (si moun nan gen 4 pwen deja)
            if (userCount >= 4) score += 5000;
            // Priorite 3: Kontinye yon liy 3 pwen
            if (robotCount === 3) score += 1000;
            // Priorite 4: Bloke yon liy 3 pwen moun nan
            if (userCount === 3) score += 500;
            
            score += robotCount * 10; // Ti pwen anplis pou l toujou bò kote mak li yo
        }
        return score;
    }

    // ... (rès kòd checkWin ak Timer yo rete menm jan)
</script>
