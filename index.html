<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz 5⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; }
        .hidden { display: none; }
        .screen { padding: 15px; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; width: 90%; max-width: 300px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; max-width: 400px; margin: 20px auto; background: #444; border: 2px solid #444; }
        .cell { aspect-ratio: 1/1; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; }
        .x { color: #007bff; } .o { color: #ff4757; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <input type="text" id="ref" placeholder="Nimewo Parren (opsyonèl)">
        <button onclick="login()">Konekte / Enskri</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <p>Balans: <span id="bal">0</span>G | Tel: <span id="myPhone"></span></p>
        <div id="status">Klike bouton an pou kòmanse</div>
        <button id="findBtn" onclick="findGame()">Chèche Advèsè (Pari 10G)</button>
        <div id="board" class="grid hidden"></div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(100).fill("");

        async function login() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: id('phone').value, password: id('pass').value, ref: id('ref').value })
            });
            const data = await res.json();
            if(data.success) {
                myPhone = data.phone; id('bal').innerText = data.balance;
                id('myPhone').innerText = myPhone;
                id('auth-screen').classList.add('hidden'); id('game-screen').classList.remove('hidden');
            } else alert(data.message);
        }

        function findGame() {
            socket.emit('findGame', { phone: myPhone });
            id('findBtn').classList.add('hidden'); id('status').innerText = "Rechèch ankou...";
        }

        socket.on('gameStart', (data) => {
            currentRoom = data.room;
            mySymbol = data.players[0] === myPhone ? 'X' : 'O';
            myTurn = (mySymbol === 'X');
            id('status').innerText = `Ou se ${mySymbol}. ${myTurn ? 'Tou pa w!' : 'Tou advèsè a.'}`;
            id('board').classList.remove('hidden');
            renderBoard();
        });

        function renderBoard() {
            const b = id('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = `cell ${val.toLowerCase()}`;
                cell.innerText = val;
                cell.onclick = () => makeMove(i);
                b.appendChild(cell);
            });
        }

        function makeMove(i) {
            if(!myTurn || boardData[i] !== "") return;
            boardData[i] = mySymbol;
            myTurn = false;
            id('status').innerText = "Tou advèsè a...";
            renderBoard();
            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
            // Isit la ou ta dwe ajoute checkWin(i) pou tcheke 5 pyon
        }

        socket.on('opponentMove', (data) => {
            boardData[data.index] = data.symbol;
            myTurn = true;
            id('status').innerText = "Tou pa w!";
            renderBoard();
        });

        function id(n) { return document.getElementById(n); }
    </script>
</body>
</html>
