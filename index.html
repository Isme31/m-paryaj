<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mopyon Blitz</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .hidden { display: none; }
        .screen { padding: 20px; }
        input, button { padding: 12px; margin: 10px; border-radius: 8px; width: 80%; max-width: 300px; }
        button { background: #007bff; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Telefòn"> <br>
        <input type="password" id="password" placeholder="Modpas"> <br>
        <button onclick="handleLogin()">Konekte</button>
    </div>

    <div id="menu-screen" class="screen hidden">
        <h2>Byenvini!</h2>
        <p>Balans ou: <span id="user-balance">0</span>G</p>
        <button onclick="location.reload()">Soti</button>
    </div>

    <script>
        async function handleLogin() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('user-balance').innerText = data.balance;
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('menu-screen').classList.remove('hidden');
                } else { alert(data.message); }
            } catch(e) { alert("Erè koneksyon ak sèvè a"); }
        }
    </script>
</body>
</html>
