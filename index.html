<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ V5</title>
    
    <!-- Lyen sa yo dwe la pou Firebase ka mache -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #161616; padding: 25px; border-radius: 15px; border: 2px solid #00ff88; max-width: 350px; margin: auto; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #222; color: white; font-size: 16px; }
        button { background: #00ff88; color: black; padding: 14px; width: 95%; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2 style="color:#00ff88">M-PARYAJ <span style="font-size: 10px; color: gray;">V5</span></h2>
        <p id="status" style="color: orange; font-size: 12px;">Y ap prepare sistèm nan... ⏳</p>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="konekte()">ANTRE</button>
    </div>

    <div id="game-box" class="box hidden">
        <h3 id="tel-afiche" style="color:#00ff88">---</h3>
        <h1 style="color:#ffcc00"><span id="bal">0</span> HTG</h1>
        <button onclick="location.reload()" style="background:#444; color:white">SÒTI</button>
    </div>

    <script>
        // Fonksyon pou kòmanse aplikasyon an
        function kòmanse() {
            if (typeof firebase === 'undefined') {
                document.getElementById('status').innerText = "BLOKAJ REZO: Sèvè yo pa reponn. Rafrechi paj la! ❌";
                document.getElementById('status').style.color = "#ff4444";
                return;
            }

            const config = {
                apiKey: "AIzaSyDQN0XDlGG4XkijYW0Gx3yn9IqkbB4jMp8",
                authDomain: "://firebaseapp.com",
                databaseURL: "https://firebaseio.com",
                projectId: "m-paryaj",
                appId: "1:103993159961:web:0ebc12aebd2f3b05fc5588"
            };

            firebase.initializeApp(config);
            const db = firebase.database();

            // Tcheke koneksyon
            db.ref('.info/connected').on('value', (s) => {
                const status = document.getElementById('status');
                if (s.val()) {
                    status.innerText = "Koneksyon OK ✅";
                    status.style.color = "#00ff88";
                } else {
                    status.innerText = "Ap chache rezo... 📡";
                    status.style.color = "orange";
                }
            });

            window.konekte = function() {
                const tel = document.getElementById('tel').value.trim();
                const pass = document.getElementById('pass').value.trim();
                if(!tel || !pass) return alert("Mete enfòmasyon yo!");

                db.ref('itilizate/' + tel).once('value').then(snap => {
                    const user = snap.val();
                    if(!user) {
                        db.ref('itilizate/' + tel).set({modpas: pass, balans: 0}).then(() => antre(tel));
                    } else if(user.modpas === pass) {
                        antre(tel);
                    } else {
                        alert("Modpas la pa bon!");
                    }
                });
            };

            function antre(tel) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                document.getElementById('tel-afiche').innerText = "Pwofil: " + tel;
                db.ref('itilizate/' + tel + '/balans').on('value', s => {
                    document.getElementById('bal').innerText = s.val() || 0;
                });
            }
        }

        // Tann 2 segonn pou bibliyotèk yo gen tan chaje
        setTimeout(kòmanse, 2000);
    </script>
</body>
</html>
