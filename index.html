<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz 5⚡ Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; }
        .hidden { display: none; }
        .screen { padding: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Tablo 10x10 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(10, 35px); 
            gap: 2px; 
            justify-content: center; 
            margin: 15px auto; 
            background: #333;
            border: 3px solid #444;
            width: fit-content;
        }
        .cell { 
            width: 35px; height: 35px; background: #1a1a1a; 
            font-size: 1.1rem; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .cell:hover { background: #252525; }
        .cell.taken { cursor: not-allowed; }
        .timer-box { font-size: 1.4rem; color: #ff4444; margin: 10px; font-weight: bold; border: 2px solid #ff4444; display: inline-block; padding: 5px 15px; border-radius: 10px; }
        .status { color: #ffc107; font-weight: bold; height: 25px; }
        
        button { padding: 12px 20px; margin: 8px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; width: 85%; max-width: 300px; }
        input { padding: 12px; margin: 8px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; width: 80%; max-width: 280px; }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="auth-screen" class="screen">
        <h1>Blitz Mopyon 5⚡</h1>
        <input type="text" id="phone" placeholder="Telefòn (ex: 31594645)"> <br>
        <input type="password" id="password" placeholder="Modpas"> <br>
        <button onclick="handleLogin()">Konekte / Enskri</button>
    </div>

    <!-- 2. MENU -->
    <div id="menu-screen" class="screen hidden">
        <h2>Balans: <span id="user-balance">0</span>G</h2>
        <button onclick="prepareGame(false)" style="background: #007bff;">Jwe ak yon Moun (50G)</button>
        <button onclick="prepareGame(true)" style="background: #28a745;">Jwe ak Robot (IA Fò)</button>
        <button onclick="showScreen('deposit-screen')" style="background: #555;">Depo / Retrè</button>
    </div>

    <!-- 3. JWÈT -->
    <div id="game-screen" class="screen hidden">
        <div class="timer-box">⏳ <span id="time-left">30</span>s</div>
        <div class="status" id="game-status">Atann...</div>
        <div class="grid" id="board"></div>
        <button onclick="location.reload()" style="background: #dc3545;">Kite Jwèt la</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let uPhone="", uPass="", myBalance=0, isAdmin=false;
        let board = Array(100).fill("");
        let myRole = "X", currentTurn = "X", isRobotGame = false;
        let timer, timeLeft = 30;
        let lastWinner = "X"; // Pou konnen kilès k ap kòmanse

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleLogin() {
            uPhone = document.getElementById('phone').value;
            uPass = document.getElementById('password').value;
            const res = await fetch('/login', { 
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body: JSON.stringify({phone: uPhone, password: uPass}) 
            });
            const data = await res.json();
            if(data.success) {
                myBalance = data.balance;
                isAdmin = data.isAdmin;
                document.getElementById('user-balance').innerText = myBalance;
                showScreen('menu-screen');
            } else { alert(data.message); }
        }

        function createBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = "";
            board = Array(100).fill("");
            for(let i=0; i<100; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'c' + i;
                cell.onclick = () => makeMove(i);
                boardDiv.appendChild(cell);
            }
        }

        async function prepareGame(withRobot) {
            isRobotGame = withRobot;
            // Admin jwe gratis, lòt moun peye 50G
            if(!isAdmin) {
                const res = await fetch('/bet', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({phone: uPhone, password: uPass})
                });
                const data = await res.json();
                if(!data.success) return alert("Balans ou twò piti!");
                myBalance = data.newBalance;
                document.getElementById('user-balance').innerText = myBalance;
            }

            createBoard();
            showScreen('game-screen');
            
            if(isRobotGame) {
                myRole = "X";
                currentTurn = lastWinner; // Ganyan an kòmanse
                document.getElementById('game-status').innerText = "W ap jwe ak Robot (Ou se X)";
                if(currentTurn === "O") setTimeout(robotMove, 800);
                startTimer();
            } else {
                socket.emit('join-room', { roomCode: "global_5_v1" });
            }
        }

        function makeMove(idx) {
            if(board[idx] !== "" || currentTurn !== myRole) return;
            executeMove(idx, myRole);
            if(isRobotGame && board.includes("")) {
                currentTurn = "O";
                setTimeout(robotMove, 600);
            } else if (!isRobotGame) {
                socket.emit('mouvman', { room: "global_5_v1", index: idx, role: myRole });
            }
        }

        function executeMove(idx, role) {
            board[idx] = role;
            const cell = document.getElementById('c' + idx);
            cell.innerText = role;
            cell.classList.add('taken');
            cell.style.color = role === "X" ? "#007bff" : "#ff4444";
            
            if(checkWin(idx, role)) {
                clearInterval(timer);
                lastWinner = role;
                setTimeout(() => {
                    alert("Jwè " + role + " Ganyen!");
                    if(role === myRole) winPrize();
                    else location.reload();
                }, 100);
            } else {
                startTimer(); // Reset tan an pou lòt jwè a
            }
        }

        // --- ROBOT IA FÒ ---
        function robotMove() {
            let move = findBestMove("O"); // Atak
            if (move === -1) move = findBestMove("X"); // Defans (Bloke moun)
            if (move === -1) {
                // Si l pa jwenn anyen, li jwe toupre "O" oswa nan mitan
                let empty = board.map((v, i) => v === "" ? i : -1).filter(v => v !== -1);
                move = empty[Math.floor(Math.random() * empty.length)];
            }
            executeMove(move, "O");
            currentTurn = "X";
        }

        function findBestMove(role) {
            // Chèche si gen yon kote ki ka fè 4 oswa 5 pwen
            for(let i=0; i<100; i++) {
                if(board[i] === "") {
                    if(countInAnyDir(i, role) >= 4) return i;
                }
            }
            // Sinon chèche kote ki ka fè 3 pwen
            for(let i=0; i<100; i++) {
                if(board[i] === "") {
                    if(countInAnyDir(i, role) >= 3) return i;
                }
            }
            return -1;
        }

        function countInAnyDir(idx, role) {
            const dirs = [1, 10, 11, 9];
            let max = 0;
            for(let d of dirs) {
                let c = 1 + countDir(idx, d, role) + countDir(idx, -d, role);
                if(c > max) max = c;
            }
            return max;
        }

        // --- LOJIK JWÈT ---
        function checkWin(idx, role) {
            return countInAnyDir(idx, role) >= 5;
        }

        function countDir(idx, dir, role) {
            let count = 0, curr = idx + dir;
            // Tcheke limit tablo a (10x10)
            while(curr >= 0 && curr < 100 && board[curr] === role) {
                // Prevni "wrapping" sou bò tablo a
                if(Math.abs(dir) === 1 && Math.floor(curr/10) !== Math.floor((curr-dir)/10)) break;
                count++;
                curr += dir;
            }
            return count;
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 30;
            document.getElementById('time-left').innerText = timeLeft;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    alert("Tan fini! Ou pèdi.");
                    location.reload();
                }
            }, 1000);
        }

        async function winPrize() {
            await fetch('/win-game', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({phone: uPhone, password: uPass})
            });
            location.reload();
        }

        socket.on('mouvman', (d) => {
            if(d.role !== myRole) {
                executeMove(d.index, d.role);
                currentTurn = myRole;
            }
        });
    </script>
</body>
</html>
