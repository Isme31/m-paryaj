<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Mopyon</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com"/>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .blitz-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .board { display: grid; grid-template-columns: repeat(15, 25px); gap: 2px; background: #0f172a; padding: 5px; border-radius: 12px; }
        .cell { width: 25px; height: 25px; background: #1e293b; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; font-weight: 900; border-radius: 4px; }
        .cell.X { color: #f87171; text-shadow: 0 0 8px #ef4444; }
        .cell.O { color: #60a5fa; text-shadow: 0 0 8px #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- SPLASH SCREEN -->
    <div id="splash" class="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center z-50 transition-all duration-1000">
        <h1 class="text-8xl font-black italic text-blue-500 animate__animated animate__zoomIn">BLITZ</h1>
        <div class="mt-4 flex gap-4 animate__animated animate__fadeInUp animate__delay-1s">
            <img src="https://moncash.com" style="height: 30px;">
            <img src="https://natcom.com.ht" style="height: 30px;">
        </div>
    </div>

    <!-- LOGIN -->
    <div id="auth-screen" class="hidden w-full max-w-md animate__animated animate__fadeIn">
        <div class="glass p-10 rounded-[40px] shadow-2xl border border-blue-500/10 text-center">
            <h1 class="text-4xl font-black mb-8 italic text-blue-500">LOGIN</h1>
            <input type="text" id="phone" placeholder="Telefòn" class="w-full bg-slate-900 p-4 rounded-2xl mb-4 outline-none border border-white/5 focus:border-blue-500">
            <input type="password" id="password" placeholder="Modpas" class="w-full bg-slate-900 p-4 rounded-2xl mb-8 outline-none border border-white/5 focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full blitz-gradient py-4 rounded-2xl font-black shadow-lg shadow-blue-900/50 uppercase tracking-widest">Konekte</button>
        </div>
    </div>

    <!-- MENU -->
    <div id="menu-screen" class="hidden w-full max-w-md text-center">
        <h1 class="text-7xl font-black mb-10 text-blue-500 italic tracking-tighter animate__animated animate__backInDown">MOPYON</h1>
        <div class="grid gap-4">
            <button onclick="startBet(false)" class="glass p-6 rounded-3xl w-full flex justify-between items-center border-l-4 border-blue-500 hover:scale-105 transition">
                <div class="text-left font-black uppercase italic">Mopyon VS Moun<br><span class="text-[10px] text-blue-400 not-italic">Jwe ak yon zanmi (50G)</span></div>
                <span class="text-2xl">👥</span>
            </button>
            <button onclick="startBet(true)" class="glass p-6 rounded-3xl w-full flex justify-between items-center border-l-4 border-red-500 hover:scale-105 transition">
                <div class="text-left font-black uppercase italic">Mopyon VS Robo<br><span class="text-[10px] text-red-400 not-italic">Defi Robo Lejand (50G)</span></div>
                <span class="text-2xl">🤖</span>
            </button>
        </div>
    </div>

    <!-- LOBBY -->
    <div id="lobby-screen" class="hidden glass p-8 rounded-[40px] w-full max-w-md">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-green-400 italic"><span id="user-balance">0</span>G</h2>
            <button onclick="location.reload()" class="opacity-50">🏠 MENU</button>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="genRoom()" class="bg-blue-600/20 border border-blue-500 py-3 rounded-2xl text-[10px] font-black uppercase italic tracking-widest">KREYE KÒD</button>
            <button onclick="document.getElementById('room-box').classList.remove('hidden')" class="bg-purple-600/20 border border-purple-500 py-3 rounded-2xl text-[10px] font-black uppercase italic tracking-widest">ANTRE KÒD</button>
        </div>
        <div id="room-box" class="hidden mb-8">
            <input type="text" id="room-id" placeholder="KÒD" class="w-full bg-slate-900 p-4 rounded-2xl mb-3 text-center border border-blue-500 outline-none uppercase font-black text-xl tracking-[10px]">
            <button onclick="joinMatch()" class="w-full blitz-gradient py-4 rounded-2xl font-black uppercase italic">JWE KOUNYE A</button>
        </div>
        <div class="border-t border-white/10 pt-6 grid grid-cols-2 gap-6 text-left">
            <div>
                <p class="text-[10px] text-gray-500 font-bold mb-2 uppercase">Depo MonCash</p>
                <input id="d-amt" placeholder="Kòb" class="w-full bg-slate-900 p-2 rounded-lg text-xs mb-1 outline-none">
                <input id="d-id" placeholder="ID" class="w-full bg-slate-900 p-2 rounded-lg text-xs mb-1 outline-none">
                <button onclick="doDepo()" class="w-full bg-orange-600 py-2 rounded-lg text-[10px] font-black uppercase">Voye</button>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 font-bold mb-2 uppercase">Retrè Natcash</p>
                <input id="w-amt" placeholder="Kòb" class="w-full bg-slate-900 p-2 rounded-lg text-xs mb-1 outline-none">
                <select id="w-meth" class="w-full bg-slate-900 p-2 rounded-lg text-[10px] mb-1 text-white border-none outline-none">
                    <option value="31594645">31594645 (MC)</option>
                    <option value="55110103">55110103 (NC)</option>
                </select>
                <button onclick="doWithdraw()" class="w-full bg-blue-600 py-2 rounded-lg text-[10px] font-black uppercase">Retire</button>
            </div>
        </div>
    </div>

    <!-- GAME & CHAT -->
    <div id="game-screen" class="hidden w-full max-w-5xl flex flex-col md:flex-row gap-6 items-center justify-center">
        <div class="glass p-4 rounded-[40px] shadow-2xl">
            <div id="status" class="mb-4 font-black text-blue-500 uppercase text-[10px] italic tracking-widest text-center">Blitz Arena</div>
            <div class="board" id="board"></div>
        </div>
        <div class="w-full md:w-72 glass rounded-[40px] flex flex-col h-[400px]">
            <div class="p-4 border-b border-white/10 text-[10px] font-black text-gray-500 uppercase tracking-widest">Chat</div>
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-3 text-xs text-left"></div>
            <div class="p-4 flex gap-2">
                <input type="text" id="chat-input" placeholder="..." class="flex-1 bg-slate-900 p-3 rounded-2xl outline-none text-[10px]">
                <button onclick="sendMsg()" class="blitz-gradient px-4 rounded-2xl">➡️</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let uPhone="", uPass="", myRole="", currentPl="", room="", board=Array(225).fill(null), isAI=false, isAdmin=false;

        // ANIMATION SPLASH
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').classList.add('hidden');
                    document.getElementById('auth-screen').classList.remove('hidden');
                }, 1000);
            }, 2500);
        };

        async function handleLogin() {
            uPhone = document.getElementById('phone').value; uPass = document.getElementById('password').value;
            const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone:uPhone, password:uPass}) });
            const d = await res.json();
            if(d.success) { 
                document.getElementById('user-balance').innerText=d.balance; 
                isAdmin = d.isAdmin;
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('menu-screen').classList.remove('hidden'); 
            } else alert(d.message);
        }

        async function startBet(ai) {
            isAI = ai;
            const res = await fetch('/bet', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone:uPhone, password:uPass, free: isAdmin}) });
            const d = await res.json();
            if(d.success) {
                document.getElementById('user-balance').innerText=d.newBalance;
                document.getElementById('menu-screen').classList.add('hidden');
                if(isAI) { document.getElementById('game-screen').classList.remove('hidden'); myRole="X"; currentPl="X"; makeGrid(); }
                else { document.getElementById('lobby-screen').classList.remove('hidden'); }
            } else alert(d.message);
        }

        function makeGrid() {
            const b = document.getElementById('board'); b.innerHTML = '';
            for(let i=0; i<225; i++) {
                const c = document.createElement('div'); c.className='cell'; c.id="c-"+i;
                c.onclick = () => { if(!board[i] && currentPl===myRole) { move(i, myRole); if(!isAI) socket.emit('mouvman', { room, index: i, role: myRole }); }};
                b.appendChild(c);
            }
        }

        function move(i, r) {
            if(board[i]) return; board[i]=r;
            const el=document.getElementById("c-"+i); el.innerText=r; el.classList.add(r);
            if(win(i, r)) {
                if(r === myRole) { fetch('/win-game', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone:uPhone, password:uPass}) }).then(()=>alert("OU GENYEN!")); }
                else alert("PÈDI!"); 
                location.reload(); return;
            }
            currentPl = (r==='X')?'O':'X';
            document.getElementById('status').innerText = (currentPl===myRole)?"TOU PAW!":"TANN LÒT LA...";
            if(isAI && currentPl==="O") setTimeout(smartRobot, 600);
        }

        // --- ROBO LEJAND ---
        function smartRobot() {
            let bestS = -Infinity; let mIdx = -1;
            for(let i=0; i<225; i++) { if(!board[i]) { let s = calcScore(i); if(s > bestS) { bestS = s; mIdx = i; } } }
            if(mIdx !== -1) move(mIdx, "O");
        }
        function calcScore(idx) {
            let s=0; const row=Math.floor(idx/15), col=idx%15, ds=[,,,[1,-1]];
            for(let [dr, dc] of ds) { s += checkLine(row, col, dr, dc, "O")*20; s += checkLine(row, col, dr, dc, "X")*25; }
            return s + Math.random();
        }
        function checkLine(r, c, dr, dc, role) {
            let cnt = 0; for(let i=-4; i<=4; i++) { if(i===0) continue; let nr=r+dr*i, nc=c+dc*i; if(nr>=0 && nr<15 && nc>=0 && nc<15 && board[nr*15+nc] === role) cnt++; }
            return cnt;
        }

        function win(idx, r) {
            const s=15, row=Math.floor(idx/s), col=idx%s, ds=[,,,[1,-1]];
            for(let [dr, dc] of ds) {
                let cnt=1;
                for(let i=1; i<5; i++) { let nr=row+dr*i, nc=col+dc*i; if(nr>=0 && nr<s && nc>=0 && nc<s && board[nr*s+nc]===r) cnt++; else break; }
                for(let i=1; i<5; i++) { let nr=row-dr*i, nc=col-dc*i; if(nr>=0 && nr<s && nc>=0 && nc<s && board[nr*s+nc]===r) cnt++; else break; }
                if(cnt>=5) return true;
            } return false;
        }

        function genRoom() { document.getElementById('room-id').value = Math.random().toString(36).substring(2,8).toUpperCase(); document.getElementById('room-box').classList.remove('hidden'); }
        function joinMatch() {
            room = document.getElementById('room-id').value; if(!room) return alert("Mete kòd!");
            socket.emit('join-room', { roomCode: room, phone: uPhone });
            document.getElementById('lobby-screen').classList.add('hidden'); document.getElementById('game-screen').classList.remove('hidden'); makeGrid();
        }

        function sendMsg() { const i=document.getElementById('chat-input'); if(i.value) { socket.emit('chat-message', {room, phone:uPhone, message:i.value}); i.value=""; } }
        socket.on('chat-message', d => {
            const box=document.getElementById('chat-box'); const isMe=d.phone===uPhone;
            box.innerHTML+=`<div class="${isMe?'text-right animate__animated animate__fadeInRight':'text-left animate__animated animate__fadeInLeft'}"><span class="inline-block p-3 rounded-2xl ${isMe?'blitz-gradient text-white':'bg-white/10 text-gray-300'} shadow-sm">${d.message}</span></div>`;
            box.scrollTop=box.scrollHeight;
        });

        async function doDepo() {
            const amt=document.getElementById('d-amt').value; const tid=document.getElementById('d-id').value;
            if(!amt || !tid) return alert("Ranpli tout bwat yo!");
            const res = await fetch('/request-deposit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone:uPhone, amount:amt, transactionId:tid}) });
            const d = await res.json(); alert(d.message);
        }

        async function doWithdraw() {
            const amt=document.getElementById('w-amt').value;
            const res = await fetch('/request-withdrawal', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone:uPhone, password:uPass, amount:amt, method:document.getElementById('w-meth').value}) });
            const d = await res.json(); if(d.success) alert("Mande!"); else alert(d.message);
            location.reload();
        }

        socket.on('player-role', r => myRole=r);
        socket.on('start-game', r => { currentPl=r; document.getElementById('status').innerText="MATCH KÒMANSE!"; });
        socket.on('mouvman', d => move(d.index, d.role));
        socket.on('reset', () => setTimeout(()=>location.reload(), 3000));
    </script>
</body>
</html>
