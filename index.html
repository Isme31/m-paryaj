<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PARYAJ V3</title>
    
    <!-- Sèvi ak lyen "defer" pou asire script la chaje nèt -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #00ff88; max-width: 350px; margin: auto; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #222; color: white; }
        button { background: #00ff88; color: black; padding: 12px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 90%; }
        .hidden { display: none; }
        #status { font-size: 11px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2 style="color:#00ff88">M-PARYAJ <span style="font-size: 10px; color: gray;">V3</span></h2>
        <div id="status" style="color: orange;">Y ap chaje sistèm nan...</div>
        <input type="tel" id="tel" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="konekte()">ANTRE</button>
    </div>

    <div id="game-box" class="box hidden">
        <h3 id="tel-afiche">---</h3>
        <h1 style="color:#ffcc00"><span id="bal">0</span> HTG</h1>
        <button onclick="location.reload()" style="background:#444; color:white">SÒTI</button>
    </div>

    <script>
        // Fonksyon pou kòmanse sèlman lè Firebase fin chaje
        window.onload = function() {
            if (typeof firebase === 'undefined') {
                document.getElementById('status').innerText = "Erè: Firebase pa ka chaje. Rafrechi paj la! ❌";
                document.getElementById('status').style.color = "red";
                return;
            }

            const firebaseConfig = {
                apiKey: "AIzaSyDQN0XDlGG4XkijYW0Gx3yn9IqkbB4jMp8",
                authDomain: "://firebaseapp.com",
                databaseURL: "https://firebaseio.com",
                projectId: "m-paryaj",
                storageBucket: "m-paryaj.firebasestorage.app",
                appId: "1:103993159961:web:0ebc12aebd2f3b05fc5588"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // Tcheke koneksyon
            db.ref('.info/connected').on('value', (snap) => {
                const s = document.getElementById('status');
                if (snap.val() === true) {
                    s.innerText = "Koneksyon OK ✅";
                    s.style.color = "#00ff88";
                } else {
                    s.innerText = "Ap chache database... ❌";
                    s.style.color = "orange";
                }
            });

            // Rann fonksyon konekte a disponib globalman
            window.konekte = function() {
                const tel = document.getElementById('tel').value.trim();
                const pass = document.getElementById('pass').value.trim();

                if(!tel || !pass) return alert("Ranpli tout chan yo!");

                db.ref('itilizate/' + tel).once('value').then((snap) => {
                    const d = snap.val();
                    if (!d) {
                        db.ref('itilizate/' + tel).set({ modpas: pass, balans: 0 }).then(() => antre(tel));
                    } else if (d.modpas === pass) {
                        antre(tel);
                    } else {
                        alert("Move modpas!");
                    }
                }).catch(e => alert("Rules Firebase ou yo bloke! Error: " + e.message));
            };

            function antre(tel) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('game-box').classList.remove('hidden');
                document.getElementById('tel-afiche').innerText = "Tel: " + tel;
                db.ref('itilizate/' + tel + '/balans').on('value', s => {
                    document.getElementById('bal').innerText = s.val() || 0;
                });
            }
        };
    </script>
</body>
</html>
