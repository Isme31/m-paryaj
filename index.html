<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Blitz ⚡</title>
    <style>
        body { background:#111; color:white; font-family:sans-serif; text-align:center; padding:20px; }
        .container { max-width: 500px; margin: auto; }
        .card { 
            background:#222; 
            border:1px solid #444; 
            padding:15px; 
            margin:15px 0; 
            border-radius:12px; 
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .phone { color: #007bff; font-weight: bold; font-size: 1.1em; }
        .amount { color: #28a745; font-weight: bold; float: right; }
        .tid { background: #333; padding: 5px; border-radius: 4px; display: block; margin: 10px 0; font-family: monospace; }
        button { 
            background:#28a745; 
            color:white; 
            border:none; 
            padding:12px; 
            cursor:pointer; 
            width:100%; 
            border-radius:8px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #218838; }
        .empty { color: #888; margin-top: 50px; }
        .refresh-btn { background: #444; margin-bottom: 20px; width: auto; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Panèl Kontwòl ⚡</h1>
        <button class="refresh-btn" onclick="loadDeposits()">🔄 Rafrechi Lis la</button>
        
        <div id="list">
            <p class="empty">Ap chaje depo yo...</p>
        </div>
    </div>

    <script>
        const ADMIN_KEY = "hugues"; // Menm kle ki nan index.js la

        async function loadDeposits() {
            try {
                const res = await fetch(`/admin/all-data?key=${ADMIN_KEY}`);
                const data = await res.json();
                
                const listDiv = document.getElementById('list');
                
                if (!data.deposits || data.deposits.length === 0) {
                    listDiv.innerHTML = '<p class="empty">Pa gen depo an tann pou kounye a.</p>';
                    return;
                }

                listDiv.innerHTML = data.deposits.map(d => `
                    <div class="card" id="card-${d._id}">
                        <span class="amount">${d.amount}G</span>
                        <span class="phone">📞 ${d.phone}</span>
                        <small style="display:block; color:#888; margin-top:5px;">Transaction ID:</small>
                        <span class="tid">${d.transactionId}</span>
                        <button onclick="confirmDeposit('${d._id}')">Konfime Depo sa ✅</button>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Erè:", err);
                document.getElementById('list').innerHTML = '<p style="color:red;">Erè nan koneksyon ak sèvè a.</p>';
            }
        }

        async function confirmDeposit(id) {
            if (!confirm("Èske ou sèten ou resevwa kòb sa a tout bon?")) return;

            try {
                const res = await fetch('/admin/confirm-deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: ADMIN_KEY, id: id })
                });

                const result = await res.json();

                if (result.success) {
                    alert("Bravo! Balans jwè a ajou.");
                    loadDeposits(); // Refè lis la
                } else {
                    alert("Erè: " + result.message);
                }
            } catch (err) {
                alert("Sèvè a gen yon pwoblèm.");
            }
        }

        // Chaje depo yo depi paj la louvri
        loadDeposits();

        // Rafrechi otomatikman chak 30 segonn
        setInterval(loadDeposits, 30000);
    </script>
</body>
</html>
