
<!DOCTYPE html>
<html>
<head><title>Admin - Konfimasyon</title><script src="https://tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-2xl font-bold mb-6">Depo ki ap tann konfimasyon</h1>
    <div id="list" class="space-y-4"></div>

    <script>
        async function loadDeposits() {
            const res = await fetch('/admin/deposits');
            const data = await res.json();
            const container = document.getElementById('list');
            container.innerHTML = '';
            data.forEach(d => {
                container.innerHTML += `
                    <div class="p-4 bg-gray-800 rounded flex justify-between items-center">
                        <div>
                            <p><b>Telefòn:</b> ${d.phone}</p>
                            <p><b>Kantite:</b> ${d.amount}G</p>
                            <p><b>ID:</b> ${d.transactionId}</p>
                        </div>
                        <button onclick="confirm(${d.id})" class="bg-green-600 px-4 py-2 rounded font-bold">KONFIME</button>
                    </div>`;
            });
        }
        async function confirm(id) {
            await fetch('/admin/confirm-deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ depositId: id })
            });
            loadDeposits();
        }
        loadDeposits();
    </script>
</body>
</html>
