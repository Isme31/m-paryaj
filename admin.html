<!DOCTYPE html>
<html>
<head><title>Admin | Konfimasyon</title><script src="https://tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-8 text-orange-500">DEPO KI PANDYE</h1>
    <div id="list" class="grid gap-4"></div>
    <script>
        async function load() {
            const res = await fetch('/admin/deposits');
            const data = await res.json();
            const cont = document.getElementById('list');
            cont.innerHTML = data.length ? '' : '<p>Pa gen demand.</p>';
            data.forEach(d => {
                cont.innerHTML += `
                    <div class="p-6 bg-gray-800 rounded-xl flex justify-between items-center border border-gray-700">
                        <div><p class="text-xl font-bold text-green-400">${d.amount} Goud</p><p class="text-sm">Nimewo: ${d.phone} | ID: ${d.transactionId}</p></div>
                        <button onclick="confirm(${d.id})" class="bg-green-600 px-6 py-2 rounded font-bold">KONFIME</button>
                    </div>`;
            });
        }
        async function confirm(id) {
            await fetch('/admin/confirm-deposit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ depositId: id }) });
            load();
        }
        load(); setInterval(load, 5000);
    </script>
</body>
</html>
