<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mopyon Blitz</title>
    <style>
        body { background:#111; color:white; font-family:sans-serif; text-align:center; padding:20px; }
        .card { background:#222; border-left: 8px solid #ff4757; padding:15px; margin:15px auto; border-radius:10px; text-align: left; max-width: 500px; }
        .tid { background: #000; padding: 10px; border-radius: 5px; display: block; color: #007bff; margin: 10px 0; }
        button { background:#28a745; color:white; border:none; padding:12px; width:100%; border-radius:8px; font-weight: bold; cursor:pointer; }
    </style>
</head>
<body>
    <h1>Panèl Kontwòl ⚡</h1>
    <div id="list"><p>Ap chaje...</p></div>

    <script>
        const KEY = "hugues";
        async function load() {
            const res = await fetch('/admin/all-data?key=' + KEY);
            const data = await res.json();
            const listDiv = document.getElementById('list');
            if (!data.deposits || data.deposits.length === 0) { listDiv.innerHTML = '<p>Pa gen depo.</p>'; return; }
            listDiv.innerHTML = data.deposits.map(d => `
                <div class="card">
                    <b>📞 ${d.phone}</b><br>
                    <span>Montan: ${d.amount} G (${d.method})</span>
                    <span class="tid">${d.tid}</span>
                    <button onclick="confirm('${d._id}', '${d.phone}', ${d.amount})">Konfime ✅</button>
                </div>
            `).join('');
        }

        async function confirm(id, phone, amount) {
            const res = await fetch('/admin/confirm-deposit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: KEY, id }) });
            const result = await res.json();
            if (result.success) { alert("OK!"); load(); }
        }
        load(); setInterval(load, 10000);
    </script>
</body>
</html>
