<!DOCTYPE html>
<html>
<head><title>Admin Panel</title><script src="https://tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-3xl font-bold text-orange-500 mb-8 border-b border-orange-500 pb-2 italic">BLITZ ADMIN</h1>
    <div class="grid md:grid-cols-2 gap-10">
        <div><h2 class="text-xl font-bold mb-4 text-green-400">DEPO</h2><div id="d-list" class="grid gap-3"></div></div>
        <div><h2 class="text-xl font-bold mb-4 text-blue-400">RETRÈ</h2><div id="w-list" class="grid gap-3"></div></div>
    </div>
    <script>
        const key = new URLSearchParams(window.location.search).get('key');
        if(key !== "hugues") { document.body.innerHTML = "<h1>Aksè Refize!</h1>"; }
        async function fetchAll() {
            const res = await fetch(`/admin/data?key=${key}`);
            const { deposits, withdrawals } = await res.json();
            document.getElementById('d-list').innerHTML = deposits.map(d => `
                <div class="p-4 bg-gray-800 rounded flex justify-between items-center border border-gray-700">
                    <span class="text-xs"><b>${d.amount}G</b> | ${d.phone} | ID: ${d.transactionId}</span>
                    <button onclick="confD(${d.id})" class="bg-green-600 px-3 py-1 rounded text-xs">KONFIME</button>
                </div>`).join('') || 'Pa gen anyen.';
            document.getElementById('w-list').innerHTML = withdrawals.map(w => `
                <div class="p-4 bg-gray-800 rounded flex justify-between items-center border border-blue-700">
                    <span class="text-xs"><b>${w.amount}G</b> | Nimewo: ${w.method}</span>
                    <button onclick="confW(${w.id})" class="bg-blue-600 px-3 py-1 rounded text-xs">KONFIME</button>
                </div>`).join('') || 'Pa gen anyen.';
        }
        async function confD(id) { await fetch('/admin/confirm-deposit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key, id}) }); fetchAll(); }
        async function confW(id) { await fetch('/admin/confirm-withdrawal', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key, id}) }); fetchAll(); }
        if(key === "hugues") { fetchAll(); setInterval(fetchAll, 5000); }
    </script>
</body>
</html>
