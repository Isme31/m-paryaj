<!DOCTYPE html>
<html>
<head><title>Blitz Admin</title><script src="https://tailwindcss.com"></script></head>
<body class="bg-[#020617] text-white p-10">
    <h1 class="text-3xl font-black text-blue-500 mb-10 italic uppercase border-b border-white/10 pb-4">Blitz Panel</h1>
    <div class="grid md:grid-cols-2 gap-10">
        <div class="bg-white/5 p-6 rounded-[40px] border border-green-500/20">
            <h2 class="text-lg font-black mb-4 text-green-400 italic tracking-widest uppercase">Depo Pandye</h2>
            <div id="d-list" class="space-y-3"></div>
        </div>
        <div class="bg-white/5 p-6 rounded-[40px] border border-blue-500/20">
            <h2 class="text-lg font-black mb-4 text-blue-400 italic tracking-widest uppercase">Retrè Pandye</h2>
            <div id="w-list" class="space-y-3"></div>
        </div>
    </div>
    <script>
        const key = new URLSearchParams(window.location.search).get('key');
        if(key !== "hugues") document.body.innerHTML = "<h1 class='text-center text-red-500 mt-20 font-black'>AKSÈ REFIZE</h1>";
        async function fetchAll() {
            const res = await fetch(`/admin/data?key=${key}`);
            const { deposits, withdrawals } = await res.json();
            document.getElementById('d-list').innerHTML = deposits.map(d => `<div class="p-4 bg-slate-900 rounded-2xl flex justify-between items-center text-xs"><span><b>${d.amount}G</b> | ${d.phone} | ID: ${d.transactionId}</span><button onclick="confD(${d.id})" class="bg-green-600 px-4 py-1 rounded-xl font-bold uppercase">OK</button></div>`).join('') || 'Vid.';
            document.getElementById('w-list').innerHTML = withdrawals.map(w => `<div class="p-4 bg-slate-900 rounded-2xl flex justify-between items-center text-xs"><span><b>${w.amount}G</b> | ${w.method}</span><button onclick="confW(${w.id})" class="bg-blue-600 px-4 py-1 rounded-xl font-bold uppercase">VOYE</button></div>`).join('') || 'Vid.';
        }
        async function confD(id) { await fetch('/admin/confirm-deposit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key, id}) }); fetchAll(); }
        async function confW(id) { await fetch('/admin/confirm-withdrawal', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key, id}) }); fetchAll(); }
        if(key === "hugues") { fetchAll(); setInterval(fetchAll, 5000); }
    </script>
</body>
</html>
