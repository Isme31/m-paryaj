<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8"><title>Admin ⚡</title>
    <style>
        body { background:#111; color:white; font-family:sans-serif; text-align:center; padding:20px; }
        .card { background:#222; border:1px solid #444; padding:15px; margin:10px auto; max-width:400px; border-radius:10px; text-align:left; }
        button { background:#28a745; color:white; border:none; padding:10px; cursor:pointer; width:100%; border-radius:5px; }
    </style>
</head>
<body>
    <h1>Depo an tann ⚡</h1>
    <div id="list">Ap chaje...</div>
    <script>
        const KEY = "hugues";
        async function load() {
            const res = await fetch('/admin/all-data?key='+KEY);
            const data = await res.json();
            document.getElementById('list').innerHTML = data.deposits.map(d => `
                <div class="card">
                    <p><b>Tel:</b> ${d.phone} | <b>${d.amount}G</b></p>
                    <p><b>ID:</b> ${d.transactionId}</p>
                    <button onclick="ok('${d._id}')">Konfime ✅</button>
                </div>
            `).join('') || "Pa gen depo.";
        }
        async function ok(id) {
            await fetch('/admin/confirm-deposit', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({key:KEY, id:id})
            });
            load();
        }
        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
