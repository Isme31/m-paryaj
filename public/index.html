<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f5f5f5; margin: 0; padding: 0; }
        .hidden { display: none; }

        /* HEADER */
        .top-nav { display: flex; justify-content: space-between; padding: 15px; background: white; align-items: center; }
        .logo { color: #1b5e20; font-weight: bold; font-size: 24px; }
        .balance-pill { background: #f1f8e9; color: #2e7d32; padding: 8px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #c8e6c9; }

        /* GREEN BANNER */
        .banner { background: linear-gradient(135deg, #1b5e20, #2e7d32); margin: 15px; border-radius: 15px; padding: 25px; color: white; position: relative; }
        .banner h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        .banner .service-info { background: rgba(0,0,0,0.1); margin-top: 15px; padding: 10px; border-radius: 10px; font-size: 13px; border: 1px solid rgba(255,255,255,0.2); }

        /* MAIN BUTTONS */
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .btn-action { padding: 20px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-gwoup { background-color: #4caf50; }
        .btn-retre { background-color: #ff9800; }

        /* GAME CARDS */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .badge { position: absolute; top: 10px; right: 10px; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; color: white; }
        .badge.aktif { background: #4caf50; }
        .badge.soon { background: #f44336; }
        .card-img { height: 120px; background: #fafafa; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eee; }
        .card-title { padding: 15px; font-weight: bold; color: #2e7d32; font-size: 14px; }

        /* REFERRAL BOX */
        .ref-box { background: white; margin: 0 15px 80px 15px; padding: 15px; border-radius: 10px; font-size: 14px; color: #666; text-align: left; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; }
        .nav-item { color: #999; font-size: 12px; text-decoration: none; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: #2e7d32; }

        /* LOGIN PAGE */
        .login-screen { padding: 40px 20px; text-align: center; }
        .login-input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .btn-login { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- PAJ KONEKSYON -->
    <div id="login-page" class="login-screen">
        <h1 style="color:#1b5e20">BLITZ</h1>
        <input type="number" id="phone" class="login-input" placeholder="Nimewo Telefòn">
        <input type="password" id="password" class="login-input" placeholder="Modpas">
        <button class="btn-login" onclick="login()">KONEKTE</button>
    </div>

    <!-- DASHBOARD (Menm jan ak foto a) -->
    <div id="game-page" class="hidden">
        <div class="top-nav">
            <div class="logo">BLITZ</div>
            <div class="balance-pill"><span id="u-balance">0</span> HTG</div>
        </div>

        <div class="banner">
            <h1>MOPYON BLITZ ⚡</h1>
            <div class="service-info">
                <b>SÈVIS (Depo / Retrè / Asistans):</b><br>
                Natcom: <span id="nat-num">55110103</span> | Digicel: <span id="dig-num">31594645</span>
            </div>
        </div>

        <div class="main-actions">
            <button class="btn-action btn-gwoup" onclick="window.location.href='https://wa.me'">Gwoup</button>
            <button class="btn-action btn-retre" onclick="showRetre()">Retrè</button>
        </div>

        <div class="game-grid">
            <div class="card" onclick="startMatch()">
                <span class="badge aktif">AKTIF</span>
                <div class="card-img"><img src="https://flaticon.com" width="50"></div>
                <div class="card-title">MOPYON</div>
            </div>
            <div class="card">
                <span class="badge soon">SOON</span>
                <div class="card-img"><img src="https://flaticon.com" width="50" style="filter: grayscale(1);"></div>
                <div class="card-title" style="color:#999">DOMINO</div>
            </div>
        </div>

        <div class="ref-box">
            Gagne <b>5 HTG</b> pa moun ou envite: <br>
            <small>Kòd ou: <span id="u-phone">...</span></small>
        </div>

        <div class="bottom-nav">
            <a href="#" class="nav-item active">Akey</a>
            <a href="#" class="nav-item" onclick="showRetre()">Retrè</a>
            <a href="#" class="nav-item">Èd</a>
        </div>
    </div>

    <script>
        const socket = io();
        let user = null;

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, password })
            });
            const data = await res.json();
            if(data.success) {
                user = data.user;
                localStorage.setItem('blitz_user', JSON.stringify(user));
                initApp();
            } else alert(data.msg);
        }

        function initApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('game-page').classList.remove('hidden');
            document.getElementById('u-phone').innerText = user.phone;
            setInterval(updateBalance, 5000);
            updateBalance();
        }

        async function updateBalance() {
            const res = await fetch(`/api/get-balance/${user.phone}`);
            const data = await res.json();
            if(data.success) document.getElementById('u-balance').innerText = data.balance;
        }

        function startMatch() {
            alert("Matchmaking ap kòmanse...");
            socket.emit('startMatchmaking', { phone: user.phone, bet: 50 });
        }

        function showRetre() {
            const amount = prompt("Konbyen ou vle rale?");
            if(amount) {
                fetch('/withdraw', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone: user.phone, amount: Number(amount) })
                }).then(r => r.json()).then(d => alert(d.msg));
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('blitz_user');
            if(saved) { user = JSON.parse(saved); initApp(); }
        }
    </script>
</body>
</html>
