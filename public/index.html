<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .screen { padding: 20px; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; width: 100%; max-width: 500px; margin: auto; background: #444; border: 2px solid #ff4757; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; border: 0.1px solid #222; }
        input, button { padding: 12px; margin: 5px 0; width: 90%; border-radius: 8px; border: none; font-size: 15px; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
        .bal-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        #timer { font-size: 24px; color: #ff4757; font-weight: bold; margin: 10px 0; }
        .social-links { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .social-links a { background: #25d366; color: white; text-decoration: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        #game-over-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="auth-screen" class="screen">
        <h1 style="color:#ff4757">Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE</button>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="game-screen" class="screen hidden">
        <div class="bal-box">
            <h2 style="color: #0f0;"><span id="bal">0</span> G</h2>
            <button onclick="showDepoMenu()" style="background:#2ecc71; width:45%;">DEPO 💰</button>
            <button onclick="requestWithdraw()" style="background:#ffa502; width:45%;">RETRÈ 💸</button>
        </div>

        <div class="social-links">
            <a href="https://whatsapp.com" target="_blank">📲 Gwoup WhatsApp</a>
            <a href="https://wa.me" target="_blank" style="background:#3498db;">👨‍💻 Asistan</a>
        </div>

        <div id="lobby">
            <h3>Kreye Chanm Privé 🔒</h3>
            <input type="number" id="bet" value="100" style="width: 80px; text-align: center;">
            <button onclick="createPrivate()" style="background: #2ecc71;">KREYE KÒD</button>
            
            <div id="display-code" class="hidden" style="margin-top:15px; border: 2px dashed #ff4757; padding: 10px;">
                <p>Voye kòd sa a bay zanmi w:</p>
                <h1 id="room-code-val" style="color: #ff4757; letter-spacing: 5px;">----</h1>
                <button id="share-btn" style="background:#25d366; width: auto;">Voye sou WhatsApp 📲</button>
            </div>
            <hr style="margin: 20px 0; border: 0.5px solid #333;">
            <h3>Antre nan yon Chanm</h3>
            <input type="text" id="join-code" placeholder="Mete kòd la">
            <button onclick="joinPrivate()" style="background: #ffa502;">ANTRE NAN MATCH</button>
        </div>

        <!-- GAME BOARD -->
        <div id="board-container" class="hidden">
            <div id="timer">30s</div>
            <div id="status" style="margin-bottom: 10px;">Atann...</div>
            <div id="board" class="grid"></div>
        </div>
    </div>

    <!-- MODAL FINI MATCH -->
    <div id="game-over-modal" class="hidden">
        <h1 id="result-text" style="font-size:40px;"></h1>
        <p id="prize-text" style="color:#0f0; font-size:24px; font-weight: bold;"></p>
        <button onclick="restartLobby()" style="background:#2ecc71; width:200px; padding:15px; margin-bottom:10px;">REJWE 🎮</button>
        <button onclick="location.reload()" style="background:#333; width:200px; padding:10px;">DEKONEKTE 🚪</button>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(225).fill("");
        let timerInterval, timeLeft = 30, currentPrize = 0;

        async function login() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password }) });
            const data = await res.json();
            if (data.success) { 
                myPhone = data.phone; 
                document.getElementById('bal').innerText = data.balance; 
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('game-screen').classList.remove('hidden'); 
            } else alert(data.msg);
        }

        function showDepoMenu() {
            const chwa = confirm("OK: MONCASH (3159-4645)\nANNULER: NATCASH (5511-0103)");
            const ph = chwa ? "50931594645" : "50955110103";
            window.open(`https://wa.me{ph}?text=Mwen%20vle%20fè%20yon%20depo%20pou%20${myPhone}`, '_blank');
        }

        async function requestWithdraw() {
            const amt = prompt("Montan retrè (Min 100G):");
            if (!amt || amt < 100) return alert("Minimòm se 100G");
            const res = await fetch('/request-withdraw', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: myPhone, amount: parseFloat(amt) }) });
            const data = await res.json();
            if(data.success) { 
                window.open(`https://wa.me?text=*RETRÈ*%0AJwè: ${myPhone}%0AMontan: ${amt}G`, '_blank'); 
                document.getElementById('bal').innerText = data.newBalance; 
                alert("Demann voye!"); 
            } else alert(data.msg);
        }

        function createPrivate() { socket.emit('createPrivate', { phone: myPhone, bet: document.getElementById('bet').value }); }
        function joinPrivate() { socket.emit('joinPrivate', { code: document.getElementById('join-code').value.trim(), phone: myPhone }); }

        socket.on('roomCreated', data => {
            document.getElementById('room-code-val').innerText = data.code;
            document.getElementById('display-code').classList.remove('hidden');
            document.getElementById('share-btn').onclick = () => { window.open(`https://wa.me{data.code}*%20Mise:%20${data.bet}G`, '_blank'); };
        });

        function startTimer() {
            clearInterval(timerInterval); timeLeft = 30;
            document.getElementById('timer').innerText = "30s";
            timerInterval = setInterval(() => {
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft + "s";
                if (timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    if (myTurn) socket.emit('win', { room: currentRoom, phone: "ADVÈSÈ", prize: currentPrize }); 
                }
            }, 1000);
        }

        function clearBoard() {
            boardData = Array(225).fill("");
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => { cell.innerText = ""; cell.style.color = "white"; });
        }

        socket.on('gameStart', data => {
            clearBoard();
            currentRoom = data.room; currentPrize = data.prize;
            mySymbol = data.firstTurn === myPhone ? 'X' : 'O'; myTurn = (data.firstTurn === myPhone);
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('board-container').classList.remove('hidden');
            renderBoard();
            document.getElementById('status').innerText = myTurn ? "Tou pa w! ("+mySymbol+")" : "Atann lòt la...";
            if(myTurn) startTimer();
        });

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((c, i) => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c;
                if(c === 'X') d.style.color = '#ff4757'; else if(c === 'O') d.style.color = '#3498db';
                d.onclick = () => {
                    if(!myTurn || boardData[i] !== "") return;
                    boardData[i] = mySymbol; myTurn = false; 
                    clearInterval(timerInterval); 
                    renderBoard();
                    socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
                    if(checkVictory(i, mySymbol)) {
                        socket.emit('win', { room: currentRoom, phone: myPhone, prize: currentPrize });
                    }
                };
                b.appendChild(d);
            });
        }

        socket.on('opponentMove', data => { 
            boardData[data.index] = data.symbol; 
            myTurn = true; 
            renderBoard(); 
            document.getElementById('status').innerText = "Tou pa w! ("+mySymbol+")";
            startTimer(); 
        });

        function checkVictory(index, symbol) {
            const size = 15; const row = Math.floor(index / size); const col = index % size;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of dirs) {
                let count = 1;
                for (let i=1; i<5; i++) { 
                    let r=row+dr*i, c=col+dc*i; 
                    if(r>=0 && r<size && c>=0 && c<size && boardData[r*size+c] === symbol) count++; else break; 
                }
                for (let i=1; i<5; i++) { 
                    let r=row-dr*i, c=col-dc*i; 
                    if(r>=0 && r<size && c>=0 && c<size && boardData[r*size+c] === symbol) count++; else break; 
                }
                if (count >= 5) return true;
            }
            return false;
        }

        socket.on('gameOver', data => {
            clearInterval(timerInterval);
            const modal = document.getElementById('game-over-modal');
            modal.classList.remove('hidden');
            if (data.winner === myPhone) {
                document.getElementById('result-text').innerText = "🎉 OU GANYEN!";
                document.getElementById('result-text').style.color = "#2ecc71";
                document.getElementById('prize-text').innerText = "+" + data.prize + " Goud";
            } else {
                document.getElementById('result-text').innerText = "💀 OU PÈDI!";
                document.getElementById('result-text').style.color = "#ff4757";
                document.getElementById('prize-text').innerText = "";
            }
            if(data.newBalance) document.getElementById('bal').innerText = data.newBalance;
        });

        function restartLobby() {
            document.getElementById('game-over-modal').classList.add('hidden');
            document.getElementById('board-container').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('display-code').classList.add('hidden');
            document.getElementById('join-code').value = "";
            clearBoard();
        }

        socket.on('errorMsg', msg => alert(msg));
        socket.on('balanceUpdate', d => { document.getElementById('bal').innerText = d.balance; });
    </script>
</body>
</html>
