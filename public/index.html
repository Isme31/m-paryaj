<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Games ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #ff4757; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .screen { padding: 15px; max-width: 450px; margin: auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; background: #444; border: 2px solid var(--primary); margin: 10px 0; }
        .cell { aspect-ratio: 1/1; background: #111; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; font-weight: bold; }
        #chat-box { height: 80px; overflow-y: auto; background: #000; border: 1px solid #333; font-size: 11px; text-align: left; padding: 5px; margin-bottom: 5px; }
        .social { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; }
        .social a { padding: 8px; border-radius: 5px; text-decoration: none; color: white; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-s" class="screen">
        <h1 style="color:var(--primary)">Blitz Games ⚡</h1>
        <div class="card">
            <input type="text" id="phone" placeholder="Telefòn" style="width:90%; padding:10px; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Modpas" style="width:90%; padding:10px;">
            <button class="btn" style="margin-top:10px" onclick="login()">KONEKTE / ENSKRI</button>
        </div>
    </div>

    <div id="menu-s" class="screen hidden">
        <div class="card">
            <h2 id="u-bal" style="color:#2ecc71">0 G</h2>
            <div class="social">
                <a href="https://whatsapp.com" style="background:#25d366">Gwoup WhatsApp</a>
                <a href="https://wa.me" style="background:#3498db">Asistan 👨‍💻</a>
            </div>
            <p style="font-size:10px; color:#aaa">Depo MonCash: 31594645 | NatCash: 55110103</p>
        </div>

        <div class="card">
            <h3>Paryaj (Komisyon 5%)</h3>
            <input type="number" id="bet" value="100" style="width:60px; padding:5px">
            <div style="display:flex; gap:5px; margin-top:10px">
                <button class="btn" onclick="create('mopyon')" style="font-size:12px">MOPYON ⚡</button>
                <button class="btn" onclick="create('domino')" style="background:#3498db; font-size:12px">DOMINO 🀄</button>
            </div>
            <div id="room-info" class="hidden" style="margin-top:10px; border:1px dashed var(--primary); padding:5px">
                Kòd: <b id="c-val" style="color:var(--primary); font-size:20px"></b>
            </div>
        </div>

        <div class="card">
            <input type="text" id="join-c" placeholder="Mete kòd match la">
            <button class="btn" onclick="join()" style="background:#ffa502; margin-top:5px">ANTRE NAN MATCH</button>
        </div>

        <div class="card" style="font-size:11px">
            Liy Referral: <input type="text" id="ref-l" readonly style="width:70%; font-size:10px; background:none; color:#2ecc71; border:none">
        </div>
    </div>

    <div id="game-s" class="screen hidden">
        <div id="timer" style="font-size:25px; color:var(--primary); font-weight:bold">30s</div>
        <div id="status">Atann...</div>
        <div id="board" class="grid"></div>
        
        <div class="card">
            <div id="chat-box"></div>
            <input type="text" id="chat-in" placeholder="Mesaj..." style="width:70%; background:black; color:white; border:1px solid #333">
            <button onclick="sendChat()" style="width:20%">OK</button>
        </div>
    </div>

    <script>
        const socket = io({ transports: ['websocket'] });
        let myP, myS, curR, curPrize, myT = false, boardData = Array(225).fill(""), timerInt;
        const refUrl = new URLSearchParams(window.location.search).get('ref');

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password, ref: refUrl }) });
            const d = await res.json();
            if(d.success) {
                myP = d.user.phone; document.getElementById('u-bal').innerText = d.user.balance + " G";
                document.getElementById('ref-l').value = window.location.origin + "?ref=" + myP;
                document.getElementById('auth-s').classList.add('hidden'); document.getElementById('menu-s').classList.remove('hidden');
            } else alert(d.msg);
        }

        function create(type) { socket.emit('createRoom', { phone: myP, bet: document.getElementById('bet').value, type }); }
        function join() { socket.emit('joinRoom', { code: document.getElementById('join-c').value, phone: myP }); }

        socket.on('roomCreated', d => { document.getElementById('c-val').innerText = d.code; document.getElementById('room-info').classList.remove('hidden'); });

        socket.on('gameStart', d => {
            curR = d.room; curPrize = d.prize; myS = (d.turn === myP) ? "X" : "O"; myT = (d.turn === myP);
            document.getElementById('menu-s').classList.add('hidden'); document.getElementById('game-s').classList.remove('hidden');
            renderBoard(); if(myT) startTimer();
        });

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const c = document.createElement('div'); c.className = 'cell'; c.innerText = val;
                if(val === 'X') c.style.color = 'red'; else if(val === 'O') c.style.color = 'cyan';
                c.onclick = () => {
                    if(!myT || boardData[i] !== "") return;
                    boardData[i] = myS; myT = false; renderBoard();
                    socket.emit('move', { room: curR, index: i, symbol: myS });
                    if(checkWin(i, myS)) socket.emit('win', { room: curR, phone: myP, prize: curPrize });
                };
                b.appendChild(c);
            });
        }

        function checkWin(idx, s) {
            const size = 15; const r = Math.floor(idx/size), c = idx%size;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of dirs) {
                let count = 1;
                for (let i=1; i<5; i++) { let nr=r+dr*i, nc=c+dc*i; if(nr>=0 && nr<15 && nc>=0 && nc<15 && boardData[nr*size+nc]===s) count++; else break; }
                for (let i=1; i<5; i++) { let nr=r-dr*i, nc=c-dc*i; if(nr>=0 && nr<15 && nc>=0 && nc<15 && boardData[nr*size+nc]===s) count++; else break; }
                if(count >= 5) return true;
            }
            return false;
        }

        function startTimer() {
            let s = 30; clearInterval(timerInt);
            timerInt = setInterval(() => {
                s--; document.getElementById('timer').innerText = s + "s";
                if(s <= 0) { clearInterval(timerInt); myT = false; document.getElementById('status').innerText = "Tan fini!"; }
            }, 1000);
        }

        socket.on('opponentMove', d => { boardData[d.index] = d.symbol; myT = true; renderBoard(); startTimer(); });

        socket.on('gameOver', d => {
            alert(d.winner === myP ? "BRAVO! OU GENYEN " + d.prize + "G" : "OU PÈDI MATCH LA!");
            location.reload();
        });

        function sendChat() {
            const msg = document.getElementById('chat-in').value;
            if(msg) socket.emit('chat', { room: curR, user: myP.slice(-4), msg });
            document.getElementById('chat-in').value = "";
        }
        socket.on('chatMsg', d => { document.getElementById('chat-box').innerHTML += `<div><b>${d.user}:</b> ${d.msg}</div>`; });
        socket.on('errorMsg', m => alert(m));
    </script>
</body>
</html>
