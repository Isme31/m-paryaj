<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #1b5e20; --accent: #2e7d32; --bg: #f4f7f6; --white: #ffffff; }
        body { background: var(--bg); color: #333; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .balance-pill { background: #e8f5e9; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .screen { padding: 15px; max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        .card-ui { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 92%; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; background: #ccc; border: 2px solid var(--primary); }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; color:var(--primary);"><i class="fas fa-bolt"></i> BLITZ</div>
        <div id="user-header" class="hidden"><span id="u-bal" class="balance-pill">0 HTG</span></div>
    </div>

    <!-- LOGIN -->
    <div id="auth-s" class="screen">
        <div class="card-ui" style="text-align:center; margin-top:50px;">
            <h2>Byenveni 👋</h2>
            <input type="text" id="phone" placeholder="Telefòn (8 chif)">
            <input type="password" id="pass" placeholder="Modpas">
            <button class="btn" onclick="login()">KONEKTE</button>
        </div>
    </div>

    <!-- MENU -->
    <div id="menu-s" class="screen hidden">
        <div class="card-ui" style="background: linear-gradient(135deg, var(--primary), var(--accent)); color:white;">
            <h3>MOPYON BLITZ ⚡</h3>
            <p>Antre yon miz pou kòmanse</p>
        </div>
        <div class="card-ui">
            <input type="number" id="bet" value="50">
            <button class="btn" onclick="startAutoMatch()">CHÈCHE MATCH</button>
        </div>
    </div>

    <!-- JWÈT -->
    <div id="game-s" class="screen hidden">
        <div class="card-ui" style="text-align:center;">
            <div id="turn-info" style="font-weight:bold; margin-bottom:10px;">Atann...</div>
            <div id="prize-info" style="color:green; font-weight:bold; margin-bottom:10px;"></div>
            <div class="grid" id="board"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone = "", mySymbol = "", isMyTurn = false, currentRoom = "", currentPrize = 0;

        function showS(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone, password }) 
            });
            const data = await res.json();
            if(data.success) {
                myPhone = data.user.phone;
                document.getElementById('u-bal').innerText = data.user.balance + " HTG";
                document.getElementById('user-header').classList.remove('hidden');
                showS('menu-s');
            } else alert(data.msg);
        }

        function startAutoMatch() {
            socket.emit('startMatchmaking', { phone: myPhone, bet: document.getElementById('bet').value });
        }

        socket.on('gameStart', data => {
            currentRoom = data.room;
            currentPrize = data.prize;
            mySymbol = (data.turn === myPhone) ? 'X' : 'O';
            isMyTurn = (data.turn === myPhone);
            document.getElementById('prize-info').innerText = "Pri: " + currentPrize + " HTG";
            document.getElementById('turn-info').innerText = isMyTurn ? "VOU SE TOUPW!" : "ATANN LÒT LA...";
            renderBoard();
            showS('game-s');
        });

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = "";
            for(let i=0; i<225; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => makeMove(i);
                board.appendChild(cell);
            }
        }

        function makeMove(i) {
            if(!isMyTurn) return;
            const cells = document.querySelectorAll('.cell');
            if(cells[i].innerText !== "") return;
            cells[i].innerText = mySymbol;
            isMyTurn = false;
            document.getElementById('turn-info').innerText = "ATANN LÒT LA...";
            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
            // Isit la ou ka ajoute lojik pou tcheke si moun nan genyen (5 nan liy)
        }

        socket.on('opponentMove', data => {
            const cells = document.querySelectorAll('.cell');
            cells[data.index].innerText = data.symbol;
            isMyTurn = true;
            document.getElementById('turn-info').innerText = "VOU SE TOUPW!";
        });

        socket.on('updateBalance', bal => {
            document.getElementById('u-bal').innerText = bal + " HTG";
        });

        socket.on('gameOver', data => {
            alert("Jwèt fini! Winner: " + data.winner);
            location.reload();
        });

        socket.on('errorMsg', msg => alert(msg));
    </script>
</body>
</html>
