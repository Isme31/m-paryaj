<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #1b5e20; --accent: #2e7d32; --bg: #f4f7f6; --white: #ffffff; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        .header { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; color: var(--primary); font-size: 20px; }
        .balance-pill { background: #e8f5e9; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .screen { padding: 15px; max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        .card-ui { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; background: #999; border: 2px solid var(--primary); margin-top: 10px; }
        .cell { aspect-ratio: 1/1; background: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { border: none; background: none; color: #888; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><i class="fas fa-bolt"></i> BLITZ</div>
        <div id="user-header" class="hidden"><span id="u-bal" class="balance-pill">0 HTG</span></div>
    </div>

    <!-- LOGIN -->
    <div id="auth-s" class="screen">
        <div class="card-ui" style="text-align:center;">
            <h1>Byenveni 👋</h1>
            <input type="text" id="phone" placeholder="Nimewo Telefòn">
            <button class="btn" onclick="login()">KONEKTE</button>
        </div>
    </div>

    <!-- AKÈY -->
    <div id="menu-s" class="screen hidden">
        <div class="card-ui" style="background: var(--primary); color: white;">
            <h2>MOPYON BLITZ ⚡</h2>
            <p>Jwe kont moun nan tout peyi a!</p>
            <button class="btn" style="background:white; color:var(--primary);" onclick="startMatchmaking()">JWÈT RAPID (50 HTG)</button>
        </div>

        <div class="card-ui">
            <h3>Match Prive</h3>
            <input type="number" id="bet" value="50" placeholder="Miz">
            <button class="btn" onclick="create()">KREYE KÒD</button>
            <div id="room-info" class="hidden"><p>Kòd: <b id="c-val"></b></p></div>
            <hr>
            <input type="text" id="join-c" placeholder="Kòd zanmi w">
            <button class="btn" style="background:#ffa502" onclick="join()">ANTRE</button>
        </div>
    </div>

    <!-- JWÈT -->
    <div id="game-s" class="screen hidden">
        <div class="card-ui" style="text-align:center;">
            <h3 id="game-status">Atann...</h3>
            <div id="board" class="grid"></div>
        </div>
    </div>

    <!-- NAVBAR -->
    <div id="nav" class="nav-bar hidden">
        <button class="nav-item active" onclick="showS('menu-s')"><i class="fas fa-home"></i><br>Akèy</button>
        <button class="nav-item" onclick="alert('Istorik vid')"><i class="fas fa-history"></i><br>Istorik</button>
        <button class="nav-item" onclick="alert('Depo: 55110103')"><i class="fas fa-wallet"></i><br>Bous</button>
    </div>

    <script>
        const socket = io();
        let myRoom = null;

        function showS(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function login() {
            const phone = document.getElementById('phone').value;
            if(phone) socket.emit('login', { phone });
        }

        socket.on('login-success', (user) => {
            document.getElementById('u-bal').innerText = user.bal + " HTG";
            document.getElementById('user-header').classList.remove('hidden');
            document.getElementById('nav').classList.remove('hidden');
            showS('menu-s');
        });

        function startMatchmaking() {
            socket.emit('join-matchmaking');
            document.getElementById('game-status').innerText = "Ap chèche advèsè...";
            showS('game-s');
        }

        function create() {
            socket.emit('create-room', { bet: document.getElementById('bet').value });
        }

        socket.on('room-created', (kod) => {
            document.getElementById('room-info').classList.remove('hidden');
            document.getElementById('c-val').innerText = kod;
        });

        function join() {
            const kod = document.getElementById('join-c').value.toUpperCase();
            if(kod) socket.emit('join-room', kod);
        }

        socket.on('match-found', (data) => {
            myRoom = data.room;
            showS('game-s');
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + i;
                cell.onclick = () => socket.emit('make-move', { room: myRoom, index: i });
                boardDiv.appendChild(cell);
            }
        });

        socket.on('update-board', (data) => {
            const cell = document.getElementById('cell-' + data.index);
            if(cell) {
                cell.innerText = data.symbol;
                cell.style.color = data.symbol === 'X' ? 'red' : 'blue';
            }
            document.getElementById('game-status').innerText = (data.nextTurn === socket.id) ? "TOUR PA W!" : "Atann...";
        });

        socket.on('game-over', (data) => {
            alert(data.winner === socket.id ? "OU GENYEN! 🏆" : "OU PÈDI! ❌");
            location.reload();
        });

        socket.on('error-msg', (msg) => alert(msg));
    </script>
</body>
</html>
