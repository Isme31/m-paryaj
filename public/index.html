<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #1b5e20; --accent: #2e7d32; --bg: #f4f7f6; --white: #ffffff; }
        body { background: var(--bg); color: #333; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .header { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: var(--primary); font-size: 20px; }
        .balance-pill { background: #e8f5e9; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .screen { padding: 15px; max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        .card-ui { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .banner-info { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: var(--white); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); position: relative; cursor: pointer; }
        .game-card img { width: 100%; height: 120px; object-fit: cover; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 92%; margin-bottom: 10px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><i class="fas fa-bolt"></i> BLITZ</div>
        <div id="user-header" class="hidden"><span id="u-bal" class="balance-pill">0 HTG</span></div>
    </div>

    <!-- ECRAN LOGIN -->
    <div id="auth-s" class="screen">
        <div class="card-ui" style="text-align: center; margin-top: 40px;">
            <h1 style="color:var(--primary); margin-bottom:5px;">Byenveni 👋</h1>
            <p style="color:var(--accent); font-weight:bold; font-style:italic;">" Jwe, Genyen, Touche "</p>
            <input type="text" id="phone" placeholder="Nimewo Telefòn">
            <input type="password" id="pass" placeholder="Modpas">
            <button class="btn" onclick="login()">KONEKTE</button>
        </div>
    </div>

    <!-- ECRAN MENU -->
    <div id="menu-s" class="screen hidden">
        <div class="banner-info">
            <h2 style="margin:0">MOPYON BLITZ ⚡</h2>
            <p style="font-size: 11px;">Sèvis: 55110103 | 31594645</p>
        </div>

        <div class="card-ui" style="display:flex; gap:10px;">
            <button class="btn" style="background:#25d366; margin:0;" onclick="window.open('https://whatsapp.com')">Gwoup</button>
            <button class="btn" style="background:#ffa502; margin:0;" onclick="showS('withdraw-s')">Retrè</button>
        </div>

        <div class="game-grid">
            <div class="game-card" onclick="document.getElementById('mopyon-opts').classList.toggle('hidden')">
                <img src="https://unsplash.com" alt="Mopyon">
                <h4 style="text-align:center; padding:10px;">MOPYON</h4>
            </div>
            <div class="game-card" style="opacity: 0.6;" onclick="alert('Byento!')">
                <img src="https://unsplash.com" alt="Domino">
                <h4 style="text-align:center; padding:10px;">DOMINO</h4>
            </div>
        </div>

        <div id="mopyon-opts" class="hidden card-ui" style="margin-top:20px;">
            <p style="font-size:12px; font-weight:bold; margin-bottom:5px;">CHWAZI MIZ HTG</p>
            <input type="number" id="bet" value="50">
            <button class="btn" style="background:#1976d2;" onclick="startAutoMatch()">JWENN MATCH (AUTO)</button>
            <hr>
            <button class="btn" style="background:#444" onclick="createRoom()">KREYE KÒD PRIVÉ</button>
            <input type="text" id="join-c" placeholder="Kòd yon zanmi" style="margin-top:10px">
            <button class="btn" style="background:#ffa502" onclick="joinRoom()">ANTRE NAN MATCH</button>
        </div>
    </div>

    <!-- ECRAN RETRÈ -->
    <div id="withdraw-s" class="screen hidden">
        <div class="card-ui">
            <h3>Fè yon Retrè (Min 100G)</h3>
            <input type="number" id="w-amt" placeholder="Montan HTG">
            <button class="btn" onclick="sendWithdraw()">KONFIME RETRÈ</button>
            <button class="btn" style="background:#888" onclick="showS('menu-s')">TOUNEN</button>
        </div>
    </div>

    <!-- MODAL WAITING (30s TIMER) -->
    <div id="modal-waiting" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center;">
        <div class="loader" style="width:50px; height:50px; border:4px solid #f3f3f3; border-top:4px solid #1b5e20;"></div>
        <h3 style="margin-top:20px;">Recherche d'adversaire...</h3>
        <p style="font-size:20px;">Temps: <span id="timer-val" style="color:#ffa502; font-weight:bold;">30</span>s</p>
        <button class="btn" style="background:red; width:auto; padding:10px 40px; margin-top:20px;" onclick="cancelMatch()">ANILE</button>
    </div>

    <script>
        const socket = io();
        let myPhone = "", timerInterval;

        function showS(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        async function login() {
            const phone = document.getElementById('phone').value, password = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password }) });
            const data = await res.json();
            if(data.success) {
                myPhone = data.user.phone; document.getElementById('u-bal').innerText = data.user.balance + " HTG";
                document.getElementById('user-header').classList.remove('hidden'); showS('menu-s');
            } else alert(data.msg);
        }

        async function sendWithdraw() {
            const amount = document.getElementById('w-amt').value;
            const res = await fetch('/withdraw', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: myPhone, amount: Number(amount) }) });
            const data = await res.json(); alert(data.msg); if(data.success) location.reload();
        }

        function startAutoMatch() {
            const bet = document.getElementById('bet').value;
            if(bet < 50) return alert("Miz minimòm lan se 50G");
            document.getElementById('modal-waiting').classList.remove('hidden');
            socket.emit('startMatchmaking', { phone: myPhone, bet: bet });

            let sec = 30;
            document.getElementById('timer-val').innerText = sec;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                sec--; document.getElementById('timer-val').innerText = sec;
                if(sec <= 0) { cancelMatch(); alert("Aucun adversaire trouvé. Réessaye !"); }
            }, 1000);
        }

        function cancelMatch() { clearInterval(timerInterval); socket.emit('cancelMatchmaking', document.getElementById('bet').value); document.getElementById('modal-waiting').classList.add('hidden'); }
        function createRoom() { socket.emit('createRoom', { phone: myPhone, bet: document.getElementById('bet').value }); }
        function joinRoom() { socket.emit('joinRoom', { phone: myPhone, code: document.getElementById('join-c').value }); }

        socket.on('gameStart', data => { clearInterval(timerInterval); document.getElementById('modal-waiting').classList.add('hidden'); alert("Match trouvé ! Bonne chance."); });
        socket.on('updateBalance', bal => { document.getElementById('u-bal').innerText = bal + " HTG"; });
        socket.on('errorMsg', msg => { cancelMatch(); alert(msg); });
    </script>
</body>
</html>
