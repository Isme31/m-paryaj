<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Jwèt ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; width: 100%; max-width: 400px; margin: auto; background: #444; border: 1px solid #ff4757; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
        .domino { background: white; color: black; padding: 10px; border-radius: 5px; margin: 5px; font-weight: bold; cursor: pointer; display: inline-block; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; border: none; font-size: 14px; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
        .bal-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        #timer { font-size: 24px; color: #ff4757; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1 style="color:#ff4757">Blitz Jwèt ⚡</h1>
        <input type="text" id="phone" placeholder="Telefòn"><br>
        <input type="password" id="pass" placeholder="Modpas"><br>
        <button onclick="login()">KONEKTE</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="bal-box">
            <h2 id="bal">0 G</h2>
            <button onclick="createRoom('mopyon')" style="background:#ff4757; width:45%;">MOPYON</button>
            <button onclick="createRoom('domino')" style="background:#3498db; width:45%;">DOMINO</button>
        </div>

        <div id="lobby">
            <p>Mise (Min 50G):</p>
            <input type="number" id="bet" value="50" min="50" style="width:80px; text-align:center;">
            <div id="display-code" class="hidden">
                <p>Kòd Chanm:</p>
                <h2 id="room-code" style="color:#ff4757; letter-spacing:3px;"></h2>
                <button onclick="shareWS()" style="background:#25d366">Voye sou WhatsApp 📲</button>
            </div>
            <hr>
            <input type="text" id="join-code" placeholder="Mete kòd zanmi w">
            <button onclick="joinRoom()" style="background:#ffa502">ANTRE NAN MATCH</button>
            <hr>
            <p style="font-size:12px;">Referral: <span id="ref-link" style="color:#0f0;"></span></p>
        </div>

        <div id="game-area" class="hidden">
            <div id="timer">30s</div>
            <div id="status" style="margin-bottom:10px;">Atann...</div>
            <div id="mopyon-board" class="grid hidden"></div>
            <div id="domino-board" class="hidden">
                <div id="table" style="background:#0a4d1e; min-height:120px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; padding:10px;"></div>
                <div id="my-hand" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;">
        <h1 id="res-txt" style="font-size:40px;"></h1>
        <p id="prz-txt" style="color:#0f0; font-size:24px;"></p>
        <button onclick="location.reload()" style="background:#2ecc71; padding:15px 40px;">REJWE 🎮</button>
    </div>

    <script>
        const socket = io();
        let myPhone, myTurn = false, boardData = Array(225).fill(""), timerInterval, currentRoom, currentPrize, myType;
        const ref = new URLSearchParams(window.location.search).get('ref');

        async function login() {
            const phone = document.getElementById('phone').value, password = document.getElementById('pass').value;
            const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, password, ref}) });
            const data = await res.json();
            if(data.success) {
                myPhone = data.phone; document.getElementById('bal').innerText = data.balance + " G";
                document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('ref-link').innerText = window.location.origin + "?ref=" + myPhone;
            } else alert(data.msg || "Erè");
        }

        function createRoom(type) { socket.emit('createRoom', { phone: myPhone, bet: document.getElementById('bet').value, type }); }
        function joinRoom() { socket.emit('joinRoom', { code: document.getElementById('join-code').value.trim(), phone: myPhone }); }
        function shareWS() { window.open(`https://wa.me{document.getElementById('room-code').innerText}*`, '_blank'); }

        socket.on('roomCreated', d => { document.getElementById('room-code').innerText = d.code; document.getElementById('display-code').classList.remove('hidden'); });

        socket.on('gameStart', d => {
            currentRoom = d.room; currentPrize = d.prize; myTurn = (d.firstTurn === myPhone); myType = d.type;
            document.getElementById('lobby').classList.add('hidden'); document.getElementById('game-area').classList.remove('hidden');
            if(d.type === 'mopyon') { document.getElementById('mopyon-board').classList.remove('hidden'); renderMopyon(); }
            else { document.getElementById('domino-board').classList.remove('hidden'); renderDomino(d.hands[myPhone]); }
            updateStatus(); startTimer();
        });

        function startTimer() {
            let left = 30; clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                left--; document.getElementById('timer').innerText = left + "s";
                if(left <= 0) { clearInterval(timerInterval); if(myTurn) socket.emit('win', {room: currentRoom, phone: "ADVÈSÈ"}); }
            }, 1000);
        }

        function updateStatus() { document.getElementById('status').innerText = myTurn ? "Tou pa w!" : "Atann lòt la..."; }

        function renderMopyon() {
            const b = document.getElementById('mopyon-board'); b.innerHTML = "";
            boardData.forEach((c, i) => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c;
                if(c==='X') d.style.color='#ff4757'; else if(c==='O') d.style.color='#3498db';
                d.onclick = () => {
                    if(myTurn && !boardData[i]) {
                        boardData[i] = 'X'; myTurn = false; socket.emit('move', {room: currentRoom, index: i, symbol: 'X'});
                        renderMopyon(); updateStatus(); if(checkWin(i, 'X')) socket.emit('win', {room: currentRoom, phone: myPhone});
                    }
                };
                b.appendChild(d);
            });
        }

        function checkWin(idx, s) {
            const size=15; const r=Math.floor(idx/size), c=idx%size; const dirs=[,,,[1,-1]];
            for(let [dr,dc] of dirs) {
                let cnt=1;
                for(let i=1;i<5;i++) { let nr=r+dr*i, nc=c+dc*i; if(nr>=0&&nr<15&&nc>=0&&nc<15&&boardData[nr*size+nc]===s) cnt++; else break; }
                for(let i=1;i<5;i++) { let nr=r-dr*i, nc=c-dc*i; if(nr>=0&&nr<15&&nc>=0&&nc<15&&boardData[nr*size+nc]===s) cnt++; else break; }
                if(cnt>=5) return true;
            } return false;
        }

        function renderDomino(hand) {
            const h = document.getElementById('my-hand'); h.innerHTML = "";
            hand.forEach((d, i) => {
                const c = document.createElement('div'); c.className = 'domino'; c.innerText = `${d[0]}|${d[1]}`;
                c.onclick = () => { if(myTurn) { 
                    socket.emit('move', {room: currentRoom, domino: d}); 
                    hand.splice(i,1); renderDomino(hand); myTurn = false; updateStatus();
                    document.getElementById('table').innerHTML += `<div class="domino">${d[0]}|${d[1]}</div>`;
                    if(hand.length === 0) socket.emit('win', {room: currentRoom, phone: myPhone});
                }};
                h.appendChild(c);
            });
        }

        socket.on('opponentMove', d => { 
            myTurn = true; updateStatus(); startTimer(); 
            if(myType === 'mopyon') { boardData[d.index] = 'O'; renderMopyon(); }
            else { document.getElementById('table').innerHTML += `<div class="domino">${d.domino[0]}|${d.domino[1]}</div>`; }
        });

        socket.on('gameOver', d => { 
            clearInterval(timerInterval); document.getElementById('game-over-modal').classList.remove('hidden');
            document.getElementById('res-txt').innerText = d.winner === myPhone ? "🎉 OU GANYEN!" : "💀 OU PÈDI!";
            document.getElementById('prz-txt').innerText = d.winner === myPhone ? "+" + d.prize + "G" : "";
        });

        socket.on('errorMsg', m => alert(m));
    </script>
</body>
</html>
