<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡ | Jwe & Touche</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #1b5e20; --accent: #ffa502; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; text-align: center; }
        .hidden { display: none !important; }
        .screen { padding: 15px; max-width: 500px; margin: auto; }
        .card-ui { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 92%; margin-bottom: 10px; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; background: var(--primary); border: 2px solid var(--primary); margin: auto; width: 95vw; height: 95vw; max-width: 400px; max-height: 400px; }
        .cell { background: white; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; cursor: pointer; }
        #game-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; padding-top: 20px; }
    </style>
</head>
<body>

    <div style="background:white; padding:15px; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <b style="color:var(--primary); font-size:20px;">BLITZ ⚡</b>
        <span id="bal-display" class="hidden" style="background:#e8f5e9; color:var(--primary); padding:6px 12px; border-radius:20px; font-weight:bold;">0 HTG</span>
    </div>

    <!-- LOGIN -->
    <div id="auth-s" class="screen">
        <div class="card-ui">
            <h1>Byenveni 👋</h1>
            <p style="color:var(--primary); font-style:italic; font-weight:bold;">" Jwe, Genyen, Touche "</p>
            <input type="text" id="phone" placeholder="Nimewo Telefòn">
            <input type="password" id="pass" placeholder="Modpas">
            <button class="btn" onclick="login()">KONEKTE</button>
        </div>
    </div>

    <!-- MENU -->
    <div id="menu-s" class="screen hidden">
        <div class="card-ui" style="background: linear-gradient(135deg, #1b5e20, #2e7d32); color:white; text-align:left;">
            <h3 style="margin:0">MOPYON BLITZ ⚡</h3>
            <p style="font-size:10px; opacity:0.8;">Natcom: 55110103 | Digicel: 31594645</p>
        </div>
        <button class="btn" onclick="showS('mopyon-opts')">JWE MOPYON</button>
        <button class="btn" style="background:var(--accent)" onclick="showS('withdraw-s')">DEMANN RETRÈ</button>
        <button class="btn" style="background:#25d366" onclick="window.open('https://wa.me')">DEPO (WHATSAPP)</button>
    </div>

    <!-- MOPYON OPTIONS -->
    <div id="mopyon-opts" class="screen hidden">
        <div class="card-ui">
            <h3>Konfigirasyon Match</h3>
            <input type="number" id="bet" value="50" placeholder="Miz HTG">
            <button class="btn" onclick="startMatchmaking()">MATCH OTOMATIK</button>
            <div style="margin:20px 0; border-top:1px solid #eee; padding-top:10px;">
                <input type="text" id="p-code" placeholder="Antre Kòd Chanm">
                <button class="btn" style="background:#444" onclick="joinPrivate()">KREYE / ANTRE CHANM</button>
            </div>
            <button class="btn" style="background:#999" onclick="showS('menu-s')">RETOUNEN</button>
        </div>
    </div>

    <!-- WITHDRAW -->
    <div id="withdraw-s" class="screen hidden">
        <div class="card-ui">
            <h3>Mande Retrè</h3>
            <input type="number" id="w-amount" placeholder="Montan HTG (Min 100)">
            <button class="btn" onclick="withdraw()">VOYE DEMANN</button>
            <button class="btn" style="background:#ccc; color:333" onclick="showS('menu-s')">ANILE</button>
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="game-overlay" class="hidden">
        <h3 id="match-status" style="color:var(--primary)">Chache moun...</h3>
        <div id="turn-info" style="margin-bottom:10px; font-weight:bold; font-size:18px;"></div>
        <div class="grid" id="board-grid"></div>
        <button class="btn" style="background:#e74c3c; width:150px; margin-top:20px;" onclick="location.reload()">KITE JWÈT</button>
    </div>

    <script>
        const socket = io();
        let user, room, symbol, myTurn, prize, board = Array(15).fill().map(() => Array(15).fill(''));

        function showS(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function login() {
            const phone = document.getElementById('phone').value, password = document.getElementById('pass').value;
            const ref = new URLSearchParams(window.location.search).get('ref');
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password, ref }) });
            const data = await res.json();
            if(data.success) {
                user = data.user;
                showS('menu-s');
                document.getElementById('bal-display').classList.remove('hidden');
                updateUI();
            } else alert(data.msg);
        }

        function updateUI() { document.getElementById('bal-display').innerText = user.balance + " HTG"; }

        function startMatchmaking() {
            const bet = document.getElementById('bet').value;
            if(user.balance < bet) return alert("Balans ou ensifizan!");
            socket.emit('startMatchmaking', { phone: user.phone, bet });
            document.getElementById('game-overlay').classList.remove('hidden');
        }

        function joinPrivate() {
            const code = document.getElementById('p-code').value, bet = document.getElementById('bet').value;
            if(!code) return alert("Antre yon kòd!");
            socket.emit('joinPrivate', { roomCode: code, phone: user.phone, bet });
            document.getElementById('game-overlay').classList.remove('hidden');
        }

        socket.on('match-status', (msg) => { document.getElementById('match-status').innerText = msg; });

        socket.on('gameStart', (data) => {
            room = data.room; prize = data.prize;
            symbol = (data.turn === user.phone) ? 'X' : 'O';
            myTurn = (data.turn === user.phone);
            document.getElementById('match-status').innerText = "Match Lanse! Ou se: " + symbol + " | Pri: " + prize + " HTG";
            renderBoard(); updateTurnText();
        });

        socket.on('opponentMove', (data) => {
            board[data.r][data.c] = data.symbol;
            myTurn = true; renderBoard(); updateTurnText();
        });

        function renderBoard() {
            const grid = document.getElementById('board-grid'); grid.innerHTML = '';
            for(let r=0; r<15; r++) {
                for(let c=0; c<15; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.innerText = board[r][c];
                    if(board[r][c] === 'X') cell.style.color = '#d32f2f';
                    if(board[r][c] === 'O') cell.style.color = '#1976d2';
                    cell.onclick = () => makeMove(r, c);
                    grid.appendChild(cell);
                }
            }
        }

        function makeMove(r, c) {
            if(!myTurn || board[r][c] !== '') return;
            board[r][c] = symbol; myTurn = false;
            renderBoard(); updateTurnText();
            socket.emit('move', { room, r, c, symbol });
            // Isit la ou ka ajoute win logic pou tcheke 5 alignés
        }

        function updateTurnText() {
            const info = document.getElementById('turn-info');
            info.innerText = myTurn ? "SE TOU PA W! ⚡" : "Atann opozan an...";
            info.style.color = myTurn ? "var(--primary)" : "#888";
        }

        async function withdraw() {
            const amount = document.getElementById('w-amount').value;
            const res = await fetch('/withdraw', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: user.phone, amount }) });
            const data = await res.json();
            alert(data.msg); if(data.success) location.reload();
        }

        socket.on('updateBalance', (b) => { user.balance = b; updateUI(); });
        socket.on('errorMsg', (m) => { alert(m); location.reload(); });
        socket.on('gameOver', (d) => { alert("Jwèt Fini! Ganyan: " + d.winner); location.reload(); });
    </script>
</body>
</html>
