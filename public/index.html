<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #ff4757; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .screen { padding: 15px; max-width: 450px; margin: auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; background: #444; border: 2px solid var(--primary); margin: 10px 0; }
        .cell { aspect-ratio: 1/1; background: #111; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; font-weight: bold; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; width: 85%; }
    </style>
</head>
<body>

    <!-- AUTH -->
    <div id="auth-s" class="screen">
        <h1 style="color:var(--primary)">Mopyon Blitz ⚡</h1>
        <div class="card">
            <input type="text" id="phone" placeholder="Nimewo Telefòn">
            <input type="password" id="pass" placeholder="Modpas" style="margin-top:10px">
            <button class="btn" onclick="login()">KONEKTE</button>
        </div>
    </div>

    <!-- MENU -->
    <div id="menu-s" class="screen hidden">
        <div class="card">
            <h2 id="u-bal" style="color:#2ecc71">0 G</h2>
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:10px;">
                <a href="https://whatsapp.com" target="_blank" style="color:#25d366; text-decoration:none; font-size:13px">Gwoup WhatsApp</a>
                <a href="https://wa.me" target="_blank" style="color:#3498db; text-decoration:none; font-size:13px">Asistan 👨‍💻</a>
            </div>
            <button class="btn" style="background:#ffa502; width:auto; padding:5px 15px;" onclick="showS('withdraw-s')">RETRÈ 💸</button>
        </div>
        <div class="card">
            <h3 style="color:var(--primary); margin:0">MOPYON BLITZ</h3>
            Miz: <input type="number" id="bet" value="100" style="width:60px">
            <button class="btn" onclick="create()">KREYE KÒD</button>
            <div id="room-info" class="hidden" style="margin-top:10px; border:1px dashed var(--primary); padding:10px">
                Kòd: <b id="c-val" style="color:var(--primary); font-size:25px; letter-spacing:5px">----</b>
            </div>
        </div>
        <div class="card">
            <input type="text" id="join-c" placeholder="Kòd match">
            <button class="btn" onclick="join()" style="background:#ffa502">ANTRE NAN MATCH</button>
        </div>
    </div>

    <!-- RETRÈ -->
    <div id="withdraw-s" class="screen hidden">
        <div class="card">
            <h3>Mande Retrè (Min 100G)</h3>
            <input type="number" id="w-amt" placeholder="Montan">
            <button class="btn" onclick="submitW()">VALIDE</button>
            <button class="btn" style="background:#444" onclick="showS('menu-s')">RETOUNEN</button>
        </div>
    </div>

    <!-- JWÈT -->
    <div id="game-s" class="screen hidden">
        <h3 style="color:var(--primary); margin:0">MOPYON BLITZ ⚡</h3>
        <div id="timer" style="font-size:25px; color:red; font-weight:bold">30s</div>
        <div id="status">Atann...</div>
        <div id="board" class="grid"></div>
    </div>

    <script>
        const socket = io({ transports: ['websocket'] });
        let myP, myS, curR, curPrize, curBet, myT = false, boardData = [], timerInt;

        function showS(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        async function login() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('pass').value;
            const ref = new URLSearchParams(window.location.search).get('ref');
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password, ref }) });
            const d = await res.json();
            if(d.success) { myP = d.user.phone; document.getElementById('u-bal').innerText = d.user.balance + " G"; showS('menu-s'); }
            else alert(d.msg);
        }

        async function submitW() {
            const amount = document.getElementById('w-amt').value;
            const res = await fetch('/request-withdraw', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: myP, amount }) });
            const d = await res.json();
            if(d.success) { document.getElementById('u-bal').innerText = d.newBalance + " G"; alert("Demann voye!"); showS('menu-s'); }
            else alert(d.msg);
        }

        function create() { socket.emit('createRoom', { phone: myP, bet: document.getElementById('bet').value }); }
        function join() { socket.emit('joinRoom', { code: document.getElementById('join-c').value.trim(), phone: myP }); }

        socket.on('roomCreated', d => { document.getElementById('c-val').innerText = d.code; document.getElementById('room-info').classList.remove('hidden'); });

        socket.on('gameStart', d => {
            curR = d.room; curPrize = d.prize; curBet = d.bet;
            myS = (d.turn === myP) ? "X" : "O"; myT = (d.turn === myP);
            boardData = Array(225).fill("");
            showS('game-s'); renderBoard(); if(myT) startTimer();
            document.getElementById('status').innerText = myT ? "Se tou pa w! ("+myS+")" : "Atann advèsè a...";
        });

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const c = document.createElement('div'); c.className = 'cell'; c.innerText = val;
                if(val === 'X') c.style.color = 'red'; else if(val === 'O') c.style.color = 'cyan';
                c.onclick = () => {
                    if(!myT || boardData[i] !== "") return;
                    boardData[i] = myS; myT = false; renderBoard();
                    socket.emit('move', { room: curR, index: i, symbol: myS });
                    if(checkWin(i, myS)) socket.emit('win', { room: curR, phone: myP, prize: curPrize });
                    else document.getElementById('status').innerText = "Atann advèsè a...";
                };
                b.appendChild(c);
            });
        }

        function checkWin(idx, s) {
            const size = 15; const r = Math.floor(idx/size), c = idx%size;
            const dirs = [{x:0,y:1},{x:1,y:0},{x:1,y:1},{x:1,y:-1}];
            for (let d of dirs) {
                let cnt = 1;
                for (let i=1; i<5; i++) { let nr=r+d.x*i, nc=c+d.y*i; if(nr>=0 && nr<15 && nc>=0 && nc<15 && boardData[nr*size+nc]===s) cnt++; else break; }
                for (let i=1; i<5; i++) { let nr=r-d.x*i, nc=c-d.y*i; if(nr>=0 && nr<15 && nc>=0 && nc<15 && boardData[nr*size+nc]===s) cnt++; else break; }
                if(cnt >= 5) return true;
            }
            return false;
        }

        function startTimer() {
            let s = 30; clearInterval(timerInt);
            timerInt = setInterval(() => {
                s--; document.getElementById('timer').innerText = s + "s";
                if(s <= 0) { clearInterval(timerInt); }
            }, 1000);
        }

        socket.on('opponentMove', d => {
            boardData[d.index] = d.symbol; myT = true; renderBoard(); startTimer();
            document.getElementById('status').innerText = "Se tou pa w! ("+myS+")";
        });

        socket.on('gameOver', d => {
            clearInterval(timerInt);
            alert(d.winner === myP ? "OU GENYEN! 🎉" : "OU PÈDI! 💀");
            document.getElementById('u-bal').innerText = d.newBalance + " G";
            showS('menu-s');
        });

        socket.on('errorMsg', m => alert(m));
    </script>
</body>
</html>
