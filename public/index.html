<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon & Domino ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; width: 100%; max-width: 400px; margin: auto; background: #444; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        .domino { background: white; color: black; padding: 10px; border-radius: 5px; margin: 5px; font-weight: bold; cursor: pointer; display: inline-block; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; border: none; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1>Blitz Jwèt ⚡</h1>
        <input type="text" id="phone" placeholder="Telefòn"><input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div style="background:#1e1e1e; padding:10px; border-radius:10px; margin-bottom:10px;">
            <h2 id="bal">0</h2>
            <button onclick="createRoom('mopyon')" style="background:#ff4757">MOPYON</button>
            <button onclick="createRoom('domino')" style="background:#3498db">DOMINO</button>
        </div>
        
        <div id="lobby">
            <input type="number" id="bet" value="50" min="50" style="width:60px">
            <input type="text" id="join-code" placeholder="Kòd">
            <button onclick="joinRoom()" style="background:#ffa502">ANTRE</button>
            <div id="display-code" class="hidden"><h2 id="room-code"></h2><p>Voye l bay zanmi w</p></div>
        </div>

        <div id="game-area" class="hidden">
            <div id="timer" style="font-size:20px; color:red;">30s</div>
            <div id="status">Atann...</div>
            <div id="mopyon-board" class="grid hidden"></div>
            <div id="domino-board" class="hidden">
                <div id="table" style="background:green; min-height:100px; margin:10px; padding:10px; display:flex; align-items:center; justify-content:center; flex-wrap:wrap;"></div>
                <div id="my-hand"></div>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);padding-top:100px;">
        <h1 id="res-txt"></h1><button onclick="location.reload()">REJWE</button>
    </div>

    <script>
        const socket = io();
        let myPhone, myTurn = false, boardData = Array(225).fill(""), timer, currentRoom, currentPrize;

        async function login() {
            const phone = document.getElementById('phone').value, password = document.getElementById('pass').value;
            const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, password, ref:new URLSearchParams(window.location.search).get('ref')}) });
            const data = await res.json();
            if(data.success) { myPhone = data.phone; document.getElementById('bal').innerText = data.balance + " G"; document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('game-screen').classList.remove('hidden'); }
        }

        function createRoom(type) { socket.emit('createRoom', { phone: myPhone, bet: document.getElementById('bet').value, type }); }
        function joinRoom() { socket.emit('joinRoom', { code: document.getElementById('join-code').value, phone: myPhone }); }

        socket.on('roomCreated', d => { document.getElementById('room-code').innerText = d.code; document.getElementById('display-code').classList.remove('hidden'); });

        socket.on('gameStart', d => {
            currentRoom = d.room; currentPrize = d.prize; myTurn = (d.firstTurn === myPhone);
            document.getElementById('lobby').classList.add('hidden'); document.getElementById('game-area').classList.remove('hidden');
            if(d.type === 'mopyon') { document.getElementById('mopyon-board').classList.remove('hidden'); renderMopyon(); }
            else { document.getElementById('domino-board').classList.remove('hidden'); renderDomino(d.hands[myPhone]); }
            startTimer();
        });

        function startTimer() {
            let left = 30; clearInterval(timer);
            timer = setInterval(() => {
                left--; document.getElementById('timer').innerText = left + "s";
                if(left <= 0) { clearInterval(timer); if(myTurn) socket.emit('win', {room: currentRoom, phone: "ADVÈSÈ", prize: currentPrize}); }
            }, 1000);
        }

        function renderMopyon() {
            const b = document.getElementById('mopyon-board'); b.innerHTML = "";
            boardData.forEach((c, i) => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c;
                d.onclick = () => { if(myTurn && !boardData[i]) { boardData[i] = 'X'; myTurn = false; socket.emit('move', {room: currentRoom, index: i, symbol: 'X'}); renderMopyon(); } };
                b.appendChild(d);
            });
        }

        function renderDomino(hand) {
            const h = document.getElementById('my-hand'); h.innerHTML = "";
            hand.forEach(d => {
                const c = document.createElement('div'); c.className = 'domino'; c.innerText = `${d[0]}|${d[1]}`;
                c.onclick = () => { if(myTurn) { socket.emit('move', {room: currentRoom, domino: d}); myTurn = false; } };
                h.appendChild(c);
            });
        }

        socket.on('opponentMove', d => { myTurn = true; startTimer(); });
        socket.on('gameOver', d => { clearInterval(timer); document.getElementById('game-over-modal').classList.remove('hidden'); document.getElementById('res-txt').innerText = d.winner === myPhone ? "OU GANYEN!" : "OU PÈDI!"; });
    </script>
</body>
</html>
