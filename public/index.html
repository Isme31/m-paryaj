<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #1b5e20; --accent: #ffa502; --bg: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Header */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--primary); font-weight: 800; font-size: 26px; }
        .balance-pill { background: #f1f8f1; color: var(--primary); padding: 8px 18px; border-radius: 25px; font-weight: bold; border: 1px solid #e0eee0; font-size: 18px; }

        /* Banyè Vèt la */
        .banner { background: #2e7d32; margin: 15px; padding: 30px 20px; border-radius: 20px; color: white; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .banner h2 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
        .service-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 15px; margin-top: 20px; font-size: 13px; line-height: 1.5; }

        /* Bouton Aksyon */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .btn-act { border: none; padding: 18px; border-radius: 15px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-gwoup { background: #5cb85c; }
        .btn-retre { background: #ff9800; }

        /* Kat Jwèt yo */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px 15px; }
        .game-card { background: white; padding: 30px 10px; border-radius: 20px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: relative; border: 1px solid #f0f0f0; }
        .badge { position: absolute; top: 12px; right: 12px; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; color: white; }
        .badge-aktif { background: #4caf50; }
        .badge-soon { background: #f44336; }
        .game-card img { width: 55px; height: auto; margin-bottom: 15px; }
        .game-card span { display: block; font-weight: 800; color: #777; font-size: 16px; letter-spacing: 1px; }

        /* Baw Navigasyon anba */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #f0f0f0; }
        .nav-item { color: #bbb; font-weight: bold; font-size: 13px; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- PAJ AKEY (Dakey) -->
    <div id="menu-s">
        <div class="header">
            <div class="logo">BLITZ</div>
            <div id="u-bal" class="balance-pill">100 HTG</div>
        </div>

        <div class="banner">
            <h2>MOPYON BLITZ ⚡</h2>
            <div class="service-box">
                <b>SÈVIS (Depo / Retrè / Asistans):</b><br>
                Natcom: 55110103 | Digicel: 31594645
            </div>
        </div>

        <div class="action-grid">
            <button class="btn-act btn-gwoup" onclick="window.open('https://wa.me')">Gwoup</button>
            <button class="btn-act btn-retre" onclick="showS('withdraw-s')">Retrè</button>
        </div>

        <div class="game-grid">
            <!-- Mopyon Card -->
            <div class="game-card" onclick="showS('mopyon-opts')">
                <span class="badge badge-aktif">AKTIF</span>
                <img src="https://flaticon.com" alt="Mopyon">
                <span>MOPYON</span>
            </div>
            <!-- Domino Card -->
            <div class="game-card">
                <span class="badge badge-soon">SOON</span>
                <img src="https://flaticon.com" alt="Domino">
                <span style="color:#ccc">DOMINO</span>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active">AKEY</div>
            <div class="nav-item" onclick="showS('withdraw-s')">RETRÈ</div>
            <div class="nav-item" onclick="window.open('https://wa.me')">ÈD</div>
        </div>
    </div>

    <!-- PAJ RETRÈ (Seksyon ki te manke a) -->
    <div id="withdraw-s" class="hidden" style="padding: 20px; text-align: center;">
        <div style="background:white; padding:30px; border-radius:25px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
            <h2 style="color:var(--primary)">Mande Retrè</h2>
            <input type="number" id="w-amount" placeholder="Montan HTG (Min 100)" style="width:100%; padding:15px; margin:20px 0; border-radius:12px; border:1px solid #ddd;">
            <button class="btn-act btn-retre" style="width:100%;" onclick="withdraw()">KONFIME</button>
            <button class="btn-act" style="width:100%; background:#eee; color:#555; margin-top:10px;" onclick="showS('menu-s')">RETOUNEN</button>
        </div>
    </div>

    <script>
        const socket = io();
        let user = { balance: 100, phone: "55110103" }; // Egzanp pou tès

        function showS(id) {
            document.querySelectorAll('#menu-s, #withdraw-s, #mopyon-opts, #game-overlay').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function withdraw() {
            const amount = document.getElementById('w-amount').value;
            if(amount < 100) return alert("Minimòm se 100 HTG");
            
            const res = await fetch('/withdraw', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone: user.phone, amount: Number(amount) }) 
            });
            const data = await res.json();
            if(data.success) {
                alert("Demann voye! L'ap parèt nan MongoDB ou.");
                showS('menu-s');
            }
        }
    </script>
</body>
</html>
