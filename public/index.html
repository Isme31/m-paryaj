<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #1b5e20; --accent: #2e7d32; --bg: #f4f7f6; --white: #ffffff; }
        body { background: var(--bg); color: #333; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .balance-pill { background: #e8f5e9; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .screen { padding: 15px; max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        .card-ui { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 92%; margin-bottom: 10px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; color:var(--primary); font-size:20px;">BLITZ</div>
        <div id="user-header" class="hidden"><span id="u-bal" class="balance-pill">0 HTG</span></div>
    </div>

    <!-- LOGIN -->
    <div id="auth-s" class="screen">
        <div class="card-ui" style="text-align:center; margin-top:40px;">
            <h2>Byenveni 👋</h2>
            <input type="text" id="phone" placeholder="Nimewo Telefòn">
            <input type="password" id="pass" placeholder="Modpas">
            <button class="btn" onclick="login()">KONEKTE</button>
        </div>
    </div>

    <!-- MENU -->
    <div id="menu-s" class="screen hidden">
        <div class="card-ui" style="background: linear-gradient(135deg, var(--primary), var(--accent)); color:white;">
            <h3>MOPYON BLITZ ⚡</h3>
            <p style="font-size:12px;">Sèvis: 55110103 | 31594645</p>
        </div>

        <div id="mopyon-opts" class="card-ui">
            <input type="number" id="bet" value="50">
            
            <button class="btn" style="background:#1976d2;" onclick="startAutoMatch()">JWENN ADVÈSÈ (AUTO)</button>
            <button class="btn" style="background:#444;" onclick="createRoom()">KREYE KÒD PRIVÉ</button>
            
            <div id="room-info" class="hidden" style="text-align:center; margin-top:10px;">
                <p>Kòd Match ou: <b id="c-val" style="font-size:20px; color:green;"></b></p>
            </div>

            <hr>
            <input type="text" id="join-c" placeholder="Antre Kòd zanmi w">
            <button class="btn" style="background:#ffa502;" onclick="joinRoom()">ANTRE NAN MATCH</button>
        </div>
    </div>

    <!-- MODAL WAITING AVÈK TIMER -->
    <div id="modal-waiting" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center;">
        <div class="loader" style="width:50px; height:50px;"></div>
        <h3 style="margin-top:20px;">N ap chèche yon advèsè...</h3>
        <p>Tan ki rete: <span id="timer-val" style="font-weight:bold; color:#ffa502;">30</span> segond</p>
        <button class="btn" style="background:#d32f2f; width:auto; padding:10px 30px;" onclick="cancelMatch()">ANILE</button>
    </div>

    <script>
        const socket = io();
        let myPhone = "", matchmakingTimeout, timerInterval;

        function showS(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        async function login() {
            const phone = document.getElementById('phone').value, password = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password }) });
            const data = await res.json();
            if(data.success) {
                myPhone = data.user.phone;
                document.getElementById('u-bal').innerText = data.user.balance + " HTG";
                document.getElementById('user-header').classList.remove('hidden');
                showS('menu-s');
            } else alert(data.msg);
        }

        function startAutoMatch() {
            const bet = document.getElementById('bet').value;
            document.getElementById('modal-waiting').classList.remove('hidden');
            socket.emit('startMatchmaking', { phone: myPhone, bet: bet });

            // TIMER 30 SEGOND
            let timeLeft = 30;
            document.getElementById('timer-val').innerText = timeLeft;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if(timeLeft <= 0) {
                    cancelMatch();
                    alert("Pa gen moun ki disponib kounye a. Eseye ankò!");
                }
            }, 1000);
        }

        function cancelMatch() {
            clearInterval(timerInterval);
            socket.emit('cancelMatchmaking', document.getElementById('bet').value);
            document.getElementById('modal-waiting').classList.add('hidden');
        }

        function createRoom() { socket.emit('createRoom', { phone: myPhone, bet: document.getElementById('bet').value }); }
        function joinRoom() { socket.emit('joinRoom', { phone: myPhone, code: document.getElementById('join-c').value }); }

        socket.on('roomCreated', data => {
            document.getElementById('c-val').innerText = data.code;
            document.getElementById('room-info').classList.remove('hidden');
        });

        socket.on('gameStart', data => {
            clearInterval(timerInterval);
            document.getElementById('modal-waiting').classList.add('hidden');
            alert("Match kòmanse! Pri: " + data.prize + " HTG");
            // Lojik pou ouvri tablo a isit la...
        });

        socket.on('updateBalance', bal => { document.getElementById('u-bal').innerText = bal + " HTG"; });
        socket.on('errorMsg', msg => { cancelMatch(); alert(msg); });
    </script>
</body>
</html>
