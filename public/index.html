    <script>
        const socket = io();
        let myPhone, myType = 'mopyon', myHand = [], currentRoom = "";
        const refParam = new URLSearchParams(window.location.search).get('ref');

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, password, ref: refParam}) });
            const d = await res.json();
            if(d.success) {
                myPhone = d.phone; document.getElementById('bal').innerText = d.balance;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('ref-link').value = window.location.origin + "?ref=" + myPhone;
            } else alert(d.msg);
        }

        function setGame(t) { 
            myType = t; 
            document.getElementById('btnM').style.opacity = t==='mopyon'?'1':'0.5';
            document.getElementById('btnD').style.opacity = t==='domino'?'1':'0.5';
        }

        function createRoom() { socket.emit('createPrivate', { phone: myPhone, bet: document.getElementById('bet').value, game: myType }); }
        function joinRoom() { socket.emit('joinPrivate', { code: document.getElementById('join-code').value, phone: myPhone }); }
        
        socket.on('roomCreated', d => { document.getElementById('c-val').innerText = d.code; document.getElementById('room-display').classList.remove('hidden'); });

        socket.on('gameStart', d => {
            currentRoom = d.room;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('board-container').classList.remove('hidden');
            updateStatus(d.turn);
        });

        socket.on('receiveHand', d => {
            myHand = d.hands[myPhone];
            renderHand();
        });

        socket.on('updateBoard', d => {
            const b = document.getElementById('domino-board'); b.innerHTML = "";
            d.board.forEach(t => { b.innerHTML += `<div class="tile"><div>${t.a}</div><div>${t.b}</div></div>`; });
            updateStatus(d.turn);
            renderHand();
        });

        function renderHand() {
            const h = document.getElementById('my-hand'); h.innerHTML = "";
            myHand.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'tile my-tile';
                div.innerHTML = `<div>${t.a}</div><div>${t.b}</div>`;
                div.onclick = () => socket.emit('dominoMove', { room: currentRoom, phone: myPhone, tile: t, index: i });
                h.appendChild(div);
            });
        }

        function updateStatus(turn) {
            const s = document.getElementById('status');
            s.innerText = (turn === myPhone) ? "Se tou pa w!" : "Lòt jwè a ap jwe...";
            s.style.color = (turn === myPhone) ? "#0f0" : "#fff";
        }

        async function withdraw() {
            const a = prompt("Konbe ou vle retire?");
            if(a >= 100) {
                const res = await fetch('/request-withdraw', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone:myPhone, amount:a}) });
                const d = await res.json();
                if(d.success) { document.getElementById('bal').innerText = d.newBalance; alert("Retrè mande!"); } else alert(d.msg);
            }
        }

        function copyRef() { const l = document.getElementById("ref-link"); l.select(); navigator.clipboard.writeText(l.value); alert("Lyen kopye!"); }

        socket.on('playerSkipped', d => alert(d.skipped === myPhone ? "Ou boure! Tou a pase." : "Lòt la boure!"));
        socket.on('gameOver', d => { alert("Match fini! Ganyan: " + d.winner); location.reload(); });
        socket.on('errorMsg', m => alert(m));
    </script>
