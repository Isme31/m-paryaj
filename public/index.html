<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .screen { padding: 20px; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; width: 100%; max-width: 500px; margin: auto; background: #444; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; cursor: pointer; }
        input, button { padding: 12px; margin: 5px 0; width: 90%; border-radius: 8px; border: none; font-size: 15px; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
        .bal-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1 style="color:#ff4757">Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="bal-box">
            <h2 style="color: #0f0;"><span id="bal">0</span> G</h2>
            <button onclick="showDepoMenu()" style="background:#2ecc71; width:45%;">DEPO 💰</button>
            <button onclick="requestWithdraw()" style="background:#ffa502; width:45%;">RETRÈ 💸</button>
        </div>
        <div id="lobby">
            <input type="number" id="bet" value="50" min="50" style="text-align:center;">
            <button onclick="findMatch()">MATCH RAPID</button>
        </div>
        <div id="board-container" class="hidden">
            <div id="status" style="margin-bottom:10px;">Atann...</div>
            <div id="board" class="grid"></div>
            <button onclick="location.reload()" style="background:#333; margin-top:10px;">KITE MATCH LA</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(225).fill("");

        async function login() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone, password }) 
            });
            const data = await res.json();
            if (data.success) {
                myPhone = data.phone;
                document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            } else alert(data.msg);
        }

        function showDepoMenu() {
            const chwa = confirm("OK: MONCASH (3159-4645)\nANNULER: NATCASH (5511-0103)");
            const ph = chwa ? "50931594645" : "50955110103";
            window.open(`https://wa.me{ph}?text=Mwen%20vle%20fè%20yon%20depo%20pou%20${myPhone}`, '_blank');
        }

        async function requestWithdraw() {
            const amt = prompt("Montan retrè (Min 100G):");
            if (!amt || amt < 100) return alert("Minimòm se 100G");
            const res = await fetch('/request-withdraw', { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone: myPhone, amount: parseFloat(amt) }) 
            });
            const data = await res.json();
            if(data.success) {
                const ph = "50931594645"; // Nimewo Admin
                const msg = `*RETRÈ MOPYON BLITZ*%0A👤 Jwè: ${myPhone}%0A💰 Montan: ${amt}G`;
                window.open(`https://wa.me{ph}?text=${msg}`, '_blank');
                document.getElementById('bal').innerText = data.newBalance;
                alert("Demann voye!");
            } else alert(data.msg);
        }

        function findMatch() { socket.emit('findMatch', { phone: myPhone, bet: document.getElementById('bet').value }); }

        socket.on('gameStart', data => {
            currentRoom = data.room; mySymbol = data.firstTurn === myPhone ? 'X' : 'O'; myTurn = (data.firstTurn === myPhone);
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('board-container').classList.remove('hidden');
            renderBoard();
            document.getElementById('status').innerText = myTurn ? "Se tou pa w!" : "Atann lòt la...";
        });

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((c, i) => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c;
                if(c === 'X') d.style.color = '#ff4757';
                if(c === 'O') d.style.color = '#3498db';
                d.onclick = () => {
                    if(!myTurn || boardData[i] !== "") return;
                    boardData[i] = mySymbol; myTurn = false; renderBoard();
                    document.getElementById('status').innerText = "Atann...";
                    socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
                };
                b.appendChild(d);
            });
        }

        socket.on('opponentMove', data => { 
            boardData[data.index] = data.symbol; myTurn = true; renderBoard(); 
            document.getElementById('status').innerText = "Se tou pa w!";
        });
        socket.on('gameOver', data => { alert(data.winner === myPhone ? "🎉 OU GANYEN!" : "💀 OU PÈDI!"); location.reload(); });
        socket.on('balanceUpdate', d => { document.getElementById('bal').innerText = d.balance; });
    </script>
</body>
</html>
