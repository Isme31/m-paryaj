<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f2f2f2; margin: 0; padding: 0; }
        .hidden { display: none !important; }

        /* --- STYLE PAJ KONEKSYON (LOGIN) --- */
        #login-page { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; width: 100%; 
        }
        .login-container { 
            background: white; width: 90%; max-width: 350px; padding: 40px 20px; 
            border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center; position: relative; 
        }
        .close-btn { position: absolute; top: 20px; right: 20px; color: #999; font-size: 20px; }
        .login-container h2 { color: #1b5e20; margin: 0; font-size: 28px; }
        .slogan { color: #2e7d32; font-style: italic; font-size: 13px; margin-bottom: 30px; font-weight: bold; }
        .input-group { border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; padding: 5px 15px; text-align: left; }
        .input-group input { border: none; width: 100%; padding: 12px 0; outline: none; font-size: 15px; }
        .btn-konekte { background: #1b5e20; color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .footer-logo { margin-top: 20px; font-weight: bold; font-size: 18px; letter-spacing: 2px; text-align: center; color: black; }

        /* --- STYLE PAJ DAKÈY (DASHBOARD) --- */
        #main-dashboard { width: 100%; background: #f5f5f5; min-height: 100vh; }
        .top-nav { display: flex; justify-content: space-between; padding: 15px; background: white; align-items: center; }
        .logo-green { color: #1b5e20; font-weight: bold; font-size: 24px; }
        .balance-pill { background: #f1f8e9; color: #2e7d32; padding: 8px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #c8e6c9; }
        .banner { background: linear-gradient(135deg, #1b5e20, #2e7d32); margin: 15px; border-radius: 15px; padding: 25px; color: white; }
        .banner h1 { margin: 0; font-size: 26px; }
        .service-info { background: rgba(0,0,0,0.1); margin-top: 15px; padding: 10px; border-radius: 10px; font-size: 12px; border: 1px solid rgba(255,255,255,0.2); }
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .btn-action { padding: 18px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; margin-bottom: 80px; }
        .card { background: white; border-radius: 15px; overflow: hidden; text-align: center; position: relative; padding-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        .badge { position: absolute; top: 10px; right: 10px; padding: 3px 10px; border-radius: 10px; font-size: 10px; color: white; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; }
        .nav-item { color: #999; font-size: 11px; text-decoration: none; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: #2e7d32; }
    </style>
</head>
<body>

    <!-- 1. BLÒK KONEKSYON (LOGIN) -->
    <div id="login-page">
        <div class="login-container">
            <div class="close-btn">✕</div>
            <h2>Byenveni 👋</h2>
            <p class="slogan">" Jwe, Genyen, Touche "</p>
            <div class="input-group"><input type="number" id="phone" placeholder="34343434"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Modpas"></div>
            <button class="btn-konekte" onclick="login()">Konekte</button>
        </div>
        <div class="footer-logo">BLITZ ⚡</div>
    </div>

    <!-- 2. BLÒK DASHBOARD (LÈ JWÈ FIN KONEKTE) -->
    <div id="main-dashboard" class="hidden">
        <div class="top-nav">
            <div class="logo-green">BLITZ</div>
            <div class="balance-pill"><span id="u-balance">0</span> HTG</div>
        </div>
        <div class="banner">
            <h1>MOPYON BLITZ ⚡</h1>
            <div class="service-info">
                <b>SÈVIS (Depo / Retrè / Asistans):</b><br>
                Natcom: 55110103 | Digicel: 31594645
            </div>
        </div>
        <div class="main-actions">
            <button class="btn-action" style="background:#4caf50;" onclick="window.location.href='https://wa.me'">Gwoup</button>
            <button class="btn-action" style="background:#ff9800;" onclick="showRetre()">Retrè</button>
        </div>
        <div class="game-grid">
            <div class="card" onclick="alert('Matchmaking ap kòmanse...')">
                <span class="badge" style="background:#4caf50">AKTIF</span>
                <div style="height:100px; display:flex; align-items:center; justify-content:center; font-size:40px;">🎮</div>
                <div style="font-weight:bold; color:#2e7d32">MOPYON</div>
            </div>
            <div class="card">
                <span class="badge" style="background:#f44336">SOON</span>
                <div style="height:100px; display:flex; align-items:center; justify-content:center; font-size:40px; opacity:0.3;">🎲</div>
                <div style="font-weight:bold; color:#999">DOMINO</div>
            </div>
        </div>
        <div class="bottom-nav">
            <a href="#" class="nav-item active">AKEY</a>
            <a href="#" class="nav-item" onclick="showRetre()">RETRÈ</a>
            <a href="#" class="nav-item">ÈD</a>
        </div>
    </div>

    <script>
        const socket = io();
        let user = null;

        // FONKSYON KONEKSYON
        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            if(!phone || !password) return alert("Ranpli bwat yo!");

            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, password })
            });
            const data = await res.json();
            if(data.success) {
                user = data.user;
                localStorage.setItem('blitz_user', JSON.stringify(user));
                initApp();
            } else {
                alert(data.msg || "Modpas pa bon!");
            }
        }

        // FONKSYON POU LIMEN DASHBOARD LA
        function initApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            setInterval(updateBalance, 5000); // Tcheke balans chak 5 segond
            updateBalance();
        }

        // REFRESH BALANS
        async function updateBalance() {
            if(!user) return;
            const res = await fetch(`/api/get-balance/${user.phone}`);
            const data = await res.json();
            if(data.success) document.getElementById('u-balance').innerText = data.balance;
        }

        function showRetre() {
            const amount = prompt("Konbyen ou vle rale?");
            if(amount) {
                fetch('/withdraw', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone: user.phone, amount: Number(amount) })
                }).then(r => r.json()).then(d => alert(d.msg));
            }
        }

        // TCHEKE SI JWÈ A TE DEJA KONEKTE LÈ L LOUVRI SIT LA
        window.onload = () => {
            const saved = localStorage.getItem('blitz_user');
            if(saved) {
                user = JSON.parse(saved);
                initApp();
            }
        };
    </script>
</body>
</html>
