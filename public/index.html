<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; margin: 0; }
        .hidden { display: none; }
        .container { padding: 20px; }
        
        /* Login Style */
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 10px; display: inline-block; margin-top: 50px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Dashboard */
        .header { background: #1e1e1e; padding: 15px; display: flex; justify-content: space-around; align-items: center; }
        .balance { color: #f1c40f; font-size: 20px; font-weight: bold; }
        .admin-info { background: #2980b9; padding: 10px; font-size: 14px; margin: 10px 0; border-radius: 5px; }

        /* Board Style */
        .grid { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 5px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; border-radius: 5px; }
        .cell:hover { background: #444; }
        
        .status { margin: 20px; font-size: 18px; color: #e67e22; }
    </style>
</head>
<body>

    <!-- PAJ KONEKSYON -->
    <div id="login-page" class="container">
        <div class="login-box">
            <h2>Mopyon Blitz ⚡</h2>
            <input type="number" id="phone" placeholder="Nimewo Telefòn">
            <input type="password" id="password" placeholder="Modpas">
            <br>
            <button onclick="login()">Konekte / Enskri</button>
            <p id="login-msg" style="color: #e74c3c;"></p>
        </div>
    </div>

    <!-- DASHBOARD JWÈT LA -->
    <div id="game-page" class="hidden">
        <div class="header">
            <div>📲 <span id="display-phone"></span></div>
            <div class="balance">💰 <span id="balance-amount">0</span> G</div>
            <button style="background:#c0392b" onclick="logout()">Soti</button>
        </div>

        <div class="admin-info">
            Depo: <b id="depo-num">...</b> | Retrè: <b id="retre-num">...</b>
            <br>
            <a id="wa-link" href="#" style="color:white; text-decoration:underline;">Kontakte Asistan WhatsApp</a>
        </div>

        <div id="lobby">
            <h3>Chwazi yon paryaj:</h3>
            <button onclick="startMatch(50)">50 G</button>
            <button onclick="startMatch(100)">100 G</button>
            <button onclick="startMatch(500)">500 G</button>
        </div>

        <div id="game-area" class="hidden">
            <div class="status" id="game-status">Nan match...</div>
            <div class="grid" id="board">
                <div class="cell" onclick="makeMove(0)"></div>
                <div class="cell" onclick="makeMove(1)"></div>
                <div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div>
                <div class="cell" onclick="makeMove(4)"></div>
                <div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div>
                <div class="cell" onclick="makeMove(7)"></div>
                <div class="cell" onclick="makeMove(8)"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let currentRoom = null;
        let mySymbol = '';
        let myTurn = false;

        // 1. KONEKSYON
        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, password })
            });
            const data = await res.json();
            
            if (data.success) {
                currentUser = data.user;
                localStorage.setItem('mopyon_user', JSON.stringify(data.user));
                showGamePage();
            } else {
                document.getElementById('login-msg').innerText = data.msg;
            }
        }

        // 2. REFRESH BALANS OTOMATIK
        async function refreshBalance() {
            if (!currentUser) return;
            const res = await fetch(`/api/get-balance/${currentUser.phone}`);
            const data = await res.json();
            if (data.success) {
                currentUser.balance = data.balance;
                document.getElementById('balance-amount').innerText = data.balance;
            }
        }

        function showGamePage() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('game-page').classList.remove('hidden');
            document.getElementById('display-phone').innerText = currentUser.phone;
            refreshBalance();
            loadAdminInfo();
            // Tcheke balans chak 5 segond pou depo moute otomatik
            setInterval(refreshBalance, 5000);
        }

        async function loadAdminInfo() {
            const res = await fetch('/api/admin-info');
            const data = await res.json();
            document.getElementById('depo-num').innerText = data.depo_phone;
            document.getElementById('retre-num').innerText = data.retre_phone;
            document.getElementById('wa-link').href = data.assistant_whatsapp;
        }

        // 3. LOGIK JWÈT
        function startMatch(bet) {
            if (currentUser.balance < bet) return alert("Balans ou piti!");
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('game-status').innerText = "Koneksyon ak yon advèsè...";
            socket.emit('startMatchmaking', { phone: currentUser.phone, bet });
        }

        socket.on('gameStart', (data) => {
            currentRoom = data.room;
            mySymbol = (data.turn === currentUser.phone) ? 'X' : 'O';
            myTurn = (data.turn === currentUser.phone);
            document.getElementById('game-status').innerText = myTurn ? "Se tou pa w!" : "Tou advèsè a...";
            resetBoard();
        });

        function makeMove(index) {
            if (!myTurn || document.getElementsByClassName('cell')[index].innerText !== '') return;
            
            document.getElementsByClassName('cell')[index].innerText = mySymbol;
            myTurn = false;
            document.getElementById('game-status').innerText = "Tou advèsè a...";
            socket.emit('move', { room: currentRoom, index, symbol: mySymbol });
            checkWinner();
        }

        socket.on('opponentMove', (data) => {
            document.getElementsByClassName('cell')[data.index].innerText = data.symbol;
            myTurn = true;
            document.getElementById('game-status').innerText = "Se tou pa w!";
        });

        socket.on('gameOver', (data) => {
            alert("Match fini! Ganyan: " + data.winner);
            location.reload(); 
        });

        function resetBoard() {
            const cells = document.getElementsByClassName('cell');
            for (let c of cells) c.innerText = '';
        }

        function logout() {
            localStorage.removeItem('mopyon_user');
            location.reload();
        }

        // Tcheke si jwè a te deja konekte
        window.onload = () => {
            const saved = localStorage.getItem('mopyon_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                showGamePage();
            }
        };
    </script>
</body>
</html>
