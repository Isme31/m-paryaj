<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding-bottom: 50px; }
        .screen { width: 100%; max-width: 500px; margin: auto; padding: 20px; box-sizing: border-box; }
        .hidden { display: none; }
        .header-box { background:#1e1e1e; padding:15px; border-radius:15px; border: 1px solid #333; margin-bottom: 20px; }
        input, button { padding: 15px; margin: 8px 0; border-radius: 12px; width: 100%; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #444; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; width: 100%; aspect-ratio: 1/1; margin: 15px auto; background: #444; border: 2px solid #444; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        .cell:empty:hover { background: #222; }
        .status-bar { background: #28a745; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- PAJ KONEKSYON -->
    <div id="auth-screen" class="screen">
        <h1 style="color:#ff4757;">Mopyon Blitz ⚡</h1>
        <p>Antre nimewo w ak yon modpas</p>
        <input type="text" id="phone" placeholder="Nimewo Telefòn (eg: 509...)">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE / ENSRI</button>
    </div>

    <!-- PAJ JWÈT LAN -->
    <div id="game-screen" class="screen hidden">
        <div class="header-box">
            <p>Balans: <span id="bal" style="color:#00ff00; font-size: 28px; font-weight:bold;">0</span> G</p>
            <div id="status" class="status-bar">Pare pou jwe!</div>
        </div>

        <div id="main-menu">
            <label>Montan Paryaj (G):</label>
            <input type="number" id="bet-amount" value="50" min="50">
            <label>Kòd Sekrè (pou jwe ak zanmi):</label>
            <input type="text" id="room-code" placeholder="Kite l vid pou match piblik">
            <button onclick="findMatch()" style="background:#ff4757; font-size: 18px;">⚡ JWENN MATCH</button>
        </div>

        <!-- TABLO JWÈT LAN -->
        <div id="board" class="grid hidden"></div>

        <!-- SEKSYON DEPO -->
        <div style="background:#1a1a1a; padding:15px; border-radius:15px; margin-top:30px; border: 1px solid #28a745;">
            <h3 style="color:#28a745;">Depo / Retrè</h3>
            <p style="font-size: 12px; color: #aaa;">Voye kòb la sou MonCash/Natcom nan anvan epi tape TID la isit la.</p>
            <input type="text" id="tid" placeholder="TID (Transaction ID)">
            <button onclick="voyeDepo()" style="background:#28a745;">KONFIME DEPO ✅</button>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <input type="number" id="ret-amt" placeholder="Montan pou retire">
            <button onclick="mandeRetrait()" style="background:#dc3545;">MANDE RETRÈ 💸</button>
        </div>
    </div>

    <script>
        const socket = io();
        const ADMIN_WA = "50931594645"; // Nimewo WhatsApp ou
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(100).fill(""), currentPrize = 0;

        async function login() {
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            if(!phone || !pass) return alert("Mete tout enfòmasyon yo!");
            
            const res = await fetch('/login', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone, password: pass }) 
            });
            const data = await res.json();
            if(data.success) {
                myPhone = data.phone; 
                document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('game-screen').classList.remove('hidden');
            } else {
                alert("Erè koneksyon!");
            }
        }

        function findMatch() {
            const bet = parseFloat(document.getElementById('bet-amount').value);
            const code = document.getElementById('room-code').value;
            if(bet < 50) return alert("Minimòm paryaj se 50G");
            socket.emit('findMatch', { phone: myPhone, bet, code });
        }

        async function voyeDepo() {
            const tid = document.getElementById('tid').value;
            if(!tid) return alert("Tanpri mete TID tranzaksyon an!");
            
            const msg = `⚡ DEPO: ${myPhone}\nTID: ${tid}\nMontan: 50G+`;
            // Voye sou WhatsApp
            window.open(`https://wa.me{ADMIN_WA}?text=${encodeURIComponent(msg)}`, '_blank');
            
            // Anrejistre nan MongoDB
            await fetch('/submit-deposit', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone: myPhone, tid, amount: 50, method: "Mobile" }) 
            });
            alert("Depo w la anrejistre! Admin nan ap verifye li.");
        }

        function mandeRetrait() {
            const amt = document.getElementById('ret-amt').value;
            if(amt < 100) return alert("Minimòm retrè se 100G");
            const msg = `💸 RETRÈ: ${myPhone}\nMontan: ${amt}G`;
            window.open(`https://wa.me{ADMIN_WA}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- SOSYETE JWÈT LAN ---
        socket.on('gameStart', (data) => {
            currentRoom = data.room; 
            currentPrize = data.prize;
            mySymbol = data.firstTurn === myPhone ? 'X' : 'O';
            myTurn = (data.firstTurn === myPhone);
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('board').classList.remove('hidden');
            renderBoard();
            updateStatus();
        });

        socket.on('opponentMove', (data) => { 
            boardData[data.index] = data.symbol; 
            myTurn = true; 
            renderBoard(); 
            updateStatus(); 
        });

        function updateStatus() {
            const statusDiv = document.getElementById('status');
            if(myTurn) {
                statusDiv.innerText = "Tou pa w! (" + mySymbol + ")";
                statusDiv.style.background = "#28a745";
            } else {
                statusDiv.innerText = "Tann advèsè a...";
                statusDiv.style.background = "#ffc107";
            }
        }

        function makeMove(i) {
            if(!myTurn || boardData[i] !== "") return;
            boardData[i] = mySymbol; 
            myTurn = false; 
            renderBoard();
            updateStatus();
            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
            
            if(checkWin(i, mySymbol)) { 
                socket.emit('win', { phone: myPhone, prize: currentPrize }); 
                alert("BRAVO! OU GANYEN " + currentPrize + "G!"); 
                location.reload(); 
            }
        }

        function renderBoard() {
            const b = document.getElementById('board'); 
            b.innerHTML = "";
            boardData.forEach((val, i) => {
                const cell = document.createElement('div'); 
                cell.className = 'cell'; 
                cell.innerText = val;
                if(val === 'X') cell.style.color = '#ff4757';
                if(val === 'O') cell.style.color = '#2ecc71';
                cell.onclick = () => makeMove(i); 
                b.appendChild(cell);
            });
        }

        function checkWin(idx, s) {
            const r=Math.floor(idx/10), c=idx%10, dirs=[[0,1],[1,0],[1,1],[1,-1]];
            return dirs.some(([dr, dc]) => {
                let count = 1;
                [1, -1].forEach(d => {
                    for(let i=1; i<5; i++) {
                        let nr=r+dr*i*d, nc=c+dc*i*d;
                        if(nr>=0 && nr<10 && nc>=0 && nc<10 && boardData[nr*10+nc]===s) count++; else break;
                    }
                });
                return count >= 5;
            });
        }

        socket.on('balanceUpdate', (data) => { 
            if(data.phone === myPhone) document.getElementById('bal').innerText = data.newBalance; 
        });

        socket.on('status_update', (msg) => {
            document.getElementById('status').innerText = msg;
        });
    </script>
</body>
</html>
