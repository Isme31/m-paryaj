<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #ff4757; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .screen { padding: 15px; max-width: 450px; margin: auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; background: #444; border: 2px solid var(--primary); }
        .cell { aspect-ratio: 1/1; background: #111; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        input { padding: 12px; border-radius: 8px; background: #000; color: white; border: 1px solid #333; width: 85%; }
        #modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="auth-s" class="screen">
        <h1 style="color:var(--primary)">Mopyon Blitz ⚡</h1>
        <div class="card">
            <input type="text" id="phone" placeholder="Nimewo Telefòn">
            <input type="password" id="pass" placeholder="Modpas" style="margin-top:10px">
            <button class="btn" onclick="login()">ANTRE</button>
        </div>
    </div>

    <div id="menu-s" class="screen hidden">
        <div class="card">
            <h2 id="u-bal" style="color:#2ecc71">0 G</h2>
            <p style="font-size:11px; color:#aaa">MonCash: <b>31594645</b> | NatCash: <b>55110103</b></p>
            <div style="display:flex; gap:10px; margin-top:10px">
                <button class="btn" style="background:#25d366" onclick="window.open('https://whatsapp.com')">Gwoup</button>
                <button class="btn" style="background:#ffa502" onclick="showS('withdraw-s')">RETRÈ</button>
            </div>
        </div>
        <div class="card">
            Miz: <input type="number" id="bet" value="100" style="width:60px">
            <button class="btn" onclick="create()">KREYE MATCH</button>
            <div id="room-info" class="hidden" style="margin-top:10px; color:var(--primary)">Kòd: <b id="c-val"></b></div>
        </div>
        <div class="card">
            <input type="text" id="join-c" placeholder="Kòd Match">
            <button class="btn" onclick="join()" style="background:#ffa502">ANTRE</button>
        </div>
    </div>

    <div id="withdraw-s" class="screen hidden">
        <div class="card">
            <h3>Paj Retrè (Min 100G)</h3>
            <p style="font-size:12px">Kontakte asistan an apre demann lan: 31594645</p>
            <input type="number" id="w-amt" placeholder="Montan">
            <button class="btn" onclick="alert('Demann voye!')">VOYE DEMANN</button>
            <button class="btn" style="background:#444" onclick="showS('menu-s')">RETOUNEN</button>
        </div>
    </div>

    <div id="game-s" class="screen hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:5px;">
            <button onclick="leaveGame()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">SOTI 🚪</button>
            <b id="timer" style="color:red; font-size:20px">30s</b>
        </div>
        <div id="status" style="font-size:12px; margin:5px">Atann...</div>
        <div id="board" class="grid"></div>
    </div>

    <div id="modal" class="hidden">
        <h1 id="res-t"></h1>
        <button class="btn" style="width:200px" onclick="rejwe()">REJWE 🎮</button>
        <button class="btn" style="width:200px; background:#444" onclick="leaveGame()">MENI 🏠</button>
    </div>

    <script>
        const socket = io({ transports: ['websocket'] });
        let myP, myS, curR, curP, curB, myT = false, boardData = [], timerInt;

        function showS(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        
        async function login() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password }) });
            const d = await res.json();
            if(d.success) { myP = d.user.phone; document.getElementById('u-bal').innerText = d.user.balance + " G"; showS('menu-s'); }
        }

        function create() { socket.emit('createRoom', { phone: myP, bet: document.getElementById('bet').value }); }
        function join() { socket.emit('joinRoom', { code: document.getElementById('join-c').value.trim(), phone: myP }); }

        socket.on('roomCreated', d => { document.getElementById('c-val').innerText = d.code; document.getElementById('room-info').classList.remove('hidden'); });

        socket.on('gameStart', d => {
            curR = d.room; curP = d.prize; curB = d.bet;
            myS = (d.turn === myP) ? "X" : "O"; myT = (d.turn === myP);
            boardData = Array(225).fill("");
            showS('game-s'); document.getElementById('modal').classList.add('hidden');
            renderBoard(); if(myT) startTimer();
        });

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const c = document.createElement('div'); c.className = 'cell'; c.innerText = val;
                if(val === 'X') c.style.color = 'red'; else if(val === 'O') c.style.color = 'cyan';
                c.onclick = () => {
                    if(!myT || boardData[i] !== "") return;
                    boardData[i] = myS; myT = false; renderBoard();
                    socket.emit('move', { room: curR, index: i, symbol: myS });
                    if(checkWin(i, myS)) socket.emit('win', { room: curR, phone: myP, prize: curP });
                };
                b.appendChild(c);
            });
        }

        function checkWin(idx, s) {
            const size = 15; const r = Math.floor(idx/size), c = idx%size;
            const dirs = [{x:0,y:1},{x:1,y:0},{x:1,y:1},{x:1,y:-1}];
            for (let d of dirs) {
                let cnt = 1;
                for (let i=1; i<5; i++) { let nr=r+d.x*i, nc=c+d.y*i; if(nr>=0 && nr<15 && nc>=0 && nc<15 && boardData[nr*size+nc]===s) cnt++; else break; }
                for (let i=1; i<5; i++) { let nr=r-d.x*i, nc=c-d.y*i; if(nr>=0 && nr<15 && nc>=0 && nc<15 && boardData[nr*size+nc]===s) cnt++; else break; }
                if(cnt >= 5) return true;
            }
            return false;
        }

        function startTimer() {
            let s = 30; clearInterval(timerInt);
            timerInt = setInterval(() => {
                s--; document.getElementById('timer').innerText = s + "s";
                if(s <= 0) clearInterval(timerInt);
            }, 1000);
        }

        socket.on('opponentMove', d => { boardData[d.index] = d.symbol; myT = true; renderBoard(); startTimer(); });

        socket.on('gameOver', d => {
            clearInterval(timerInt); document.getElementById('u-bal').innerText = d.newBalance + " G";
            document.getElementById('res-t').innerText = (d.winner === myP) ? "OU GENYEN! 🎉" : "OU PÈDI! 💀";
            document.getElementById('modal').classList.remove('hidden');
        });

        function leaveGame() { socket.emit('leaveRoom', curR); showS('menu-s'); document.getElementById('modal').classList.add('hidden'); }
        function rejwe() { create(); alert("Kòd rejwe ap prepare..."); }
        socket.on('errorMsg', m => alert(m));
    </script>
</body>
</html>
