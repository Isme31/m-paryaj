<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #1b5e20; --accent: #2e7d32; --bg: #f4f7f6; --white: #ffffff; }
        body { background: var(--bg); color: #333; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .header { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: var(--primary); font-size: 20px; }
        .balance-pill { background: #e8f5e9; color: var(--primary); padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .screen { padding: 15px; max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        .card-ui { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 92%; margin-bottom: 10px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><i class="fas fa-bolt"></i> BLITZ</div>
        <div id="user-header" class="hidden"><span id="u-bal" class="balance-pill">0 HTG</span></div>
    </div>

    <!-- EKRAN LOGIN -->
    <div id="auth-s" class="screen">
        <div style="text-align: center; margin-top: 40px;">
            <h1 style="color:var(--primary);">Byenveni 👋</h1>
            <p>Antre nimewo 8 chif ou pou w jwe.</p>
            <div class="card-ui">
                <input type="text" id="phone" placeholder="Telefòn (eg: 31594645)">
                <input type="password" id="pass" placeholder="Modpas">
                <button class="btn" onclick="login()">KONEKTE / ENSKRI</button>
            </div>
        </div>
    </div>

    <!-- MENU PRENSIPAL -->
    <div id="menu-s" class="screen hidden">
        <div class="card-ui" style="background: linear-gradient(135deg, var(--primary), var(--accent)); color: white;">
            <h3>MOPYON BLITZ ⚡</h3>
            <p style="font-size: 12px;">Depo/Retrè: 55110103 / 31594645</p>
        </div>

        <div class="card-ui" style="display:flex; gap:10px;">
            <button class="btn" style="background:#ffa502; margin:0;" onclick="showS('withdraw-s')">Retrè</button>
            <button class="btn" style="background:#25d366; margin:0;" onclick="window.open('https://whatsapp.com')">Asistans</button>
        </div>

        <div class="card-ui">
            <h4>JWE MOPYON</h4>
            <input type="number" id="bet" value="50" placeholder="Paryaj HTG">
            <button class="btn" onclick="startAutoMatch()">JWENN MATCH (AUTO)</button>
            <button class="btn" style="background:#444" onclick="createRoom()">KREYE KÒD PRIVÉ</button>
            <hr>
            <input type="text" id="join-c" placeholder="Antre Kòd Zanmi w">
            <button class="btn" style="background:#ffa502" onclick="joinRoom()">ANTRE NAN MATCH</button>
        </div>

        <div id="auto-wait" class="hidden card-ui" style="text-align:center;">
            <div class="loader"></div>
            <p>Chèche jwè... <span id="timer">30</span>s</p>
            <button class="btn" style="background:red;" onclick="cancelMatch()">ANILE</button>
        </div>
    </div>

    <!-- EKRAN RETRÈ -->
    <div id="withdraw-s" class="screen hidden">
        <div class="card-ui">
            <h3>Fè yon Retrè (Min 100G)</h3>
            <p style="font-size: 11px; color: red;">Y ap dekonpte 5% frè otomatikman.</p>
            <input type="number" id="w-amt" placeholder="Montan HTG">
            <button class="btn" onclick="sendWithdraw()">KONFIME</button>
            <button class="btn" style="background:#888" onclick="showS('menu-s')">TOUNEN</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone = "";

        function showS(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;
            const ref = new URLSearchParams(window.location.search).get('ref');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password, ref })
            });

            const data = await res.json();
            if (data.success) {
                myPhone = data.user.phone;
                localStorage.setItem('mopyon_phone', myPhone);
                document.getElementById('u-bal').innerText = data.user.balance + " HTG";
                document.getElementById('user-header').classList.remove('hidden');
                showS('menu-s');
                if(data.msg) alert(data.msg);
            } else {
                alert(data.msg);
            }
        }

        async function sendWithdraw() {
            const amount = document.getElementById('w-amt').value;
            const phone = localStorage.getItem('mopyon_phone');

            const res = await fetch('/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, amount })
            });
            const data = await res.json();
            alert(data.msg);
            if(data.success) location.reload();
        }

        function startAutoMatch() {
            const bet = document.getElementById('bet').value;
            socket.emit('startMatchmaking', { phone: myPhone, bet });
            showS('menu-s');
            document.getElementById('auto-wait').classList.remove('hidden');
        }

        function cancelMatch() {
            socket.emit('cancelMatchmaking', document.getElementById('bet').value);
            document.getElementById('auto-wait').classList.add('hidden');
        }

        function createRoom() {
            socket.emit('createRoom', { phone: myPhone, bet: document.getElementById('bet').value });
        }

        function joinRoom() {
            const code = document.getElementById('join-c').value;
            socket.emit('joinRoom', { phone: myPhone, code });
        }

        socket.on('roomCreated', (data) => {
            alert("Kòd ou se: " + data.code + ". Voye l bay zanmi w!");
        });

        socket.on('updateBalance', (bal) => {
            document.getElementById('u-bal').innerText = bal + " HTG";
        });

        socket.on('gameStart', (data) => {
            alert("Match kòmanse! Pri a se: " + data.prize + " HTG");
            // Isit la ou mèt ouvè koòdone jwèt Mopyon an
        });

        socket.on('errorMsg', (msg) => alert(msg));
    </script>
</body>
</html>
