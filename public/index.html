<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLITZ ⚡ | Jwe & Touche</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #1b5e20; --accent: #ffa502; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; padding-bottom: 90px; text-align: center; }
        .hidden { display: none !important; }
        .screen { padding: 15px; max-width: 500px; margin: auto; }
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { color: var(--primary); font-weight: 900; font-size: 24px; }
        .balance-pill { background: #f1f8f1; color: var(--primary); padding: 8px 18px; border-radius: 25px; font-weight: bold; border: 1px solid #e0eee0; }
        .banner { background: #1b5e20; margin: 15px; padding: 25px; border-radius: 20px; color: white; text-align: left; }
        .btn-act { border: none; padding: 18px; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        .grid-20 { display: grid; grid-template-columns: repeat(20, 1fr); gap: 1px; background: #ccc; border: 2px solid var(--primary); width: 98vw; height: 98vw; max-width: 450px; margin: auto; }
        .cell { background: white; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; font-size: 11px; aspect-ratio: 1/1; }
        .win-cell { background: #c8e6c9 !important; animation: pulse 0.8s infinite; border: 1px solid var(--primary) !important; }
        @keyframes pulse { 0% {transform:scale(1);} 50% {transform:scale(1.1);} 100% {transform:scale(1);} }
        input { width: 90%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; }
        #timer-box { font-size: 32px; color: red; font-weight: 900; margin: 10px; }
        #game-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; padding-top:10px; overflow-y: auto; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="auth-s" class="screen" style="padding-top:60px;">
        <div style="background:white; padding:30px; border-radius:25px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
            <h1 style="color:var(--primary)">Byenveni 👋</h1>
            <p style="font-weight:bold; color:var(--primary); font-style:italic; margin-bottom:25px;">" Jwe, Genyen, Touche "</p>
            <input type="text" id="phone" placeholder="Nimewo Telefòn">
            <input type="password" id="pass" placeholder="Modpas">
            <button class="btn-act" style="background:var(--primary)" onclick="login()">KONEKTE</button>
        </div>
    </div>

    <!-- HOME -->
    <div id="menu-s" class="hidden">
        <div class="header"><b class="logo">BLITZ</b> <div id="u-bal" class="balance-pill">0 HTG</div></div>
        <div class="banner">
            <h2>MOPYON BLITZ ⚡</h2>
            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:12px; margin-top:15px; font-size:13px;">
                <b>SÈVIS DEPO / ASISTANS :</b><br>
                <a href="https://wa.me">📲 Natcom: 55110103</a> | 
                <a href="https://wa.me">📲 Digicel: 31594645</a>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; padding:0 15px;">
            <button class="btn-act" style="background:#4caf50;" onclick="window.open('https://wa.me')">Gwoup</button>
            <button class="btn-act" style="background:#ff9800;" onclick="showS('withdraw-s')">Retrè</button>
        </div>
        <div class="screen" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div style="background:white; padding:20px; border-radius:20px; position:relative;" onclick="showS('mopyon-opts')">
                <span style="position:absolute; top:10px; right:10px; background:#4caf50; color:white; padding:4px 8px; border-radius:10px; font-size:10px; font-weight:bold;">AKTIF</span>
                <img src="https://flaticon.com" width="50"><div style="font-weight:bold; margin-top:10px;">MOPYON</div>
            </div>
            <div style="background:white; padding:20px; border-radius:20px; position:relative; opacity:0.6;">
                <span style="position:absolute; top:10px; right:10px; background:#f44336; color:white; padding:4px 8px; border-radius:10px; font-size:10px; font-weight:bold;">SOON</span>
                <img src="https://flaticon.com" width="50"><div style="font-weight:bold; margin-top:10px;">DOMINO</div>
            </div>
        </div>
        <div style="position:fixed; bottom:0; left:0; width:100%; background:white; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #eee;">
            <b style="color:var(--primary)">AKEY</b> <div onclick="showS('withdraw-s')">RETRÈ</div> <div onclick="window.open('https://wa.me')">ÈD</div>
        </div>
    </div>

    <!-- WITHDRAW -->
    <div id="withdraw-s" class="hidden screen">
        <div style="background:white; padding:30px; border-radius:25px;">
            <h3>Mande Retrè</h3><input type="number" id="w-amount" placeholder="Montan HTG (Min 100)">
            <button class="btn-act" style="background:#ff9800" onclick="withdraw()">KONFIME</button>
            <button class="btn-act" style="background:#eee; color:#333;" onclick="showS('menu-s')">ANILE</button>
        </div>
    </div>

    <!-- MOPYON OPTS -->
    <div id="mopyon-opts" class="hidden screen">
        <div style="background:white; padding:25px; border-radius:20px;">
            <h3>Match Privé</h3><input type="text" id="p-code" placeholder="Kòd Chanm"><input type="number" id="bet" value="50">
            <button class="btn-act" style="background:var(--primary)" onclick="joinPrivate()">KREYE / ANTRE</button>
            <button class="btn-act" style="background:#999;" onclick="showS('menu-s')">ANILE</button>
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="game-overlay" class="hidden">
        <div id="timer-box">30s</div>
        <h3 id="match-status">Atann...</h3>
        <div id="turn-info" style="font-weight:bold; margin-bottom:10px; color:var(--primary);"></div>
        <div class="grid-20" id="board-grid"></div>
        <button class="btn-act" style="background:red; width:150px;" onclick="finiJwet()">KITE</button>
    </div>

    <script>
        const socket = io();
        let user, room, symbol, myTurn, prize, board, timerInt;

        function showS(id) { document.querySelectorAll('.screen, #menu-s, #game-overlay, #auth-s, #withdraw-s, #mopyon-opts').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function finiJwet() { clearInterval(timerInt); showS('menu-s'); }

        async function login() {
            const p = document.getElementById('phone').value, pass = document.getElementById('pass').value;
            const ref = new URLSearchParams(window.location.search).get('ref');
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone:p, password:pass, ref }) });
            const data = await res.json();
            if(data.success) { user=data.user; showS('menu-s'); updateUI(); }
        }

        function updateUI() { document.getElementById('u-bal').innerText = user.balance + " HTG"; }

        function joinPrivate() { socket.emit('joinPrivate', { roomCode: document.getElementById('p-code').value, phone: user.phone, bet: document.getElementById('bet').value }); showS('game-overlay'); resetBoard(); }

        socket.on('gameStart', d => { room=d.room; prize=d.prize; symbol=(d.turn===user.phone)?'X':'O'; myTurn=(d.turn===user.phone); document.getElementById('match-status').innerText="Ou se: "+symbol; startTimer(); updateTurnText(); });

        socket.on('opponentMove', d => { board[d.r][d.c]=d.symbol; myTurn=true; renderBoard(); startTimer(); updateTurnText(); });

        function makeMove(r, c) {
            if(!myTurn || board[r][c]!=='') return;
            board[r][c]=symbol; myTurn=false;
            renderBoard(); clearInterval(timerInt);
            socket.emit('move', { room, r, c, symbol, phone: user.phone, prize });
            let winC = checkWin(r, c);
            if(winC) { colorWin(winC); socket.emit('win', { room, phone: user.phone, prize }); }
        }

        function checkWin(r, c) {
            const ds = [{dr:0,dc:1},{dr:1,dc:0},{dr:1,dc:1},{dr:1,dc:-1}];
            for (let {dr, dc} of ds) {
                let cs = [{r, c}];
                for (let i=1; i<5; i++) {
                    let nr=r+dr*i, nc=c+dc*i;
                    if (board[nr]?.[nc]===symbol) cs.push({r:nr,c:nc}); else break;
                }
                for (let i=1; i<5; i++) {
                    let nr=r-dr*i, nc=c-dc*i;
                    if (board[nr]?.[nc]===symbol) cs.push({r:nr,c:nc}); else break;
                }
                if (cs.length>=5) return cs;
            }
            return null;
        }

        function colorWin(cs) { const all = document.querySelectorAll('.cell'); cs.forEach(p => { const idx = p.r*20+p.c; if(all[idx]) all[idx].classList.add('win-cell'); }); }

        function startTimer() {
            let t=30; clearInterval(timerInt);
            timerInt = setInterval(() => { t--; document.getElementById('timer-box').innerText=t+"s"; if(t<=0) clearInterval(timerInt); }, 1000);
        }

        function updateTurnText() { document.getElementById('turn-info').innerText = myTurn ? "TOU PA W! ⚡" : "ATANN OPOZAN..."; }

        async function withdraw() {
            const amt = document.getElementById('w-amount').value;
            const res = await fetch('/withdraw', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: user.phone, amount: amt }) });
            const data = await res.json();
            if(data.success) { alert("Demann voye!"); user.balance-=amt; updateUI(); showS('menu-s'); }
        }

        socket.on('gameOver', d => {
            clearInterval(timerInt);
            alert(d.msg + "\nGanyan: " + d.winner);
            if(d.winner===user.phone) { user.balance=d.newBalance; updateUI(); }
            setTimeout(() => { finiJwet(); }, 2500);
        });

        function resetBoard() { board = Array(20).fill().map(() => Array(20).fill('')); renderBoard(); }

        function renderBoard() {
            const g = document.getElementById('board-grid'); g.innerHTML = '';
            for(let r=0; r<20; r++) for(let c=0; c<20; c++) {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = board[r][c];
                if(board[r][c]==='X') d.style.color='red'; if(board[r][c]==='O') d.style.color='blue';
                d.onclick = () => makeMove(r, c); g.appendChild(d);
            }
        }

        socket.on('match-status', m => document.getElementById('match-status').innerText = m);
        socket.on('errorMsg', m => { alert(m); finiJwet(); });
    </script>
</body>
</html>
