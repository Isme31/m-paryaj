<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .screen { padding: 20px; }
        .hidden { display: none !important; }
        .bal-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin: 5px; }
        input { padding: 12px; margin: 5px; border-radius: 8px; width: 80%; }
        
        /* DOMINO STYLE */
        #domino-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 20px; background: #0a3d1d; border-radius: 15px; min-height: 100px; margin: 15px 0; border: 3px solid #052a14; }
        .tile { background: #fff; color: #000; width: 35px; height: 65px; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; font-weight: bold; border: 1px solid #999; position: relative; }
        .tile::after { content: ""; width: 80%; height: 1px; background: #ccc; position: absolute; top: 50%; }
        .my-tile:hover { transform: translateY(-5px); border: 2px solid #ff4757; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()" style="background:#ff4757; width:90%">KONEKTE</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="bal-box">
            <h2 style="color: #0f0;"><span id="bal">0</span> G</h2>
        </div>

        <div id="lobby">
            <button onclick="setGame('mopyon')" id="btnM" style="background:#ff4757">MOPYON</button>
            <button onclick="setGame('domino')" id="btnD" style="background:#3498db; opacity:0.5">DOMINO</button>
            <br><input type="number" id="bet" value="50">
            <button onclick="createRoom()" style="background:#2ecc71; width:90%">KREYE KÒD</button>
            <div id="room-display" class="hidden">Kòd: <b id="c-val" style="color:red; font-size:20px"></b></div>
            <input type="text" id="join-code" placeholder="Mete kòd zanmi">
            <button onclick="joinRoom()" style="background:#ffa502; width:90%">ANTRE MATCH</button>
        </div>

        <div id="board-container" class="hidden">
            <h3 id="status">Atann...</h3>
            <div id="domino-board"></div>
            <div id="my-hand" style="display:flex; justify-content:center; gap:5px; flex-wrap:wrap;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone, myType = 'mopyon', myHand = [], currentRoom = "";

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, password}) });
            const d = await res.json();
            if(d.success) {
                myPhone = d.phone; document.getElementById('bal').innerText = d.balance;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            }
        }

        function setGame(t) { 
            myType = t; 
            document.getElementById('btnM').style.opacity = t==='mopyon'?'1':'0.5';
            document.getElementById('btnD').style.opacity = t==='domino'?'1':'0.5';
        }

        function createRoom() { socket.emit('createPrivate', { phone: myPhone, bet: document.getElementById('bet').value, game: myType }); }
        function joinRoom() { socket.emit('joinPrivate', { code: document.getElementById('join-code').value, phone: myPhone }); }

        socket.on('roomCreated', d => { document.getElementById('c-val').innerText = d.code; document.getElementById('room-display').classList.remove('hidden'); });

        socket.on('gameStart', d => {
            currentRoom = d.room;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('board-container').classList.remove('hidden');
            updateStatus(d.turn);
        });

        socket.on('receiveHand', d => {
            myHand = d.hands[myPhone];
            renderHand();
        });

        socket.on('updateBoard', d => {
            const b = document.getElementById('domino-board'); b.innerHTML = "";
            d.board.forEach(t => { b.innerHTML += `<div class="tile"><div>${t.a}</div><div>${t.b}</div></div>`; });
            updateStatus(d.turn);
            renderHand(); 
        });

        function renderHand() {
            const h = document.getElementById('my-hand'); h.innerHTML = "";
            myHand.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'tile my-tile';
                div.innerHTML = `<div>${t.a}</div><div>${t.b}</div>`;
                div.onclick = () => socket.emit('dominoMove', { room: currentRoom, phone: myPhone, tile: t, index: i });
                h.appendChild(div);
            });
        }

        function updateStatus(turn) {
            const s = document.getElementById('status');
            s.innerText = (turn === myPhone) ? "Tou pa w!" : "Atann lòt la...";
            s.style.color = (turn === myPhone) ? "#0f0" : "#fff";
        }

        socket.on('playerSkipped', d => alert(d.skipped === myPhone ? "Ou boure!" : "Lòt la boure!"));
        socket.on('gameOver', d => { alert("Ganyan: " + d.winner + " | Prize: " + d.prize + "G"); location.reload(); });
        socket.on('errorMsg', m => alert(m));
    </script>
</body>
</html>
