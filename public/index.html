<div id="game-screen" class="screen hidden">
    <div class="bal-box">
        <h2 style="color: #00ff00;"><span id="bal">0</span> G</h2>
        <button onclick="showDepoMenu()" style="background:#2ecc71;">RECHAJE 💰</button>
        <button onclick="requestWithdraw()" style="background:#ffa502;">RETRÈ 💸</button>
    </div>
    <!-- ... lobby ak tablo ... -->
</div>

<script>
    // DEPO
    function showDepoMenu() {
        const chwa = confirm("OK pou MONCASH (3159-4645)\nANNULER pou NATCASH (5511-0103)");
        const ph = chwa ? "50931594645" : "50955110103";
        const met = chwa ? "MONCASH" : "NATCASH";
        alert(`Voye kòb la sou ${met} nan ${ph} epi voye prèv la sou WhatsApp.`);
        window.open(`https://wa.me{ph}?text=Mwen%20fè%20yon%20depo%20sou%20${myPhone}`, '_blank');
    }

    // RETRÈ
    async function requestWithdraw() {
        const amt = prompt("Konbe ou vle retire? (Min 100G)");
        if (!amt || amt < 100) return alert("Minimòm se 100G");
        const res = await fetch('/request-withdraw', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone: myPhone, amount: parseFloat(amt) })
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('bal').innerText = data.newBalance;
            alert("Demann retrè voye! Admin lan ap valide sa.");
        } else { alert(data.msg); }
    }
    
    // ... rès lojik socket la ...
</script>
