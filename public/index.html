<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .hidden { display: none !important; }
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; width: 90%; max-width: 400px; margin: 20px auto; background: #444; }
        .cell { aspect-ratio: 1/1; background: #222; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        input, button { padding: 12px; margin: 5px; width: 80%; max-width: 300px; border-radius: 8px; border: none; }
        button { background: #ff4757; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE</button>
    </div>

    <div id="game-screen" class="hidden">
        <h3>Balans: <span id="bal">0</span>G</h3>
        <div id="status">Chwazi mize w</div>
        
        <div id="menu">
            <input type="number" id="bet" value="50">
            <button onclick="findMatch()">JWENN MATCH</button>
        </div>

        <div id="board" class="grid hidden"></div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(100).fill("");

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, password })
            });
            const data = await res.json();
            if (data.success) {
                myPhone = data.phone;
                document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            } else { alert(data.msg || "Erè"); }
        }

        function findMatch() {
            const bet = parseFloat(document.getElementById('bet').value);
            socket.emit('findMatch', { phone: myPhone, bet });
            document.getElementById('status').innerText = "Ap chache...";
        }

        socket.on('gameStart', (data) => {
            currentRoom = data.room;
            mySymbol = data.firstTurn === myPhone ? 'X' : 'O';
            myTurn = (data.firstTurn === myPhone);
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('board').classList.remove('hidden');
            renderBoard();
        });

        socket.on('opponentMove', (data) => {
            boardData[data.index] = data.symbol;
            myTurn = true; renderBoard();
        });

        socket.on('gameOver', (data) => {
            alert(data.winner === myPhone ? "OU GENYEN!" : "OU PÈDI!");
            document.getElementById('bal').innerText = data.newBalance;
            location.reload(); // Pou kounye a nou fè reload pou n wè si sa mache
        });

        function makeMove(i) {
            if(!myTurn || boardData[i] !== "") return;
            boardData[i] = mySymbol; myTurn = false; renderBoard();
            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
            // Ajoute lojik checkWin ou a isit la
        }

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const c = document.createElement('div'); c.className = 'cell'; c.innerText = val;
                c.onclick = () => makeMove(i); b.appendChild(c);
            });
        }
    </script>
</body>
</html>
