<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .screen { padding: 20px; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; width: 95%; max-width: 500px; margin: 15px auto; background: #444; border: 1px solid #444; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; }
        input, button { padding: 12px; margin: 5px 0; width: 90%; max-width: 300px; border-radius: 8px; border: none; font-size: 15px; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
        #status { background: #28a745; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-weight: bold; }
        #timer { color: #ffeb3b; }
    </style>
</head>
<body>
    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="status">Pare pou jwe!</div>
        <h3>Balans: <span id="bal" style="color:#00ff00;">0</span> G</h3>
        <div id="lobby">
            <input type="number" id="bet" value="50" min="50"><br>
            <button onclick="findMatch()">⚡ MATCH RAPID</button><hr>
            <input type="text" id="roomCode" placeholder="Kòd Chanm">
            <button onclick="joinPrivate()" style="background: #2ecc71;">JWE AK ZANMI</button>
        </div>
        <div id="board" class="grid hidden"></div>
    </div>

    <script>
        const socket = io();
        const SIZE = 15;
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(SIZE*SIZE).fill("");
        let timerInterval, timeLeft = 30;

        async function login() {
            const phone = document.getElementById('phone').value, password = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password }) });
            const data = await res.json();
            if (data.success) {
                myPhone = data.phone; document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('game-screen').classList.remove('hidden');
            } else alert("Erè!");
        }

        function findMatch() { socket.emit('findMatch', { phone: myPhone, bet: parseFloat(document.getElementById('bet').value) }); }
        function joinPrivate() { socket.emit('joinPrivate', { phone: myPhone, bet: parseFloat(document.getElementById('bet').value), room: document.getElementById('roomCode').value }); }

        socket.on('statusUpdate', msg => { document.getElementById('status').innerText = msg; });

        socket.on('gameStart', data => {
            currentRoom = data.room; mySymbol = data.firstTurn === myPhone ? 'X' : 'O'; myTurn = (data.firstTurn === myPhone);
            boardData.fill(""); // Netwaye tablo a nan memwa
            document.getElementById('lobby').classList.add('hidden'); document.getElementById('board').classList.remove('hidden');
            renderBoard(); // Redesinen tablo a vid
            updateStatus(); if(myTurn) startTimer();
        });

        socket.on('opponentMove', data => { boardData[data.index] = data.symbol; myTurn = true; renderBoard(); updateStatus(); startTimer(); });

        socket.on('gameOver', data => {
            clearInterval(timerInterval);
            alert(data.msg || (data.winner === myPhone ? "OU GANYEN!" : "OU PÈDI!"));
            if(data.newBalance !== undefined) document.getElementById('bal').innerText = data.newBalance;
            
            // RESET KONPLE
            boardData.fill(""); 
            document.getElementById('board').innerHTML = ""; 
            document.getElementById('board').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('status').innerText = "Pare pou yon lòt!";
        });

        socket.on('balanceUpdate', d => { document.getElementById('bal').innerText = d.balance; });

        function startTimer() {
            clearInterval(timerInterval); timeLeft = 30;
            timerInterval = setInterval(() => { timeLeft--; updateStatus(); if(timeLeft <= 0) clearInterval(timerInterval); }, 1000);
        }

        function makeMove(i) {
            if(!myTurn || boardData[i] !== "") return;
            clearInterval(timerInterval); boardData[i] = mySymbol; myTurn = false; renderBoard(); updateStatus();
            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
            if (checkWin(i, mySymbol)) socket.emit('win', { room: currentRoom, phone: myPhone });
        }

        function checkWin(index, s) {
            const r = Math.floor(index / SIZE), c = index % SIZE, dirs = [,,,[1,-1]];
            for (let [dr, dc] of dirs) {
                let count = 1;
                [1, -1].forEach(side => {
                    for (let i = 1; i < 5; i++) {
                        let nr = r + dr * i * side, nc = c + dc * i * side;
                        if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && boardData[nr * SIZE + nc] === s) count++;
                        else break;
                    }
                });
                if (count >= 5) return true;
            } return false;
        }

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const cell = document.createElement('div'); cell.className = 'cell'; cell.innerText = val;
                cell.style.color = val === 'X' ? '#ff4757' : '#2ecc71'; cell.onclick = () => makeMove(i); b.appendChild(cell);
            });
        }

        function updateStatus() {
            const s = document.getElementById('status');
            s.innerHTML = myTurn ? `Tou pa w (${mySymbol}) - <span id="timer">${timeLeft}s</span>` : "Tann advèsè a...";
            s.style.background = myTurn ? "#28a745" : "#ffc107";
        }
    </script>
</body>
</html>
