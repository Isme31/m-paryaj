<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .screen { padding: 20px; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; width: 100%; max-width: 500px; margin: auto; background: #444; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        input, button { padding: 12px; margin: 5px 0; width: 90%; max-width: 300px; border-radius: 8px; border: none; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
        #timer { color: #ffeb3b; font-size: 20px; font-weight: bold; }
        .bal-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1>Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Nimewo Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="status">Pare!</div>
        <div id="timer">30</div>
        
        <div class="bal-box">
            <h2><span id="bal">0</span> G</h2>
            <p style="font-size:11px;">🎁 Envite yon moun (5G): <br> 
            <input type="text" id="ref-link" readonly style="font-size:9px; width:70%;"> <button onclick="copyRef()" style="width:auto; padding:5px;">KOPYE</button></p>
        </div>

        <div id="lobby">
            <input type="number" id="bet" value="50" min="50">
            <button onclick="findMatch()">MATCH RAPID</button>
            <input type="text" id="roomCode" placeholder="Kòd Chanm">
            <button onclick="joinPrivate()" style="background:#3498db;">JWE AK ZANMI</button>
        </div>

        <div id="board-container" class="hidden">
            <div id="board" class="grid"></div>
            <button onclick="tounenNanLobby()">KITE MATCH LA</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(225).fill(""), timerInt;

        async function login() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('pass').value;
            const ref = new URLSearchParams(window.location.search).get('ref');

            const res = await fetch('/login', { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone, password, ref }) 
            });
            const data = await res.json();
            if (data.success) {
                myPhone = data.phone;
                document.getElementById('bal').innerText = data.balance;
                document.getElementById('ref-link').value = `${window.location.origin}?ref=${myPhone}`;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            } else alert(data.msg);
        }

        function startTimer() {
            clearInterval(timerInt);
            let time = 30;
            document.getElementById('timer').innerText = time;
            timerInt = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time;
                if(time <= 0) {
                    clearInterval(timerInt);
                    if(myTurn) socket.emit('timesUp', { room: currentRoom, phone: myPhone });
                }
            }, 1000);
        }

        socket.on('gameStart', data => {
            currentRoom = data.room; mySymbol = data.firstTurn === myPhone ? 'X' : 'O'; myTurn = (data.firstTurn === myPhone);
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('board-container').classList.remove('hidden');
            renderBoard(); startTimer();
        });

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((c, i) => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = c;
                d.onclick = () => {
                    if(!myTurn || boardData[i] !== "") return;
                    boardData[i] = mySymbol; myTurn = false; renderBoard();
                    socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol, phone: myPhone });
                    startTimer(); // Reset timer pou lòt la
                };
                b.appendChild(d);
            });
        }

        socket.on('opponentMove', data => {
            boardData[data.index] = data.symbol; myTurn = true; renderBoard(); startTimer();
        });

        socket.on('gameOver', data => {
            clearInterval(timerInt);
            alert(data.winner === myPhone ? "OU GANYEN!" : "OU PÈDI! " + (data.msg || ""));
            document.getElementById('bal').innerText = data.newBalance || document.getElementById('bal').innerText;
            tounenNanLobby();
        });

        function tounenNanLobby() {
            document.getElementById('board-container').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            boardData.fill(""); clearInterval(timerInt);
        }

        function copyRef() {
            document.getElementById('ref-link').select();
            document.execCommand('copy'); alert("Lyen kopye!");
        }
    </script>
</body>
</html>
