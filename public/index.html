<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mopyon Blitz ⚡</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding-bottom: 50px; }
        .screen { width: 100%; max-width: 500px; margin: auto; padding: 20px; box-sizing: border-box; }
        .hidden { display: none; }
        .header-box { background:#1e1e1e; padding:15px; border-radius:15px; border: 1px solid #333; margin-bottom: 20px; }
        input, button { padding: 15px; margin: 8px 0; border-radius: 12px; width: 100%; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #444; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; width: 100%; aspect-ratio: 1/1; margin: 15px auto; background: #444; }
        .cell { aspect-ratio: 1/1; background: #181818; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        .status-bar { background: #28a745; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1 style="color:#ff4757;">Mopyon Blitz ⚡</h1>
        <input type="text" id="phone" placeholder="Telefòn">
        <input type="password" id="pass" placeholder="Modpas">
        <button onclick="login()">KONEKTE</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="header-box">
            <p>Balans: <span id="bal" style="color:#00ff00; font-size: 28px;">0</span> G</p>
            <div id="status" class="status-bar">Pare pou jwe!</div>
        </div>

        <div id="main-menu">
            <input type="number" id="bet-amount" value="50" min="50">
            <button onclick="findMatch()" style="background:#ff4757;">⚡ JWENN MATCH</button>
        </div>

        <div id="board" class="grid hidden"></div>
    </div>

    <script>
        const socket = io();
        let myPhone, mySymbol, currentRoom, myTurn = false, boardData = Array(100).fill(""), currentPrize = 0;

        async function login() {
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone, password: pass }) });
            const data = await res.json();
            if(data.success) {
                myPhone = data.phone; 
                document.getElementById('bal').innerText = data.balance;
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('game-screen').classList.remove('hidden');
            }
        }

        function findMatch() {
            const bet = parseFloat(document.getElementById('bet-amount').value);
            socket.emit('findMatch', { phone: myPhone, bet });
            document.getElementById('status').innerText = "Ap chache advèsè...";
        }

        socket.on('gameStart', (data) => {
            currentRoom = data.room; currentPrize = data.prize;
            mySymbol = data.firstTurn === myPhone ? 'X' : 'O';
            myTurn = (data.firstTurn === myPhone);
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('board').classList.remove('hidden');
            renderBoard();
            updateStatus();
        });

        socket.on('opponentMove', (data) => { 
            boardData[data.index] = data.symbol; 
            myTurn = true; renderBoard(); updateStatus(); 
        });

        socket.on('gameOver', (data) => {
            alert(data.winner === myPhone ? "OU GANYEN " + data.prize + "G!" : "OU PÈDI!");
            document.getElementById('bal').innerText = data.newBalance;
            resetUI();
        });

        socket.on('balanceUpdate', (data) => { document.getElementById('bal').innerText = data.balance; });

        function resetUI() {
            boardData = Array(100).fill("");
            currentRoom = null;
            document.getElementById('board').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('status').innerText = "Pare!";
        }

        function makeMove(i) {
            if(!myTurn || boardData[i] !== "") return;
            boardData[i] = mySymbol; myTurn = false; renderBoard(); updateStatus();
            socket.emit('move', { room: currentRoom, index: i, symbol: mySymbol });
            if(checkWin(i, mySymbol)) socket.emit('win', { phone: myPhone, room: currentRoom });
        }

        function renderBoard() {
            const b = document.getElementById('board'); b.innerHTML = "";
            boardData.forEach((val, i) => {
                const cell = document.createElement('div'); cell.className = 'cell'; cell.innerText = val;
                cell.style.color = val === 'X' ? '#ff4757' : '#2ecc71';
                cell.onclick = () => makeMove(i); b.appendChild(cell);
            });
        }

        function updateStatus() {
            const s = document.getElementById('status');
            s.innerText = myTurn ? `Tou pa w (${mySymbol})` : "Tann advèsè...";
            s.style.background = myTurn ? "#28a745" : "#ffc107";
        }

        function checkWin(idx, sym) {
            // Lojik senp pou tcheke si gen 5 liy (ou ka mete lojik konplè w la isit la)
            return false; // Ranplase ak lojik checkWin ou a
        }
    </script>
</body>
</html>
