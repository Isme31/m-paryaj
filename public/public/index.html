<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mòpyon VIP - 50 Goud</title>
    <!-- Koneksyon Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Libreri SweetAlert2 pou bèl mesaj (Sa te manke) -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
        }
        #balance-box { 
            position: fixed; 
            top: 10px; 
            right: 10px; 
            background: #28a745; 
            color: white; 
            padding: 12px 20px; 
            border-radius: 50px; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        h1 { color: #333; margin-top: 40px; }
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 90px); 
            gap: 10px; 
            justify-content: center; 
            margin-top: 30px; 
        }
        .cell { 
            width: 90px; 
            height: 90px; 
            background: white; 
            border: 2px solid #007bff; 
            border-radius: 10px; 
            font-size: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold; 
        }
        .cell:hover { background: #e7f3ff; }
        .btn-login { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 25px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <div id="balance-box">Balans: <span id="bal">0</span> G</div>

    <h1>Mòpyon 50 Goud</h1>
    <p id="status-text">Konekte pou w kòmanse jwe</p>
    <button class="btn-login" onclick="login()">Konekte Non w</button>

    <div class="board" id="game-board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <script>
        const socket = io();
        let user = "";

        // Lè yon moun konekte
        function login() {
            Swal.fire({
                title: 'Antre non w',
                input: 'text',
                inputPlaceholder: 'Non ou isit la...',
                confirmButtonText: 'Konekte',
                showLoaderOnConfirm: true,
                allowOutsideClick: false
            }).then((result) => {
                if (result.value) {
                    user = result.value;
                    socket.emit('joinGame', user);
                    document.getElementById('status-text').innerText = "Byenvini, " + user + "!";
                }
            });
        }

        // Mizajou balans sou ekran an
        socket.on('updateBalance', (b) => {
            document.getElementById('bal').innerText = b;
        });

        // Lè w klike pou w jwe
        function makeMove(id) {
            if(!user) {
                Swal.fire('Atansyon', 'Ou dwe konekte non w anvan!', 'warning');
                return;
            }
            // Mande sèvè a pèmisyon pou jwe (ak miz 50G)
            socket.emit('startPlay', user);
        }

        // Repons sèvè a sou peman an
        socket.on('authRes', (res) => {
            if(res.status === 'OK') {
                document.getElementById('bal').innerText = res.bal;
                const Toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 2000
                });
                Toast.fire({
                    icon: 'success',
                    title: 'Miz 50G aksepte!'
                });
                // Isit la ou ka mete lojik pou jwèt la kontinye
            } else {
                Swal.fire('Echèk', res.msg, 'error');
            }
        });
    </script>
</body>
</html>
