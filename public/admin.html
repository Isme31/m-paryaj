<!DOCTYPE html>
<html>
<head>
    <title>Admin - Mopyon</title>
    <style>body { background: #f0f0f0; padding: 20px; font-family: sans-serif; }</style>
</head>
<body>
    <h2>Depoze Kòb sou Kont Jwè</h2>
    <input type="text" id="p" placeholder="Telefòn Jwè">
    <input type="number" id="a" placeholder="Montan">
    <button onclick="add()">AJOUTE KÒB ✅</button>

    <script>
        async function add() {
            const phone = document.getElementById('p').value;
            const amount = document.getElementById('a').value;
            await fetch('/admin/update-balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, amount: parseFloat(amount) })
            });
            alert("Kòb la ajoute!");
        }
    </script>
</body>
</html>
