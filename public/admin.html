<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Mopyon Blitz</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; border-bottom: 2px solid #ff4757; padding-bottom: 10px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; max-width: 300px; display: block; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #ff4757; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #ff6b81; }
        .withdraw-item { background: #fff3cd; padding: 10px; border-left: 5px solid #ffc107; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-confirm { background: #28a745; width: auto; margin: 0; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>Mopyon Admin ⚡</h1>

    <!-- SEKIRITE -->
    <div class="card">
        <h2>Kle Sekrè Admin</h2>
        <input type="password" id="admin_key" placeholder="Antre Kle Sekrè a">
    </div>

    <!-- RECHAJE KONT -->
    <div class="card">
        <h2>Rechaje Kont Jwè (Depo)</h2>
        <input type="text" id="depo_phone" placeholder="Nimewo Telefòn Jwè">
        <input type="number" id="depo_amount" placeholder="Montan Goud">
        <button onclick="updateBalance()">RECHAJE ✅</button>
    </div>

    <!-- DEMANN RETRE -->
    <div class="card">
        <h2>Demann Retrè An Atant</h2>
        <button onclick="fetchWithdraws()" style="background:#2f3542;">RAFRECHI LIS 🔄</button>
        <div id="withdraw_list">
            <p style="color: gray;">Klike sou rafrechi pou wè demann yo.</p>
        </div>
    </div>

    <script>
        // 1. FONKSYON POU RECHAJE KONT
        async function updateBalance() {
            const secret = document.getElementById('admin_key').value;
            const phone = document.getElementById('depo_phone').value;
            const amount = parseFloat(document.getElementById('depo_amount').value);

            if(!secret) return alert("Antre kle sekrè a!");

            const res = await fetch('/admin/update-balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, amount, secret })
            });
            const data = await res.json();
            if(data.success) {
                alert("Siksè! Nouvo balans jwè a se: " + data.newBalance + "G");
                document.getElementById('depo_amount').value = "";
            } else {
                alert("Erè: " + data.msg);
            }
        }

        // 2. FONKSYON POU WE RETRE YO
        async function fetchWithdraws() {
            const secret = document.getElementById('admin_key').value;
            if(!secret) return alert("Antre kle sekrè a anvan!");

            const res = await fetch(`/admin/withdraws?secret=${secret}`);
            if(res.status === 403) return alert("Kle sekrè a pa bon!");
            
            const list = await res.json();
            const container = document.getElementById('withdraw_list');
            container.innerHTML = list.length === 0 ? "<p>Pa gen demann an atant.</p>" : "";

            list.forEach(w => {
                const item = document.createElement('div');
                item.className = 'withdraw-item';
                item.innerHTML = `
                    <span><b>${w.phone}</b> mande <b>${w.amount}G</b></span>
                    <button class="btn-confirm" onclick="confirmWithdraw('${w._id}')">Voye ✅</button>
                `;
                container.appendChild(item);
            });
        }

        // 3. FONKSYON POU KONFIME RETRE
        async function confirmWithdraw(id) {
            const secret = document.getElementById('admin_key').value;
            const res = await fetch('/admin/confirm-withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, secret })
            });
            const data = await res.json();
            if(data.success) {
                alert("Retrè konfime!");
                fetchWithdraws(); // Rafrechi lis la
            }
        }
    </script>
</body>
</html>
