<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
    <style>body { font-family: sans-serif; padding: 20px; } input, button { display: block; margin: 10px 0; padding: 10px; }</style>
</head>
<body>
    <h2>Admin Mopyon Blitz</h2>
    <input type="password" id="key" placeholder="Kle Admin">
    <hr>
    <h3>Rechaje</h3>
    <input type="text" id="p" placeholder="Telefòn">
    <input type="number" id="a" placeholder="Montan">
    <button onclick="up()">Rechaje ✅</button>
    <hr>
    <h3>Retrè An Atant</h3>
    <button onclick="getW()">Rafrechi Lis</button>
    <div id="list"></div>

    <script>
        async function up() {
            const res = await fetch('/admin/update-balance', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: document.getElementById('p').value, amount: document.getElementById('a').value, secret: document.getElementById('key').value })
            });
            const d = await res.json();
            alert(d.success ? "Siksè! Nouvo balans: "+d.newBalance : "Erè");
        }

        async function getW() {
            const key = document.getElementById('key').value;
            const res = await fetch(`/admin/withdraws?secret=${key}`);
            const data = await res.json();
            const div = document.getElementById('list');
            div.innerHTML = "";
            data.forEach(w => {
                div.innerHTML += `<p>${w.phone} - ${w.amount}G <button onclick="conf('${w._id}')">Voye ✅</button></p>`;
            });
        }

        async function conf(id) {
            await fetch('/admin/confirm-withdraw', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, secret: document.getElementById('key').value })
            });
            getW();
        }
    </script>
</body>
</html>
