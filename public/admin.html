<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body style="font-family:sans-serif; padding:20px; background:#eee;">
    <h2>Admin Blitz ⚡</h2>
    <input type="password" id="key" placeholder="Kle Sekrè (1234)">
    <hr>
    <h3>Ajoute Balans</h3>
    <input type="text" id="p" placeholder="Telefòn Jwè">
    <input type="number" id="a" placeholder="Montan">
    <button onclick="up()">RECHAJE ✅</button>
    <script>
        async function up() {
            const res = await fetch('/admin/update-balance', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ phone: document.getElementById('p').value, amount: document.getElementById('a').value, secret: document.getElementById('key').value }) 
            });
            const d = await res.json(); alert(d.success ? "Rechaj fèt!" : "Erè!");
        }
    </script>
</body>
</html>
