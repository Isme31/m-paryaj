<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body>
    <h2>Rechaje Kont Jwè</h2>
    <input type="password" id="key" placeholder="Kòd Sekrè Admin (MOPYON2024)"><br>
    <input type="text" id="tel" placeholder="Telefòn Jwè"><br>
    <input type="number" id="kob" placeholder="Montan"><br>
    <button onclick="rechaje()">RECHAJE ✅</button>

    <script>
        async function rechaje() {
            const res = await fetch('/admin/update-balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    phone: document.getElementById('tel').value, 
                    amount: parseFloat(document.getElementById('kob').value),
                    secret: document.getElementById('key').value 
                })
            });
            const data = await res.json();
            alert(data.success ? "Siksè! Nouvo balans: " + data.newBalance : "Erè: " + data.msg);
        }
    </script>
</body>
</html>
